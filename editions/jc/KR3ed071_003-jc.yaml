body:
  text: 卷三婦人門骨蒸調經方當歸一錢白芍地骨皮各八分黃芩酒炒甘草各四分白朮白茯苓橘紅各七分枳殼五分半夏酒製三分澤蘭葉二錢水三杯煎一杯紅棗引服數劑調經止痛紫蘇陰乾俟經期如肚腹膨痛煎湯熏洗下部摩運小腹每期洗摩三四日則經行痛止經水不調及產後惡血不下兼治冷熱勞傷腰脊骨節疼痛等症丹參洗淨曬乾研末每服二錢月水久閉蠶砂四兩炒半黃色入無灰酒一壺於砂鍋內沸過取起以磁器盛之去蠶砂溫飲數盞自通經閉不行至一年者臍腹痛腰腿沉重寒熱往來白芥子二兩為末每服二錢熱酒沖食前服月經久閉血從口鼻出者先以好金墨水一盞服之次用當歸尾紅花各三錢水一杯煎八分服其血自歸經行逆行吐血韭菜搗汁一盅入童便半盅燉服立止斗門方婦人血氣攻腦頭旋悶絕忽然倒地如死不知人事者蒼耳草取嫩頭陰乾為末以酒送一錢服其功甚速此等藥宜預備血崩不拘冷熱蓮蓬殼荊芥穗燒存性各半多共末每服二錢米飲送下又方墨斗草即旱蓮草煮雞食之立效又方老絲瓜燒灰棕毛燒灰各等分為末用酒或鹽湯下又方正南屋上脊北瓦松七顆俱要松頭向陰北者用陰陽瓦焙乾研末熱黃酒送下又方生豆腐漿一碗生韭汁半碗調勻空心服一二次白帶兼治男子白濁冬瓜子用隔年陳者炒末每服五錢空心白滾湯下又方棉花籽半斤燒存性一兩柏子一兩燒存性三錢共研末空心淡酒調服三錢赤白帶石蓮子四兩白茯苓四兩共末服三錢空心黃酒下又方益母草花開時採取曬乾搗末每服二錢食前溫酒送下又方建蓮肉三錢炒去心海螵蛸三錢煅過共末熱酒服白帶不止槐花炒牡蠣煅各等分為末酒下三錢崩漏不止赤白帶下烏梅燒灰存性研末滾湯調服止後將蓮子燒灰存性香附炒為末和勻每服二錢淡醋湯調下男子溺血亦效陰癢生瘡艾葉明礬五倍子杏仁各五錢川連三錢蛇床子一兩煎水洗之即愈又方桃仁杵爛用棉裹塞之乾血癆奇方過三年不治即相思病唇紅腮白似桃花色骨瘦如柴白鴿子一支去肝腸淨入血竭一年者一兩二年者二兩三年者三兩以針線縫住用無灰酒煮數沸令病人吃下汙血即行如心中慌亂者食白煮肉一塊即止又方用全蠍去頭尾足燒灰存性黃酒送下二錢三五日見效又方用蛀木蟲數個瓦焙存性為末上好黃酒調勻每服五分十日即愈紅白崩方用三白草根一兩精肉四兩煮食即愈此方同雞煮服可治婦人筋骨疼痛白帶方用鯽魚六七寸長者先洗淨破去腸肚不必復洗用胡椒一歲一粒煮食即愈又方椿根白皮滑石等分為末粥丸梧子大白湯調下一百丸空腹服又方椿根白皮一兩五錢乾薑炒黑白芍炒黑黃柏炒黑各二錢為末白米粥為丸梧子大每空腹白湯調下一百丸男女白濁俱效婦人大小便不通用大麥杆燒灰水調服二三次即愈血崩枯礬黃丹各五錢絹綿包襄線扎一團用線穿竹筒上仰臥下入陰戶內將竹筒退出一炷香久即止止後將線扯出藥團可也又方以黃芩六錢為末以稈錘燒紅入米醋內淬之俟錘熱和黃芩末飲之即止赤白帶下年深諸藥不能治者兼治血崩貫眾一個全用只揉去毛及花萼以好醋蘸濕漫火炙熟為末空心米飲下每服二錢小便不通鯽魚一尾搗爛敷臍內即解又方用杏仁七粒去皮尖麩炒黃研末水調服立通血崩不止陳棕棉花籽二味燒灰存性黃酒送下即止血淋白雞冠花燒灰存性米飲調下白帶奇方馬齒莧搗汁三大合和雞子清二枚微溫頓飲之再服即愈經不血止炒白芍炒香附熟艾葉各一錢五分水煎服效崩血陳蓮蓬殼燒灰存性五錢棉花籽燒灰存性三錢共研末酒煎服此仙人尹蓬頭傳行經腹痛兼能種子真蘄艾紅花當歸益母草各三錢酒煎另用雞蛋一枚刺數孔入藥罐內同煮熟即以藥汁同雞蛋吃下不過三五枚痛止受胎子宮受冷久不生育及臍腹疼痛艾葉三錢蘇葉三錢黃酒煎服每日一劑數貼即效婦人胎冷陰寒數年不受孕者真蘄艾揀淨二兩雞子數枚連殼水數碗入瓦罐內煎至兩碗先剝雞子淡食即飲艾汁盡至半夜後雲雨無不受胎服此須經淨臨臥時服試驗多人真仙方也婦人子宮不開十餘年不懷孕者吳萸川椒各三合煉蜜丸如彈子大綿裹入陰戶中日再易之但覺子宮開即受孕者調經奇方當歸身酒洗香附末酒炒各制一錢五分白芍酒炒一錢大熟地一錢五分元胡醋炒陳皮丹皮酒炒各七分川芎茯苓各八分吳萸潑水泡去黑水去蒂梗酒炒二分經行先期三五日色紫者加條芩酒炒一錢五分經行過期色淡者加官桂五分炮黑姜五分艾葉醋炒五分引用生薑一片水一碗煎八分早空心服渣再煎臨臥服此藥俟經行日服起連用四劑到次月經再行時服服四劑往後對月可坐喜生育矣廣育方專治婦人經水不調赤白帶下各症當歸身酒洗四兩白芍酒炒一兩五錢川芎酒炒一兩五錢續斷鹽水炒五錢真阿膠蒲黃炒珠二兩大地黃酒煮乾四兩杜仲鹽水炒二兩丹參酒炒二兩黃耆蜜炙二兩五錢廣皮五錢元胡索酒炒一兩五錢香附米酒醋鹽水童便各制一兩共用四兩共研細末煉蜜為丸如梧子大每早服三錢開水送下經時加二錢婦人本經水為育嗣之期倘先期而至者色必紫須照前方改為煎劑原方一兩者改為一錢加黃芩八分姜二片空心服之重再煎臨臥服之如過期而至者色必淡加肉桂熟艾乾薑各五分亦用姜三片服照前法俟經盡而止仍服常藥又有未至而腹痛者則用丹參一兩曬乾研末每晨黃酒溫服二錢亦經盡而止此因婦有強弱之不同故加之以期速效女子經閉形容枯槁名麥冬丸杭州麥冬去心六斤熬成膏何首烏半斤黑豆拌九蒸九曬為末人乳浸不計遍數要曬約得一斤重大懷熟地四兩紅花五錢酒洗當歸四兩酒洗鹿茸五錢酥炙共末和勻入麥冬膏內再加煉蜜少許和丸如梧子大每服三錢漸加至五錢黃酒滾水下經閉乾血等症京都朝陽門王待郎傳雄雞一支煮熟去肉取全骨一副即嘴爪俱要不遺再用童便生薑汁陳釅醋各三盅將骨入砂鍋或置新瓦上微火焙炒陸續將三汁灑在骨上仍留汁一小半將骨打碎又用香附米一兩同骨再焙仍將三汁陸續灑在骨上焙之俟骨酥脆去香附不用將骨研成細末分作三服黃酒調下一服汗出三服經行神效之極月水不斷陳蓮房燒存性研末熱酒每服二錢赤白帝下烏龜拆肉將生酒煮熟生薑汁四兩又同煮空心酒送下呂祖鸞筆傳治癥瘕屢驗方朝天結成石榴無些微損傷者連枝蒂摘下一枝用新砂鍋一個新木杓一柄陳黑色釅醋十斤愈久愈妙陸續入鍋煮榴用杓底擦滾石榴令其皮爛俟醋完熬至黑色如膠榴渣化盡如膏起鍋再預以羊血凝定如塊者盛磁器中以金銀竹簪挑起一塊滴於血上即透至血底俱化為水足驗藥力如無羊血即豬血亦可驗令病者誠心叩首鳴謝祖師陸續用酒化血不拘多少服之滾水化服亦可按石榴體沉其口多下垂者朝天者極少此方神異取用石榴莫測其理癥瘕崩帶十二方生壯大黃切片一兩好陳醋浸曬各九次研極細末每服三錢好酒送下二三服即愈赤白帶下槿樹根皮二兩切以白酒一碗半煎一碗空心服白帶用紅酒甚妙又帶下臍腹疼痛名芍藥散白芍二兩乾薑炒五錢共為細末每服三錢空心溫米湯調下若肝經鬱結火盛者亦用當歸二錢黃芩五錢崩漏不止血下無度臭椿皮二錢枯芩一錢五分熟地一錢五分大生地七分川芎伏龍肝煨地榆各一錢南艾葉六分炒白芍八分當歸頭一錢五分水煎空心熱服又方雞冠花子白者治紅崩紅者治白崩各焙微枯研每服五錢黃酒送下又方仙人掌葉葉下黃灰不可去同仙人掌根煮酒一壺以三炷香為度白者入雞蛋一個於內紅者入臘肉一塊於內仍煮以三度香為度退火溫熱服酒白者食蛋紅者食肉其酒儘量飲之又方真紫栙香三錢為細末水二杯煎八分露半夜至雞鳴時熱服出汗即愈又方大薊根搗汁服之亦效崩漏不止年久虛憊百方少效投此神應七服即止真阿膠蛤粉炒成珠慎火草炙焦研各二兩棕毛燒存性龍骨煅牡蠣粉醋煅真蒲黃炒黑色烏梅肉焙焦各一兩共為末將阿膠用酒半杯化開和前藥為丸梧子大每服三錢空心酒送下癥瘕經閉乾漆一兩燒煙盡歸尾酒洗川芎軟柴胡三稜醋炒蒼朮炒青皮醋炒白朮土炒各一兩淨香附炒針砂醋製七次各四兩莪朮酒炒一兩五錢元胡索酒炒一兩五錢五靈脂酒煮二兩共末神麯打糊丸梧子大淡薑湯下午後服一錢臨臥服二錢以經通為度帶下白帶用白蜀葵花赤帶用紅蜀葵花黃酒煎空心下秘授帶下丸芡實粉二兩白茯苓二兩赤石脂煅牡蠣醋煅淬禹餘糧煅各一兩牛角腮炙黃一兩共末好醋一盞拌和前藥曬乾再搗末打糊為丸每服二錢女兒癆方松蘿茶五錢芝麻一合冰糖一兩羊角蔥三根共搗一處黃酒二盅溫服出汗忌風一二日女人臟燥之症好哭悲傷癲狂罵人如有鬼神平時女人好哭自己不知其故服之最效生甘草三兩小麥一升紅棗十枚水六升煮三升分三次服愈婦人癲狂歌唱不時逾牆上屋者乃營血迷心也當歸白芍炒遠志去心黃連各一錢白朮去蘆茯苓蘇木紅花半夏各八分柴胡神砂研末入藥各五分生地一錢二分甘草三分桃仁六個去皮尖共一劑加姜一片水二盅煎一盅服烏金丸治乾血癆及產後諸症東天麻一錢二分沒藥去油三錢百草霜三錢飛羅面三錢共末用上好香墨研水為丸每料均作四十九粒每服一丸酒下又方用大蝙蝠一個瓦上焙乾研末用黑牛尿一碗頓熱調和空心或用黃酒服一錢亦可陰道寬大兔屎五錢乾漆五錢鼠頭骨二個雞肝二個陰乾共末蜜丸如小豆大每納一丸入戶五十日如常婦人久積虛寒小便白濁滑數不禁鹿角屑炒黃為末每服二錢溫酒空心下婦人被妖迷或與鬼交以鹿角屑水調服之男婦被狐迷以桐油私搽在陰戶男搽玉莖狐舔之必吐不再來勿令人知破郁丹治婦人噯氣胸緊連十餘聲不盡暖出心頭稍寬不噯即緊逼香附醋炙四兩梔仁四兩炒黃連薑汁炒二兩莪朮青皮瓜蔞仁檳榔蘇子各一兩共末水丸梧子大每服三十丸食後滾水下婦人月內眼患黃連為末水調搽足心又方以薑汁調白礬末搽足心又方以天南星四分大黃六分用醋調勻左眼痛塗右足心右眼痛塗左足心以口中有藥氣為妙石女無陰戶以鉛作圓條隨陰戶大小易之晝夜插入陰戶自寬婦人陰中腫痛艾叫五兩防風三兩大戟一兩水煎熱洗避風冷日以鯽魚膽搽入妙生門出黃臭水甚痛難忍將棉繭二三錢燒存性為末酒調鴨毛搽上其毒自出生門硬如石撞青魚膽或鯽魚膽七個用絲棉二三錢燒存性為末同膽調鴨毛搽上即止婦人兒枕骨疼及血崩以鱉甲燒存性為末酒服婦人茄病硫黃五分海螵蛸二錢共末鴨蛋清調搽七制香附丸治婦人經脈不調諸虛勞損一切等症取效極速香附米十四兩分作七分酒浸醋浸鹽水浸童便浸小茴二兩熬水浸益智仁二兩熬水浸萊菔子二兩熬水浸凡浸此藥春秋之時浸三日夏浸一日冬浸七日炒乾另用艾葉四兩無灰酒煮乾為度制香附七兩歸身酒洗熟地薑汁焙生地薑汁焙白芍酒炒各四兩益母草四兩撫芎三兩人參一兩白朮土炒茯苓棗仁炒山茱肉酒蒸陳皮阿膠炒艾葉各二兩天冬二兩九錢條芩酒炒二兩五錢砂仁炒一兩五錢元胡醋炒一兩五錢炙草九錢共為細末神麯四兩酒煮神麯糊丸梧子大每早晚服五十丸共一百丸婦人良方凡人諸病好治惟孕婦生產安危在旦夕之間來生有未生之難已生有已生之難余採得有張孟深先生所立救苦良方胎前產後之達生湯化生湯一在懷胎至於九月之後連服數劑及生如羊子之易一在生時臨產之後未食之先連服一二劑無昏痛之患藥資無幾如法制備一覓便得濟急良方達生湯未產時服當歸酒洗一錢五分川芎酒妙六分益母草忌鐵器一錢車前子炒研五分甘草五分冬葵子炒研一錢白朮米泔水浸炒一錢大腹皮滾水洗數次四分牛膝酒浸一宿六分枳殼麩炒五分木香另磨三分生薑一片水煎食遠服如腹痛加白芷沉香各五分生化湯產下即服全當歸酒洗八錢真川芎三錢姜灰五分夏時用四分甘草炙三分桃仁十粒去皮尖研孕將臨月照方預備二三劑俟一痛即用水二盅先煎一劑渣另貯再煎一劑其渣同前渣並煎其汁三盅和一處頓熱加黃酒六七匙於一產後未進飲食之前即行服下逐瘀生新永免產症或三兩日內精神疲倦或腹中作痛再連服二三劑即愈更治產後一切危症無不立安產後諸症總以生化湯為君余則不過隨症加減而已如惡露已行腹痛已止減去桃仁再多服數劑不妨如口渴加麥冬花粉寒痛加肉桂砂仁傷肉食加山楂傷飯食加麥芽傷果品加麵裹煨熟草果數分傷酸梅加吳茱萸三五分傷菱肉加生龜板傷梨及西瓜加肉桂之類如本原虛者少服無憂散治妊娠身居富貴口饜甘肥憂喜不常食物不節既飽便臥致令胞胎肥厚根蒂堅固行動艱難致臨產難生八月可服無憂則易生矣當歸川芎白芍枳殼乳香木香甘草血餘即發灰以豬心血和之各一錢五分上為末每服二錢水煎日進三服萬應救急產難方當歸酒洗川芎兔絲子各一錢五分川貝母一錢去心此味煎好和入生黃耆八分川羌活甘草各五分枳殼麵炒六分白芍炒一錢二分冬月酒炒一錢荊芥穗八分蘄艾醋炒七分厚朴薑汁炒七分水二盅姜三片煎八分凡婦人受孕二三月者不論有病無病每月可服二三劑臨月服五七劑臨產服二三劑同煎代茶不時飲之自然平安易產諸病不生倘素日不知此方一日忽有血暈陰脫胎滑小產者服之即安又有橫生倒產五日不下或嬰孩死於腹中者切忌穩婆用手只以此藥服之即下凡一切產難命在呼吸者服之立應此係異人所傳神效無比予家中用之多年真至寶也仁人君子廣布流傳功德匪淺此實仙授之方婦科各書無不備錄藥味分兩庸醫切勿妄為加減胎動硃砂研末一錢和雞子白三枚攪勻頓服胎死即下未死即安胎上衝心葡萄煎湯飲困觸傷胎腹痛或因高墜跌或被打傷致傷胎孕用宿砂仁不拘多少以熨斗盛令慢火煨熱透去殼用仁搗碎為末每服二錢用熱調下覺動處熱則安胎此方產母虛寒者服之即效倘產母陰虛火盛者砂仁恐更助火胎愈不安當用後條千金保胎丸楊氏效方治月數不足子死腹中母欲悶絕胞衣不下用黑豆三合醋水各半濃煎一氣頓服立效難產生產第一要忍痛不可著急要知瓜熟蒂落自然之理桃仁一個劈開將一片寫一可字一片寫一出字吞之即生難產海上方用山查子四十九粒百草霜為衣酒吞下易生柘樹枝葉二三兩煎濃湯沖無灰酒吃一二碗即生又方婦人有孕臨產之月取海馬帶之於身甚驗臨產時燒末飲服並手握之甚效南州異物志云海馬大小如守宮其色黃褐婦人難產割裂而出者手持此蟲即如羊之易產也橫生益母草六兩酒煎濃汁和童便一大杯飲之又方灶中心鍋底土細研每服一錢酒調下仍搽母臍中胎死並橫生逆養淨麝香五分研末酒送下盤腸生未產腸先盤出急將盆盛溫水寒天則熱水少入香油養潤待兒並胎衣下時母略仰臥自己吸氣上升穩母香油塗手徐徐送入又方腸出盛潔淨器濃煎黃耆湯浸之腸即上又方以半夏末搐鼻中腸自上催生方治產難即胞破水乾不能產者亦能催小磨麻油黃酒滾白湯各一盅合一器加六一散三錢攪勻一氣頓飲其產立下加味芎歸湯川芎五錢當歸一兩效龜板一個酥炙婦人發一握如雞蛋大兩團煅存性產婦自發亦可共為細末每服五七錢水煎服人行五里許交骨自開如無自死敗龜即灼過龜板亦可此方神異凡人家有少婦葉喜及女老始嫁受孕後須預製此方毋致臨期害事胞衣不下以水入醋少許噴面立效胞破不生並治子死腹中鬼臼又名久臼不拘多少黃毛者去毛為細末不用籮篩取末只用手捻慢捻之成粉為度每服一錢無灰酒一盞同入煎八分服之子死腹中巴豆蓖麻子麝香各等分研作餅貼臍上又方用芒硝二錢童便溫調服立下此方功效甚奇不可忽視化胎救母仙方專治生產不下子死腹中者燈草半斤燒灰聽用用羊角一個內去空如筒裝燈草灰在內以羊角對陰門將灰催入其腹胎化為水下身弱者用燈草灰二兩五錢身壯者四兩此方救母損子勿妄用產下子腸帶出切不可剪致傷母命枳殼煎湯熏洗即收產後陰道不閉或陰脫出者礦石灰一斗熬黃以水二斗投之澄清熏之產後陰戶燥熱遂成翻花澤蘭四兩煎湯熏洗二三次再入枯礬洗之產後小便不通陳皮一兩去白為末空心溫服二錢產後暈迷不省人事急以炭火燒紅醋沃熏氣入鼻即醒又方以五靈脂不拘多少炒研末用秤錘放火內燒紅將酒衝下名雷公酒和靈脂末熱服即省產後口渴以煉過蜜不拘多少熱水和服產未滿月行房腹內脹痛荔枝四兩連殼核同搗爛用好酒一升煎一碗熱服之袴襠湯治男女房事受病男人受寒未愈之時陰毒在內嘗有行房而女人受病其症似傷寒而非傷寒不治則死詢得真情即用男人齷齪袴襠剪下一大塊煎湯服立愈如男受病反是方治之得男方經期一到即取棉花子半茶杯微炒黃色搗碎熱黃酒沖儘量飲之俟經回之後即同房交媾葉孕房行後須令婦人左邊睡束胎丸懷妊七八個月服之黃芩炒夏一兩春秋七錢五分冬五錢白朮二兩茯苓七錢陳皮三兩忌火共末粥丸梧子大每服三四十丸白湯下佛手散當歸五錢川芎三錢水七分酒三分同煎七分如橫生倒產子死腹中加黑馬豆料一合炒焦乘熱入水中加童便一半煎服少刻再服此方極應極速治六七個月後因事跌磕傷胎或子死腹中疼痛不已口禁昏悶或心腹飽脹血上衝心者服之生胎即安死胎即下又治橫生倒產及產後腹痛發熱頭疼逐敗血生新血並治諸疾大有奇效妊娠傷寒發熱護胎不傷方井底泥青黛伏龍肝即灶心土各等分為末攪勻塗於孕婦臍中二寸闊如干再塗可以保不傷胎孕婦癃閉淚滴赤色小茴香陰陽瓦焙存性研末每服三錢黃酒沖服難產簡便方紅莧菜同馬齒莧煮熟食之即生又方以臘月兔皮毛燒灰酒服亦可橫生難產子母雙全即時止痛順生全龜板一具去兩邊弦飛弦用火炙以陳醋在板上掃炙十數次以板酥為度研細末每服三錢熱黃酒沖服又方取蠮螉窠即細腰土蜂窩水泡湯飲之取時逢單是男逢雙是女最驗又方或臨產三四日不下者密將本婦陰毛剪下一半燒灰沖酒本夫手授與婦人飲下即生切勿與婦知之屢驗又催生方於潔淨空室用紙書本府本州本縣官姓名燈上燒灰水調服下即生神奇之至屢試屢驗逆產釜臍煤以中指取下交劃兒足下即順胎農不下雞蛋清二個去黃以好醋一盅和之吸入口沖即下又方將本婦之褲覆井上即下又方牛膝三兩葵子五錢水煎服又方用蟬蛻一兩瓦上焙乾為末清沸湯下一刻即下豬肝蜜酒法治婦人胞水早行胎澀不下豬肝一具白蜜四兩醇酒一升共煎至半升分作二三服不能服酒者隨其多少緩緩服之子死腹中不出用黑豆三升醋煮濃汁頓服即出又方以黃牛糞敷母臍即出千金保胎丸白朮土炒熟地杜仲各四兩俱薑汁炒當歸續斷均酒炒阿膠蛤粉炒香附四制益母草黃芩各二兩炒陳皮川芎艾葉各一兩砂仁五錢炒共末棗肉丸空心服二錢胎動方真阿膠鵓鴿糞各三錢同炒末白沸水送下即安濟生湯治難產俟腰痛即服易產如三日不生服此自然轉動生下枳殼麵炒香附炒大腹皮薑汁洗炒各一錢甘草炙七分當歸二錢五分酒炒川芎二錢蘇葉八分水煎空心服又難產經驗生半夏白蘞各等分為末每遇難產之婦用此藥末一錢無灰酒送下不論橫生倒產胎衣不下用一服或二服無不下矣神方極驗產寶散伏龍肝即灶心土三錢如子死腹中母命危急用無根水煎湯調服即下其土當兒頭上戴出或胎衣不下用此藥一兩研末以陳醋調勻納臍中再用甘草湯三四合服之立出催生開骨秘方用孫骨即猴骨火炕研末酒沖服三五錢立下婦人難產芒硝末二錢童便一大杯溫服即下加味地黃丸治婦人經水不調不能受孕亦不全安宜常服此方熟地四兩棗皮山藥各二兩丹皮白苓各一兩五錢澤瀉一兩香附一兩童便浸三次共末煉蜜丸如梧子大白沸湯下三錢孕婦腹痛砂仁二兩條芩酒炒一兩五錢白朮土炒一兩共末服三錢紫蘇湯下孕婦咳嗽方此方氣血虛弱者不可服用川貝母去心麩炒黃去麩為末沙糖成丸如芡實子大口中含化一丸極效治小產方絲棉一兩入磁罐封口燒灰存性熱酒空心沖服須於月內服完永不再墜孕婦痢疾妙方荷葉蒂七個燒灰存性研末酒下胎死腹中只宜佛手散服之自下或不下再用平胃散一服加朴硝二三錢無不下矣古人創方各有妙蘊且屢經驗非虛誣也切勿聽庸醫用奇方怪藥以傷母命佛手散當歸一兩川芎七錢水七分酒三分同煎七分如死胎加黑馬料豆一合炒焦乘熱淬入藥水中再加童便半杯和服少刻再服平胃散蒼朮米泔炒川樸薑汁炒陳皮去白各三錢甘草炒一錢二分水煎溫服如法加朴硝死胎下血疼痛搶心者用蔥白煮濃汁飲之末死即安已死即下兩服見效胞衣不下或問胞衣不下何故曰總是臨盆太早之故當產之時骨節開張壯者數日而合怯者彌月方合今不待其開而強出之故胎出而骨眼隨閉以致胞出不及耳急用產婦自己頭髮放口中打一噁心即下又方用灶腳下泥敷臍內將甘草一味煎湯服之即下又方用蓖麻子四十九粒或照依產婦年紀用粒數亦可去殼研塗兩腳心衣胞即下立時洗去若遲洗腸亦隨出倘腸出可即將藥急貼頂心縮回其腸俟腸入乃洗去神效大全方曰婦人懷孕有七八個月生者有一年二年及三四年而後生者不可不知總宜隨時保安為妙當歸散婦人懷孕宜常服之臨盆宜產且無諸疾當歸川芎白芍黃芩各半斤白朮四兩共末溫酒調服三四錢安胎飲黃耆蜜炙杜仲薑汁炒茯苓阿膠珠各一錢續斷八分黃芩一錢五分白朮生用五分甘草三分糯米百粒用陳酒三杯水二杯煎服如腹痛用急火煎服胸中脹滿加紫蘇陳皮各八分見紅加艾葉地榆各一錢阿膠加倍安胎銀苧酒治孕婦胎動欲墜腹痛不可忍及漏胎下血苧根二兩如無苧根之處用茅草根五兩紋銀三五兩用陳酒水一碗同銀煎熱服紫酒治孕婦腰痛如折黑馬料豆三合炒焦熟白酒一大碗煎至七分空心服鯉魚湯孕婦五六個月腹大異常高過心胸者乃胎中蓄水如不治子母難保此方主之當歸酒洗一錢五分白芍一錢五分茯苓二錢白朮炒二錢五分陳皮三分用鯉魚一尾重半斤之上去腸肚雜白水煮熟去魚留汁二盞加姜三片同藥慢火煎至一盞空心服如不愈再服胎衝上心危急方白朮五錢條芩二錢白芍二錢枳殼一錢水煎服如人壯健單用枳殼五錢煎服亦可止啼湯治妊娠兒在腹中啼黃連二錢甘草一錢水煎服立愈阿膠丸治娠好婦大便閉結不通枳殼麩炒阿膠蛤粉炒各等分為末蜜丸如梧子大用六一散為衣清湯下二十丸未通加五十丸胎前產後下痢方用敗龜甲以米醋炙為末調服自愈婦人月經太過以甜瓜子研細壓去油水調服即止西瓜子亦可產後渴生此乃血渴也取蓮子心研末米飲服二錢立愈產後諸疾血運心悶煩熱厭厭氣絕欲危心頭硬乍寒乍熱諸症續斷皮一握水三碗煎二碗分三服加人行一里再服無所息此藥能救產後垂死子母秘錄產後二三日瘀血積於子腸小腹一塊疼痛俗名兒枕痛南山楂肉一兩水煎一盅加沙糖五錢入好酒一二杯食前服催下敗血即安產後惡露不行心疼腹痛如瘀血去多元氣虛損宜服四君子湯加川芎當歸炮姜等味真蒲黃一錢五靈脂一錢五分煎濃醋調服華佗愈風散治婦人產後中風口噤手足抽掣及角弓反張或產後血暈不省人事四肢強直或心頭倒築吐瀉危急荊芥穗除根不用焙乾研末每服三錢童便調服口噤則挑牙灌之齒噤則不研末只將荊芥以童便煎對微溫入鼻中亦效又方或以黑豆炒焦淬酒調荊芥末服應效更神回生保命黑龍丹此方治產後瘀血沁人心脾命在垂危百藥不效者此方神驗五靈脂淨二兩全當歸二兩大生地川芎良薑各三兩以上五味入砂罐內紙筋鹽泥封固煅紅冷取研細末再入後藥百草霜二錢乳香生硫黃真血珀花蕊石各二錢以上五味同前藥和勻米醋煮麵和丸如彈子大每服一丸炭火煅丸通紅用生薑汁浸碎以陳酒童便調服不過二丸見效產後壯熱頭疼頰赤口乾唇焦煩渴昏悶松花蒲黃川芎當歸石膏等分為末每服二錢水二合紅花二捻同煎七分細呷乳岩此病先因乳中一粒如豆大漸漸大如雞蛋七八年後方破破則難治宜急服此藥生蟹殼鍋內焙焦要用砂鍋佳為末每服二錢酒調下日日服之不可間斷又方用瓜蔞一個半生半炒酒二杯煎一杯食後服乳岩已破荷葉蒂七個燒灰存性研末酒下又方川貝母核桃隔金銀花連翹各三錢酒水煎服乳癰良方兼治各種大毒大當歸八錢二分生黃耆五錢金銀花五錢炙甘草一錢八分桔梗一錢五分黃酒二碗煎八分半飽半飢服乳腫吹乳者乃產後孩子吃奶含乳睡著為孩子口氣所吹遂致乳汁不通蓄積腫硬而成癰蒲公英澤蘭葉金銀花白芷生甘草木瓜各三錢共末每服二錢水酒各一盅煎服出汗即消又方鮮蒲公英連根打爛取汁沖酒服以渣敷患處即效如無鮮者以乾者酒煎乳癤亦效又方香附末一兩麝香三分研和蒲公英三兩酒煎服渣敷患處又方生山藥搗爛敷上即消消後速去之遲則肉腐又方鹿角尖燒灰存性研末灑調服外用蔥白搗爛敷乳岩已破方當歸川芎白芍酒炒白朮土炒茯苓陳皮法半夏砂仁炒香附炒川芎薑汁炒各一錢甘草三分生薑引煎服產後中風危急屢驗方密雲縣生元山楊醫傳黑豆一茶盅連須蔥五六根先將黑豆焙至有煙時再入黃酒一盅水一盅半共煎至一盅服出汗即愈寶之寶之救人莫大陰德產後血氣疼痛元胡索一兩為末炒香清酒一斤淬入溫服苦能降氣辛能散血淬之以酒則達乎經脈也又方以荷葉炒香為末每服錢許童便調下或沸湯亦可又方取鯉魚鱗燒灰酒服效此灰能行滯血極應產後危急血暈惡露攻心將死方元胡血竭真沒藥制淨歸身各等分醋水各半煎服立愈又方韭菜不拘多少切入瓶中沃以熱醋令瓶嘴對鼻中即醒如無韭菜時用荊芥穗三錢炒黑研末童便送下產後小便不止厚肉桂一兩丁香三錢為末酒調作餅放臍上即止產後大便不通及老人諸虛人風秘不通難行導藥者服此最妙最穩效若影響蘇子胡麻各半合研細用水再研取汁一碗煮熟食下結糞漸得通利極驗乳汁不通用木通三個豬前蹄一個煮爛並汁食之即通又方鯉魚頭一個燒末每服一錢酒送下又方用紅砂糖煎豆腐不用油鹽以黃酒共食之乳少黑芝麻炒研入鹽少許食之又方用牛乳一兩洋糖三錢米粉三合共調勻每日清晨白滾湯送下乳結蓮蓬稈一把或荷葉稈亦可煎湯熏洗數次即散乳毒蒲公英金銀花各等分水同酒煎服乳癰小蜘蛛七個裝入蔥管內兩頭用線扎住勿令病人知之令病人口嚼爛將線吐出用滾黃酒送下立見消愈又方如尚未成形者用生蘿蔔連根帶泥搗爛敷上熱即更換一二次即愈又方以糯米飯塗之立愈瓜蔞散專治一切乳病吹癰瘰塊一服見效連翹防風花粉白芍石膏炒燈草各一錢威靈仙青皮各一錢五分蒲公英漏蘆各二錢白芷銀花各二錢瓜蔞一個搗爛竹葉三片用水三茶杯煎一杯溫服二三劑愈乳結腫痛寒熱交作噁心嘔吐蔥白切碎炒熱搗爛敷乳上以帛包之冷則易自愈乳如結核腫痛難忍者用廣陳皮浸去白曬乾麵炒微黃色共研末入麝香少許再研每服二錢熱酒調下揉之即散又方用鯽魚一尾燒灰酒服一二錢汗出即愈乳癰初起芙蓉根切片以無灰酒煎服儘量飲可內消又方金墨豬膽元參三味和勻搽上立效止乳方婦人子殤而乳不收恐生乳病者用麥芽一兩水煎溫服即收脫骨湯女人扎足方閨閣事宜杏仁一錢桑白皮四錢用水五碗新瓶煎三碗入朴硝五錢乳香一錢封口煎化置足於上先熏後洗三日一作十餘次後軟若束綿也胎前產後簡便杜壬方逆生橫生瘦胎產前產後虛損月候不調崩中等症百草霜白芷各等分為末每服二錢童子小便醋各少許調勻熱湯化服不過二服雞爪風婦人月家得此不時發手足拘攣拳曲如雞爪頗疼痛急於左右膝骨兩旁有一小窩共四穴俗謂鬼眼各灸三壯立愈產後腹痛以苧麻根槌細安腹上即止血運以苧根令產婦枕之能止蓋苧根大能補陰而行滯血其性又能破血產後諸病凡產後穢汙不盡腹滿血運心頭硬或寒熱不禁或心悶手足煩熱氣力欲絕諸病並用延胡索炒研酒服二錢甚效婦人五心發熱李時珍方水仙花乾荷葉赤芍各等分為末白湯調服二錢熱自退也妊娠水腫始自兩足漸至喘悶似水足趾出水謂之子氣乃婦人素有風氣或衝任有血風不可作水妄投湯藥宜天仙藤散主之天仙藤洗微炒香附子炒陳皮甘草烏藥各等分為末每服三錢水一大盞姜三片木瓜三片紫蘇三葉煎至七分空心服一日三服小便利氣脈通腫漸消不須多服此乃名醫陳景初秘方也產後腹痛及一切血氣痛方天仙藤五兩炒焦為末以生薑汁童便和酒調服種子丸原傳此方系四川成都府瞿照磨時年七十二歲無子至京遇戶部郎中周時富二人相敘同庚因傳此方對瞿妻年已七十歲身如彎弓形容槁枯服之面如童顏經水復開一交成孕連生三子奇罕已極又有瞿鄰張寡婦陳氏年已六十二歲不信此藥之靈云及我服之當何如乃服後亦面如童顏隨及有孕此更奇矣寡婦無陽胎墜無骨又有儲學仕妻趙氏年四十五歲服此藥即生四子神化莫測真妙方也此藥添精神兼治五勞七傷效難盡述照此方服之無不應驗今傳此方系前任江西贛州府景太守面傳撫中軍德總爺服之面如少年亦連生三子如此應驗豈不為廣嗣之仙方哉牡蠣二兩畢澄茄一兩酒浸蒸當歸二兩車前子二兩故脂一兩五錢木通二兩金全蠍一兩五錢龍骨一兩五錢巴戟二兩乾漆二兩沉香二兩肉蓯蓉一兩五錢木香五錢大茴二兩蜘蛛七個每個另包炕研母丁香二兩萆薢二兩燈草一錢馬蘭花二兩陰乾兔絲子一兩遠志二兩茱萸肉一兩五錢蛇床子一兩五錢大熟地一兩威靈仙二兩白雲苓一兩五錢桑螵蛸一兩五錢共二十七味研細煉蜜為丸綠豆大每服三十丸臨臥時男女同服溫水酒送下十日見效興陽種子真奇方也倘服後陽舉不衰漱服冷水三口即解此方予遇相好傳來未知實有此驗否今備錄之以待試驗也小兒門濟嬰丸小引永豐早春胡梅原夫嬰孩出生運行之氣末健流通之氣尚微腹中稍有胎惡胎滯未行勢必阻遏氣道遂至胸腹作脹或見大小便不通或腹痛夜啼或氣逆嘔吐甚則或溢人諸絡而為胎癇或逼上胸胃牙腮而為鵝口馬牙撮口臍風等症皆胎氣不行為病也又諸書俱言兒出胎時乘其啼聲未發急以指拭其口內令惡血淨盡不使下咽即無他病此法百中不能行其一二而世之穩婆伶俐便捷者未易多見若委之粗蠢之婦誠恐別有妨誤旦嬰孩初生必先咽而後眼開聲出在此一閃之頃欲拭其口中含惡本難為力帷在洗包嬰兒後一二刻許即將濟嬰丸研服八九丸化消腸胃滯氣穢物可保無虞矣濟嬰丸又名急救臍風丸巴豆去殼取白仁再外去白膜內去心葉一錢六分研如泥紙包壓去油取霜八分真北防風二錢羌活一錢五分殭蠶二錢微炒揀直者洗淨皂角刺揀尖者二錢明雄黃七分山甲鱗土炒成珠一錢五分三稜醋煮一錢五分莪朮醋煮一錢五分薄荷葉一錢甘草三分共研極細末濃煎陳枳殼湯煮蕎麥粉成糊作丸如芥子大每服三五丸症重者七九丸開水研服以大便行為度不行再服此丸能治嬰兒撮口臍風牙關緊閉不能吮乳即宜服此丸服後二三刻大便一解即愈如大便不解宜再服服至吮乳如常則每日服二三丸服至七日不致再發若至頭上發熱面上或鼻上發黃之重症只要藥能下咽服藥後大便有解亦可救又治鵝口馬牙腮腫荷包口腹脹腸鳴夜啼胎癇驚風等症服法同前又嬰孩初生未吃乳之先用此丸開口滾水化服八九丸俟解盡胎糞方與乳吃然後七日內每日服二三丸永免以上諸病出疹痘亦稀此丸須收藏嚴密不可令黴黴則無力又陳至一年者亦少效又黴過者可以治痢小兒二三丸大人五七丸服二次無論紅白俱茶吞噤口痢桑葉湯吞凡鵝口馬牙服丸藥後用指甲或新青布刮去牙齦上白胎用硼砂散頻擦之如白胎厚硬用線扎針頭向胎上蜜刺之令血出盡亦用硼砂散或立效散頻搽硼砂散治小兒口內諸病硼砂二錢熟石膏一錢青黛三分共研末頻搽立效散治小兒走馬牙疳牙齦口唇糜爛及鵝口馬牙等症枯白礬一錢馬牙硝一錢硃砂三分飛過共研末頻搽如口唇乾爛用麻油調搽小兒一二歲時在夏秋六七月間患肚腹緊脹泄瀉潮熱口渴或嘔吐或喜覆面睡幼科名為三氣症重者謂之暑風驚此脾胃停滯之病也或因食生冷油膩或飲食後當風睡臥或在母懷食乳對兒搖扇招風乳飽即行睡著皆能令脾胃停滯治者不察始則退熱止瀉繼則去風化痰未嘗有效余每遇此症只見其肚腹緊脹遂用濟嬰丸二三粒置羔餅內或粥飯內與服日服二次症重者服三次每次服三粒為止兒小症輕每次只服二粒或一粒以愈為度其有熱渴末即除者兼服銀柴胡麥冬乾葛澤瀉鉤藤甘草燈心每味三四分二三劑自愈熱盛者加桑葉三皮竹茹一二分無不奏效屢經應驗因敢流傳青丸五色丸極驗海上方川羌活薑汁拌炒白粉葛炒薄荷葉膽南星炒花檳榔炒廣陳皮炒各五錢川厚朴薑汁拌炒焦陳枳殼麥麩拌炒吳神麯炒各三錢五分真川芎炒炙甘草各一錢五分胡黃連蒸二錢五分共為極細末煉蜜為丸或蜜水迭丸亦可每克重約三分青黛為衣每服一二丸諒兒大小及病之輕重用之此丸治小兒百病外受風寒內停飲食或惡寒發熱或腹痛泄瀉或胸緊氣急或痰鳴咳嗽或呃逆吐嘔或煩燥口渴或角弓反張或四肢逆冷及瘧痢等症悉皆應驗嘔吐藿香梗煨薑湯研服惡寒無汗蘇葉生薑湯下傷食山楂麥芽湯下余用姜皮燈心湯服如吐瀉甚少便短小與白丸同服白丸茅蒼朮出茅山者佳漂炒川厚朴薑汁拌炒焦陳皮炒白粉葛炒各一錢五分化滑石飛過三錢於白朮米泔浸再炒二錢炙甘草五分丸法同前化滑石為衣湯飲亦同前此丸治小兒霍亂症小瀉大瀉小便短少或嘔吐或口渴如有寒熱與青丸同服如大人霍亂吐瀉每服四五丸紅丸防風炒膽南星炒明天麻醋拌炒桔梗蜜炙前胡炒茯苓炒川羌活薑汁拌炒茯神去木炒各二錢五分天冬玄參生地麥冬去心各二錢五分四味俱飯上蒸透搗如泥銀柴胡五錢蒸丸法同前飛過硃砂五分為衣再上赤金箔一字大每服一二丸姜皮燈心湯研服此丸治小兒發熱咳嗽面赤唇紅煩燥口渴或熱多寒少或四肢逆冷或泄瀉乾嘔或痰喘驚搐等症為暑天退熱止渴要藥丸初病發熱泄瀉口渴宜先服青丸一二次如熱渴不除再服此丸黃丸又名金丸天麻煨五分白附五分姜拌炒全蠍五分洗淨焙乾雄黃飛過一分天竺黃一分若無真的用竹瀝一匙薑汁少許代之殭蠶洗炒五分川黃連薑汁拌炒五分白礬生熟各一分五釐青礞石打碎同火硝均分罐內火煅如金色研末飛過一分共研極細末用制過大黃末煎成膏作丸每丸重一分金箔為衣每服一丸薄荷湯研服其餘隨症用引此丸制小兒大熱發搐痰鳴喘促危急之症如痰涎壅塞喉間服下此丸立刻可開黑丸又名太真丸治症同前為病較前症稍輕緩者及久熱痰喘等症製大黃酒拌久蒸曬一錢二分琥珀六分制礞石六分天竺黃六分如無照前代硃砂飛過六分天麻炒一錢白附薑汁拌炒一錢茯苓炒一錢茯神炒一錢殭蠶洗炒六分天冬麥冬去心二味均搗如泥膽南星炒一錢製半夏一錢共研極細末煉蜜作丸每丸約重二分每服一丸或用薄荷或薑湯或陳皮湯研服以上五方系胡梅先生客徽婺時抄於董採章先生家傳自方村明季方公諱升巡按福建得之海上者又按此五方治風寒食滯熱痰實症果有殊功乃小兒常有之病亦幼幼者宜常修合應用之藥至於面青唇白聲低息短倦臥惡光少食懶言或久熱神昏或久嘔久瀉之症則有用異成散附子理中湯或筒瀉不止則有用丁桂訶蔻理中丸之類不可不察也壽春丸銀柴胡蒸五錢陳皮炒三錢殭蠶洗淨三錢膽南星炒五錢川羌活薑汁拌炒四錢天麻炒三錢雲苓炒四錢桔梗蜜炒四錢獨活薑汁拌炒三錢法半夏四錢炒甘草二錢前胡四錢炒全蠍洗焙三錢川厚朴薑汁拌炒焦四錢白枯礬二錢川芎四錢麻黃二錢去根節炒枳殼麥麩拌炒三錢白附四錢拌薑汁炒共為極細末吳神麯打糊作丸每丸約重三分飛過硃砂為衣此丸治小兒百病外感風寒內傷飲食惡寒發熱腹痛泄瀉胸緊氣急痰鳴咳嗽嘔吐惡食角弓反張四肢逆冷等症為冬春二季初病要藥夏秋則用青丸其餘病症照前五方主治肥兒丸雲苓炒鉤藤忌火山楂去核醋炒白朮土炒廣木香忌火檳榔炒龍膽草炒使君肉炒去衣蘆薈用新燈盞盛再用燈盞合黃泥包裹火煅煙盡為度各五錢吳曲醋炒川黃連炒甘草蕪荑仁川楝肉去核醋炒各三錢共研極細末用麥芽五錢煎水煮早米粉為糊作丸如芥子大日服二次每次服二三分諒兒大小加減或置粥內或蒸餅內或藕粉內與服俱可有泄瀉者忌服此丸治小兒黃瘐飲食減少或病後肌肉不豐服彌月即壯健治痞積蟲肚百發百中延生第一方鎮江錢醫官傳小兒初生臍帶脫落後取置新瓦上用炭火燒至四周煙將盡放土地上用瓦盞之類蓋之存性研為末預將硃砂透明者為極細末水飛過如臍帶有五分重用硃砂二分五釐同研以生地黃當歸身煎濃汁一二蜆殼調和前二味末抹搽兒上齶間及乳母乳頭上一日之內晚至盡小兒服之次日遺下穢汙濁垢之物終身永無瘡疹諸疾生一子得一子十分妙法也神功消毒保嬰丹纏豆藤即黃藤也一兩五錢七八月間收取毛豆梗上纏繞細紅黃絲者是採取陰乾此藥為主妙在此藥黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢五分荊芥五錢防風五錢生地一兩獨活五錢甘草五錢當歸酒洗五錢赤芍藥五錢川黃連五錢連翹七錢五分桔梗五錢牛蒡子紙炒過一兩辰砂水飛另研一兩苦絲瓜長五寸隔年經霜者更妙可燒灰存性二個上各為極細末和勻淨砂糖拌勻成丸如李核大每服一丸濃煎甘草湯化下其前項之藥須照味預辨精料選春分秋分或正月十五日七月十五日修合務在虔誠忌婦人雞貓犬見合時向太陽祝藥曰神仙真藥體合自然嬰兒吞服天地齊年吾奉太上老君急急如律令敕一氣誦七遍此丸凡小兒未出痘瘡者每遇交春分秋分時服一丸其痘毒漸能消化必保無虞此方神秘本不欲輕傳但慈幼之心自不能已願與四方君子共之此方並治初生小兒口內及牙齦生白點名馬牙不能食乳此與鵝口不同少緩即不能救多致夭殄急用針縛筋上將白點挑破出血好以上京墨磨薄荷湯以手指碾母油發蘸墨遍口內擦之勿令食乳待睡一時醒方以乳再擦之即愈五福化毒丹生地黃硼砂各五兩天門冬麥冬各二兩元參三兩甘草一兩青黛五錢共研細末煉蜜成丸如雞子大每服半丸燈心湯化下此丸治小兒驚熱一切胎毒口舌生瘡腫脹木舌重舌牙齦腫痛金蟾丹治小兒諸驚風等症珍珠三分牛膽南星三錢全蠍去頭足一錢殭蠶炒一錢五分辰砂為衣八分蟾酥一分金銀箔一分木香七分檳榔一錢黑牽牛五分甘草一錢豆粉一錢共研末涼水搗為丸如圓眼大金銀箔為衣每服一丸薑湯下預解痘毒奇方當歸六兩川芎六兩升麻六兩甘草六兩上銼研末不必太研過細於臘月初八日取東流水七大碗煎至三大碗去渣選上上明硃砂四兩入絹袋內用線拴緊又用砂鍋一口將砂袋懸安定約離鍋底一指將前藥水旋添煮之火不可過烈必用桑柴為佳至半日汁盡為度即取硃砂子鍋內焙乾為細末引經方用糯米半升淘淨取黃土和鹽包糯米為團入火內煅之其土色通紅取出冷定劈開選米粒黃色有性者方用亦為細末服藥法凡小兒一歲足用硃砂一分米末一分蜜一匙酒三匙米湯半酒盅調勻二末徐徐喂服片時見效照年歲加減不可錯用凡合藥時須焚香沐浴淨室吉日勿令五牲陰雜人等見聞此方出自梁府施之數世其效如神未出者服之不出已現苗者服之出亦稀少陷沒者立刻服起神授預稀痘疹銀花陰乾金者不用飯鍋粑每一升入銀花一兩共研末用洋糖或做糕餅以開水調和每日令小兒食之又每年臘月清晨摘帶露綠萼梅蕊一百加上白洋糖搗成小餅令食之又方除夕黃昏時取大烏魚一尾小者一二尾煮湯洗浴幾遍身七竅俱到能免出痘不可嫌腥如不信或留一手或留一足不洗遇出疹痘時不洗處痘必多此乃異人所傳不可輕視寶之又小兒初生用老絲瓜煎濃湯浴之生兒三日謂之洗三但冬寒之日不宜洗恐有風寒入臍慎之痘初出片紅色不分界限以紅紙燃蘸油點火照之則分界出經驗稀痘神方此方系名醫得自神授至精至當有兒之家宜及早遵行切勿輕視蓖麻子去殼衣揀肥大者三十粒硃砂揀明透者一錢麝香揀真淨者五釐先將硃砂麝香研極細末後入蓖麻子共研成膏於五月五日午時擦小兒頭頂心前心背心兩手心兩腳心兩背彎兩腳彎兩脅共十三處俱要擦到不可缺少擦如錢大勿使藥有餘剩擦完不可洗動聽其自落本年擦過出痘數粒次年端午再擦出痘三五粒又次年端午再擦永不出痘如未過周歲小兒於七月七日九月九日依法擦之更妙男女皆同傳方之家不出天花已十三世矣神授方肥大光潔川楝子一歲至三歲者七個臼內搗爛水三碗新砂鍋煎濃傾入盆內避風處將新稀白布一方蘸水自頭至足遍身擦洗不留余空仍將布試干避風一刻四五歲者用楝子九個水五碗六七歲者用十五個水七碗八歲至十歲用二十個水九碗十一歲至十五歲用三十個水十五碗照前濃煎擦洗搗藥忌鐵器非但不出痘且免瘡癤如不信或留一手足勿洗出時必聚一塊此係神授之方新安吳春山先生作宦時三子俱患痘殄齋戒虔詣城隍廟祈禱夢神傳此方後娶妾生二子照方洗擦極驗深感神功不敢自私布流傳後吳義豐在楚地見痘疫流行刊送全活嬰孩無算洗日須擇七個除日如五月至八月初止有七個除日均屬熱天合宜痘疹不出鼻扇垂危者生芝麻數合蔥頭等分先將芝麻杵細再用蔥頭搗如泥令小兒坐帳中以前藥置盆內用滾水衝下則藥氣蒸即時發出又方用糞缸內磚一塊年久者佳以清水洗淨貯茶壺內令小兒坐帳中時至其身旁用滾水衝下壺中熱氣熏蒸小兒一聞氣息痘即發出痘癢以松毛絲於痘上輕掃之即止痘疹回毒核桃殼燒灰存性研末麻油塗之用真菜油亦可又方用青松子燒灰存性麻油調敷患處小兒眼中染痘小兒眼內出痘若在瞳仁上恐損目用其父中指尖血點其痘上一二次其痘可消小兒出痘遇險者以白鴿濃煎湯服或多食鴿子肉亦妙此係乩仙所授之方痘後眼翳痘後餘毒上攻眼成內障令患者仰臥將黃鱔剪去尾米粒米許以血滴翳上閉目少頃拭去一日三五次即愈翳重者數次痊愈但必須鱔魚血每次換一鱔此方極驗又方蛇蛻一具淨洗焙乾天花粉等分為末以羊子肝破開入藥內麻線縛定用泔水煮熟食之即愈痘毒用羯羊糞置新瓦上瓦須磨光洗淨再將一瓦覆好文武火炙煙盡為度存性為末麻油調神效疹子不出痧疹不出分開頂門有紅筋紅瘰挑破不出又方用羊乳飲之自痊痘眼生翳通神散白菊花穀精草綠豆皮共為末每服一錢用柿餅一個米泔水一盞同煎候水乾只吃柿餅每日三五次七日痊愈痘瘡潰爛用蕎麥一味磨取細面痘瘡破者以次敷之潰爛者用絹袋盛過撲之或以襯臥具有佳痘已出六七日不長不膿癢塌用當歸白芍黃耆川芎白朮茯苓木通紫草如無紫草即用紅花代之防風各三分糯米二百粒水煎乳母同服痘出不起用濕濕蟲數個研末對酒灌之即起又方用牛耳蝨子火焙乾研酒送下神效痘後眼翳蒙花散蒙花酒浸蜜蒸曬乾五錢蟬蛻去翅足洗淨泥五錢穀精草五錢兔屎五錢共為末或豬羊肝水洗去筋每兩用藥一錢蒸熟任意食之自有神效但忌生冷煎炒發物痘內無漿不起真山羊血三分甜酒調服立起小兒口瘡舌瘡用桑皮中白汁敷之立愈或用生黃柏末塗之亦妙小兒夜啼用燈火花五個研末搽乳頭上令小兒吮之即愈又方用牽牛子研細水調敷臍上即止小兒癬疥藁本煎湯洗浴並浣衣最妙小兒初生大小便不通急令婦人以熱水漱口吸小兒前後心及臍下數次即通要吸前後背心兩手心兩腳心臍下共七處以紅赤為度又方以甘草枳殼各一錢水煎服可通小兒頭上軟癤用大枳殼一個切破去瓤磨平口以面麩糊合在癤上膿血自出或用大芋頭搗爛敷之亦妙或用破故脂研末麻油調搽小兒白禿癩瘡石炭窯內燒紅流結土渣四兩百草霜一兩雄黃一兩膽礬六錢榆樹皮三錢輕粉一錢共為末豬膽汁調剃頭後搽之神效藥分減半亦可小兒螳螂子方按小兒口內生黃馬牙口噤頰腫歷代諸書並無割之一法今吳浴盛行此風忍以赤子之頤試人之刃每至割斃不知歸怨特錄簡易良方以告同志尚祈遍傳以告遠近仁子君子功德無量麝香一分硃砂五分螺螄七個同搗如泥塗肉門上陰於自落切勿剝去若症重者將針刺患處出血即用京墨磨搽立效小兒赤遊風干腳泥曬乾或烘乾一兩加珍珠三分同研末菜油調搽即愈快斑散治痘瘡不快王海藏方貫眾赤芍各一錢升麻甘草各五分淡竹葉三片水一盞煎七分溫服急驚風痰涎壅塞咽喉其響如潮名曰涎潮用金星礞石火煅研細入生薄荷汁內少加白蜜調和溫水服之其藥自裹痰從大便出屢試極驗慢驚風肢體逆冷痰滯咽喉如牽銼狀唇緩面青口鼻氣微昏睡露睛速用胡椒七粒生梔子七個蔥白七枚飛面一撮雞蛋白半個先將前四味研末雞子白和勻攤青布上貼小兒心窩一日夜除去有青黑色即愈如末愈再貼一個此方貼愈後仍當補脾慢驚風方用代赭石火煅醋淬十次研細水飛曬乾每服半錢冬瓜子仁煎湯調下昔有小兒瀉後三日不乳眼上目黃如金氣將絕有名醫進此方服之果驗又方以赭石火煅醋淬十次細研水飛日乾每服一錢或五分煎真金湯調下連進三服兒腳脛上有赤斑即是驚氣已出病當安也無斑點者勿治小兒急慢驚風取白頸曲鱔刀斬二段跳急者急驚用跳慢者慢驚用加麝香一分搗爛對臍貼外用膏藥蓋緊小兒卒死不解何症急以大糞一丸化汁灌之即活小兒疳積蝦蟆一支去頭及皮足腸等用酒洗淨紅糖拌砂仁末填入蝦蟆腹中縫定濕紙包煨熟食之立效又方以穀精草或加小青細為末每用二錢雞軟肝一具同酒漿飯上燉熟去藥取肝日日常服即目盲垂死者可治小兒丹毒以三稜針照圓圈針破出紫血即愈如不好另以豬肉切薄片用人腋下夾熱榻之冷時再易熱的其效如神小兒生瘡如粟成塊成路極痛者名龍纏瘡用鮮珍珠鳳尾草搗爛搽之又以渣調青油敷之麻胡丸治小兒風瘡疥癬苦參五錢何首烏胡麻仁炒蔓荊子炒威靈仙荊芥穗白蒺藜去刺炒牛蒡子炒各三錢石菖蒲甘菊花各二錢共為末酒糊丸竹葉燈心湯下大有奇效小兒吐蛔蟲苦楝根皮二錢陳皮一錢半夏薑汁炒一錢茯苓一錢甘草五分生薑煎服小兒急慢驚風獐蹄殼不拘多少去內肉瓦焙燥研極細末男左女右吹鼻內日吹數次即愈小兒肥瘡用雞蛋二三個煮熟去白用黃炒出油搽上三五次即愈小兒痄腮風腫痛用橄欖核醋磨塗之即愈即青果核小兒赤丹用芫荽汁塗之譚氏方小兒臍氣痛啼哭無時陳皮甘草烏藥鹽水炒小茴鹽井炒青皮酒炒少許生白芍鉤藤上各等分水煎服即愈小兒開口良方小兒落地時用橄欖核或同肉亦可燒研灰同硃砂五分和勻嚼生白芝麻一口吐唾和藥絹包如棗核大安兒口中待咂一個時辰頃方可與乳此藥取下腸胃穢毒令兒少疾及出痘稀少小兒慢痹驚風白附五錢南星五錢黑附一錢並用滾水泡去皮為末每服二錢生薑五片水煎服亦治大人風虛止吐化痰此方李博士治吳內翰孫女極效又陳侍郎風虛極昏吳內翰令服三四服亦愈楊氏家藏生下即閉悶看小兒上齶有泡急用針挑破將軟絹或絲棉包指拭去惡血即活切不可使兒吞血下喉生下周身無皮用白米粉干撲兒身上候生皮乃止又方以陳壁土研細末搽之即生初生遍體如魚脬又如水晶破則水流隨又生者用蜜砣僧生研擦之內服蘇合丸囟門腫陷腫用黃柏末水調塗兩足心即消陷用生半夏末水調塗兩足心即起去胎毒法小兒初生甫離母腹口有穢毒啼聲未出急用軟絲綿裹指拭出口中惡血用甘草汁浸飛過硃砂少許加煉蜜二匙調和成膏如小豆大乳汁化服只須三日內服三粒以除胎毒之患解小兒一切諸毒金銀花曬乾研細末四兩白洋糖二兩二味拌勻磁瓶收貯不拘時調服初生小兒面赤眼閉不開二便不通不能進乳總由胎中熱毒所致急以糞清灌之陳久者佳小便不通木通茄蒂煎服立通尿血良方甘草一錢升麻三分煎湯調六一散服即止周歲小兒尿血大甘草一兩二錢水六碗煎至二碗一日服完即止小兒遺尿大甘草頭一味煎湯夜夜服之小兒脫肛豬脂揀去渣二兩入蒲黃末一頭搗成膏塗肛門上自收愈陰囊腫痛小兒陰囊忽腫如硫璃狀啼哭疼痛不止蟬蛻一兩煎湯一碗洗腫處再用紫蘇搗成泥敷包即愈冬月水浸搗敷陰莖腫痛小兒陽物頭馬口忽腫出小便時腫痛啼哭甚者用燈末煎湯不拘時服之腫消痛止小便且清又方川連木通各一錢水煎服莖痛立消偏墜方腎子一大一小是也香薷川樸薑汁炒枳殼麩炒木通扁豆生薑車前葉各等分水煎服預防小兒臍風馬牙簡驗神方枯礬二錢五分硼礬五分硃砂水飛二分冰片麝香各五釐共為細末凡小兒下地洗過即用次末摻臍眼上每換尿布仍摻上摻完一料永免臍風等症臍風撮口乃初生七日病也臍內受風以致面赤喘急蹄聲不出且下身必發青筋一道須臾行至肚卻生岔稍遲行至胸矣急用獨頭蒜切片安放臍上灸二三壯再看青筋起處速灸三壯或行兩岔盡處各邊灸三壯青筋自消或以燈火灸之亦可內服萬億丸二三粒以泄胎毒行至心胸則不救矣萬億丸並治驚搐多痰啼哭臍風等症硃砂巴豆霜寒食麵各等分共為細末將寒食麵和酒為丸如黍米大每服二三丸生薑薄荷湯隨便下臍風丸治驚風多痰啼哭不已腹中痰鳴鼓脹代赭石火煅醋淬三次五錢硃砂水飛一兩巴豆霜二兩牛黃如無牛黃九制膽星亦可三錢殭蠶炒去絲二錢全蠍去頭足水泡去圷味曬乾三錢共為細末用寒食麵二兩陳酒煮和為丸如黍米大磁瓶收貯以臘封口每服五丸人乳化服臍腫出血枯礬末敷或黃柏末敷或枯礬與水龍骨研末敷皆效水龍骨即船板縫干油灰陳年朽爛者更佳兒臍出血小兒初生滿月多啼哭致臍中出血白石脂研末敷之如不愈再炒過放冷再敷但不可揭動兒臍不幹當歸焙乾頻敷臍中又方用棉花籽燒灰摻上馬牙初生小兒唇內牙齦生白點名馬牙不能飲乳此由胎熱所致與鵝口不同稍緩即不能治急用針縛筋上將白點挑破出血擠出如半米樣隨用青絹撈出涎以好金墨磨薄荷湯遍塗滿口勿令吃乳待睡片時醒來方與乳吃無不立效若為兒護痛多致誤命又方擠出血涎後與糖塗之亦效或用金墨塗亦良小兒鵝口滿口白爛枯礬一錢硃砂二分為末以少許摻之日三次效小兒走馬牙疳方以女人溺桶中白用火煅過研末一錢銅綠三分麝香一分共為末搽患處即愈又方黃連一兩硼砂膽礬各一錢冰片五釐共末摻之小者口舌生瘡乳食藥餌不能下咽者生白礬吊吊灰即灰塵吊下者各等分為末以雞蛋清調成餅敷兩足心布包好又方用桑皮中白汁搽之或黃柏末塗之亦愈口疳腐爛方薄荷六錢黃柏五錢青黛水飛四分白硼砂四分冰片一分硃砂水飛二分共研末好好收貯封固每用少許摻之數日即愈初生小兒有白膜皮裹舌或偏舌根急用指甲入兒口內刮破舌膜令血出即以枯礬末少許摻之若不早治後必成啞重齶重齦重舌口上胯皮腫如囊盛水名重齶牙床腫起名重齦舌下生舌名重舌如遇此三症先用針刺患處令出惡血用蒲黃末摻之即愈又重舌即名雀舌用巴豆半粒飯黏四五粒同搗餅如黃豆大貼眉心中間待四圍起小泡去之亦效此方不如刺破者為美如舌腫滿口亦用蒲黃末摻之無不平復木舌舌下生薄膜如石榴子中間隔皮之狀有連舌尖絆住不能吮乳正在舌下總筋之上治法用針橫刺膜中直勒至舌尖上斷此膜舌即能伸須要仔細下針不可穿在總筋之內刺後出肉即用蒲黃末塗之或金墨亦可安神散能治小兒內熱心燥夜啼蟬蛻只用後半截去頭足四十九個茯神二錢共為細末分作四服用鈞藤煎湯調藥不拘時服合藥時不可令婦女小兒雞犬見之又方以雞溏糞塗臍上極佳男雌女雄又燈花散治症同前燈花七枚硼砂一分辰砂一分共研末蜜調塗幾口中或塗母乳上令兒咂之如無燈花用燈草燒灰亦可小者食乳過多傷食不乳神效黑豆四十九粒茅草根每節長一寸許七節赤金紋銀不拘輕重人乳一杯同藥煎五分與兒食之吐乳方木香蚯蚓糞為末米湯調服即安又方砂仁七粒白蔻花七粒炙甘草生甘草各一錢共末頻搽兒口中任其嚥下即安燒針丸治小兒吐瀉如神黃丹硃砂各水飛白礬火煅各等分為末紅棗肉為丸黃豆大每服三四丸戳針尖上放燈焰上燒存性研爛或涼水泔水調服瀉者食前服吐者不拘時服外用雞蛋清調和真綠豆粉作膏吐者塗兩足心瀉者塗囟門水瀉外止方蔥姜搗爛入黃丹為丸如豆大每用一丸填臍內以膏藥蓋之即止又止瀉方炒白麵飯鍋巴為末白糖調作餅食之可止又方用乾山藥半生半炒為末每服二錢砂糖水調服火瀉凡小兒身熱如火口渴喜飲冷而不喜熱湯者是也車前子二錢茯苓白芍各一錢黃連三分澤瀉五分豬苓三分麥芽一錢枳殼二分水煎服一劑即止此治火之聖藥也寒瀉寒瀉者腹痛喜手按摩口不幹而舌滑者是也人參白朮各一錢茯苓二錢肉桂乾薑各二分甘草一分砂仁一粒神麯五分水煎服此方健脾補氣分濕利水祛寒之聖藥自然寒瀉立止小兒咳嗽蘇葉五分桔梗二錢甘草一錢水煎服二劑即愈有痰加白芥子又方生薑四兩煎濃湯沐浴即愈軟癤頻發翠玉膏用通明瀝青八兩銅綠二兩麻油三錢雄豬膽三兩先溶瀝青乃下油膽傾入水中扯拔器盛用帛攤貼不須換萬全湯凡小兒感冒發熱無論晝夜用之有效柴胡五分白芍一錢當歸五分白朮三分茯苓二分甘草一分山楂三粒黃芩三分蘇葉二分麥冬一錢神麯二分水煎熱服春加青蒿三分夏加石膏三分秋加桔梗三分冬加麻黃一分有食加枳殼三分有痰加白芥子三分瀉加豬苓一錢吐加白蔻一粒小兒諸症不過如此如有驚者加勾藤人參三分九還金液丹此藥有斡旋造化之功專治小兒急慢驚風手足抽搐不省人事痰多氣急大人痰盛氣急中風癱瘓亦效膽星九制二兩硃砂水飛一兩牛黃生用五錢殭蠶炒去絲五錢牙皂去皮弦炒微焦三錢冰片五分麝香五分共為細末用小麥麵炒熟煉蜜和勻搗丸芡實大飛金為衣磁罐收貯以臘封固每服一丸薄荷煎湯下如大人牙關緊閉先用通關散開竅隨用薑湯化服一二丸通關散南星一錢牙皂燒存性一錢麝香三分蜈蚣一條去足炕研一條殭蠶炒五分研極細末以薑汁蘸藥末少許摻牙上或調服一二匙痰涎自出再服金液丹一二丸立愈治小兒一百二十種驚癇荊芥穗三兩白礬半生半熟一兩研細面和丸黍米大硃砂為衣薑湯下小兒呃逆柿餅蒂磨濃汁飲即止仙傳急驚方並治大人中風中痰服之立效若因此受謝並食病家茶酒必受陰遣生石膏一兩辰砂五錢各研末和勻大人每服三錢小兒一歲至三歲服一錢以次遞加生蜜調下立效治急慢驚風吊眼撮口搐搦不定代赭石火煅醋淬十次研細末水飛曬乾每服一錢或五分用真金煎湯連進三服看兒腳脛上有赤斑即是驚氣已出病當安也無班點者難治又方膽南星九套者佳一兩硃砂水飛二錢二分研細末每服五分或一錢午前一服午後一服燈心薑湯任下又方雞蛋去殼煎熟取芙蓉嫩葉搗爛作餅將煎蛋包裹再煎至熱取起貼兒臍上立蘇礞石散治小兒急慢驚風痰涎壅塞命在須臾藥入口即活青礞石一兩入砂鍋內同火硝一兩用炭火煅令通紅以硝盡為度候藥冷如金色研末遇驚風薄荷湯下二三分小兒痰涎壅盛牙關緊閉豬牙皂明礬等分為末每用一匙白湯下小兒諸般癇症生白礬一兩細茶共為末蜜丸梧子大量兒大小一二三四五十丸茶湯下服久痰即從大便出小兒痞症腹大面黃肌瘦怯弱危困幾死者木鱉肉使君肉各五錢為細末水丸龍眼大每一丸以雞蛋一個破頂入藥調勻以濕紙封頂飯上蒸熟空心食痞塊肚大面黃肌瘦漸成疳積白芙蓉花陰乾為末用雞肝破開入花末在內飯上蒸熟食之小兒二三歲痢疾不能服藥用巴豆一粒綠豆三粒胡椒三粒布包槌碎棗肉二枚搗成丸敷兒臍上裹好痢止即去藥又方治痢經驗香芯五錢紅糖白糖各二錢五分煎服即愈小兒瘧疾外治用麝香少許硃砂七分同研以清水調化用淨筆在小兒印堂中書去邪避魔四字於未發之前一刻貼之即止小兒蟲疾凡人腹中皆有蟲小兒失乳而哺早或食甜物過多胃虛蟲動以致腹痛惡心口吐清水腹上發有青筋用使君肉火煨以谷煎湯送下每月初四五等日蟲口必向上須於是日服前藥無有不效近來鄉人取使君子葉同黏棗糯米粉用糖拌勻蒸餅於月初與小兒食之亦效小兒聲啞甘草薄荷各五分桔梗麥冬各一錢水煎服愈小兒眼赤以黃連為末調敷足心自愈小兒呆笑兒無病忽見人呵呵笑不見人亦笑每日如是用製半夏五錢木通一錢桔梗三錢甘草五分水煎服隨於頭頂心百會穴灸二壯即愈小兒目澀月內目閉不開或腫怕光或出血者名慢肝風甘草一節以豬膽收汁取出炙透為末米泔水調末令兒服之二三次而愈兩目夜不見物羯羊肝一具不見水勿犯鐵器竹刀劃開入穀精草末罐內水煎熱不時服之立效大人犯此亦服有效小兒疝氣地龍不去土為末調塗患處即效小兒遺尿破故紙為末每晚滾水調服五分即止又方或七八歲遺尿不禁用豬尿泡豬肚各一個糯米半升入尿泡內又將尿泡入肚內仍用鹽醬五味煮食之即止小兒體肥耳後腋下陰乾濕癢海螺蛸研末炒微黃摻之甚良小兒骨鯁火炭研淬問紅糖含口內骨即嚥下百蟲入耳薑汁少許滴之即出雜物眯眼金墨濃磨點眼內即出火燒悶絕以新出童便冷飲之或冷水和蜜飲之即活湯火燒生大黃黃柏寒水石各等分為末擦患處乾用菜油調敷濕則乾擦如一時不備即用醋黃土末敷之又方用木瓜搗爛敷之立愈如冬月無瓜即以干老者燒灰麻油調搽或用葉搗敷亦可秘傳至寶丹治小兒驚疳諸症神效非常先賢合三方而成一方丹隨症用引諸病如遺保嬰之術至矣故口至寶有力者宜多修合以濟人最妙三方列後七氣散五兩妙香散五兩六一散四兩陳膽星一兩共為細末合一處煉蜜為丸如龍眼核大硃砂為衣三歲以上每用一丸五歲以下每用二丸照方配合不得加減急驚風薄荷湯下慢驚風人參白朮湯下感寒發熱失驚蔥薑湯下積聚腹痛薑湯下疳疾身瘦肚大青筋手足細大便泄瀉小便如泔陳米湯下傷食嘔吐瀉痢薑湯下赤白痢疾陳米湯下大便秘結火麻仁湯下小便赤澀車前子湯下發熱薄荷湯下煩渴燈心湯下霍亂藿香葉紫蘇煨薑湯下喘嗽麻黃杏仁湯下病後無精神少氣力不思飲食薑棗湯下七氣散乃消補兼行之劑也陳皮去白青皮各一兩三稜醋炒黃耆藿香各五錢茯苓二兩桔梗益智仁各五錢炙甘草甘松各二錢莪朮醋炒一兩妙香散乃安神正氣之法也木香另研六錢遠志肉二兩硃砂二錢麝香五分山藥炒一兩炙甘草一兩白朮一兩人參五錢六一散滑石飛淨六兩炙甘草一兩此散乃天一生水地六成之之義也童子癆陳南酒一杯童便一杯先煎人乳一杯白蜜一杯共熬成膏不時挑服如病重者多熬服數次立愈小兒骨蒸潮熱食減瘦弱等症秦艽炙草各一兩薄荷五錢共細末每服一二錢白滾湯調下小兒久熱久瀉煩渴不眠小便赤短等症珍珠草二株陳倉米一酒杯老薑皮五分燈心一撮同煎當茶服小兒赤遊丹毒紅如朱熱如火走如雲散及遍身不定者水芭蕉根搗汁調敷加蜜少許亦可遊風腫痛破草鞋亂頭髮燒灰米醋調敷凡一二歲不拘頭面生瘡至十三四歲未愈者以桐油調輕粉塗之可愈小兒頭疽方取有妻室房門內腳踏地下土疙瘩煅過麻油調敷疽頭上留棋大一空處俟破後膿血出即愈蛇丹驗方治小兒大人纏腰丹其色紅赤形如蛇有頭有尾急宜速治如纏滿腰間必傷性命黃荊樹上壁口袋連蜘蛛取數枚放瓦上焙乾存性為末麻油調敷患處過夜成痂即愈如一時難覓前藥用石灰調陳醋敷數次亦效小兒禿瘡銅綠五錢皂礬二錢乳香去油一錢沒藥去油一錢共為細末用陳豬油調塗麻油亦可又方取銀匠店漬銀之水乘熱洗畢後用大蒜搗爛敷二次愈小兒初生症類疥癬先起手足次遍腹背纏綿有已先用滌垢湯以洗之次用換形散以搽之滌垢湯姜蠶去嘴不拘多少研細煎湯浴之一日或一次二次換形散青黛黃柏枯礬雄黃百藥煎硫黃各等分研末濕則干搽干則香油調搽以愈為度小兒遍身或面上生疳瘡爛成孔白如大小楊梅瘡用蒸糯米飯時甑篷四邊滴下氣水以盤盛取掃瘡上不數日愈小兒背起白泡累如綴珠一二日即破膿血外流癢甚一處方好一處又起用如意草搗爛敷之長巾縛定一夜而愈治疹子發不透面眼眶腫脹氣喘命在頃刻者此法極效用大生蔥頭連須搗爛放在大銅盆內上用木架架之再用大被單罩蓋停當大人抱定小兒睡在上面然後將滾水衝入蔥盆內熱氣薰蒸候稍溫即抱出切不露一絲之風直待汗乾即痊愈矣但溫時抱小兒務要得法太緊則氣不能到太鬆則恐小兒手足脫人滾水內為害匪小謹慎切囑紅龍丹治痘黑陷或變紫暗色症在危急投之即起色轉紅活鮮明山甲炒五錢紅曲炒二錢川烏煨黃二銑五分共為細末蔥酒調下一錢或二服亦可保嬰稀痘神效方屢試屢驗羌活防風升麻麻黃生地黃柏各五分歸身黃連甘草各三分柴胡黃芩酒炒乾葛藁本蒼朮白朮蘇木各二分細辛陳皮紅花各一分連翹吳茱萸各五釐共為一劑每逢立春立夏立秋立冬之前一日晚用水二盅煎八分露一宿如遇天雨露在檐下次早燉熱服一年之內服過四劑永不出痘即出亦稀少若過立春以立夏為始過立夏以立秋為始服過四劑再不必服服藥後小兒若瀉是胎毒去也第二次服則必不瀉矣亦有初次不瀉者是胎毒輕也照方制服不可增減三豆方此扁鵲方赤小豆解心經毒治君火黑大豆解心經毒治相火綠豆解陽明經毒治胃火各用三碗小甘草三兩切片若能預將甘草入竹筒內填滿用蠟皮紙封固放廁坑內百餘日洗淨筒取出甘草煮三豆其功更妙以三豆淘淨同甘草入雪水八碗如無雪水以長流水代之將豆煮熟濾去甘草渣存汁將豆曬乾入汁再浸再曬以汁盡為度每日用瓦罐盛水煮豆其湯與豆令小兒食出痘自稀治小兒出痘或因觸犯立見變症急多用元荽搗汁和酒一切幃帳床榻及門戶牆壁各處噴之能闢穢氣或以紅棗燒煙燻之亦妙痘中黑疔先將銀針挑破疔出紫血隨用蒲公英塗之結痂痛癢或乾燥裂痛或痘爛癢痛用柏子油塗搽痘不起脹連殼荔枝連核一枚橄欖槌碎一枚同煎服又方紫草茸四五分滾湯砂鍋內煎服即起有力者加人參三分更妙又方雄雞冠血真山羊血用灑釀調服皆可發痘痘內無漿不起桑樹內蟲研爛和酒釀少許即起胭脂塗洗法此方能活血解毒起發痘陷兼治黑痘神效升麻一味先煎濃湯去渣用胭脂十餘張於湯內揉出紅汁加紅花末一錢余即以胭脂綿蘸湯於瘡上拭之即能活血散毒如瘡不起熱拭之亦可無價散此解毒清熱凡痘見黑紫陷塌者最宜人糞豬糞貓糞犬糞於臘月內收取燒灰存性各等分為末瓷罐收貯臨服用冰糖水調下痘黑陷不起氣欲絕者穿山甲洗淨炒黃研為末每用五分紫蘇煎湯加酒調服倒靨黑色口唇冰冷狗蠅狗身上夏月最多冬月藏於耳中以餌取之焙乾為末七個酒調下移時紅潤如常治黑痘方痘瘡遍身變黑色而欲絕者此能救蘇而發紅色穿山甲切細用蚌粉和炒黑色存性五錢麝香一分共為細末每用七八分溫酒調服蟬花散治痘爛生蛆及夏月諸蟲咬傷臭惡不可近者服之蟲皆化為水蒼蠅亦不敢近北細辛二錢五分全蛇蛻燒存性一兩青黛水澄去灰土烘乾研細蟬蛻洗淨烘各五錢共細末每服三錢酒調下仍以生寒水石研細摻患處秘傳痘爛治痘爛遍身無皮膿水流黏衣被茶葉斤許揀去粗梗入滾水一渫即撈起再揀去梗濕鋪床上用草紙隔一層令兒睡上一夜則膿皆干痘瘡入目或病後生翳障蟬蛻洗淨白菊各等分每服二錢入蜜一匙白湯調食遠服一日二次痘瘡抓破以松花粉摻之痘疹十餘日濕爛不結痂干綠豆粉敷之痘後頭上破碎不結痂黑豆炒為細末香油調敷痘後頭面抓破膿水淋漓用蓋屋草要多年枯爛者炙為末摻之痘後不收膿亦妙痘後餘毒初發紅腫赤豆綠豆用好醋浸爛搗汁鵝翎常掃患處自消悶疹子嬰桃核敲碎四十九粒蔥頭一個水煎服看頭頂門內有紅筋紅瘰挑破即出治疹方疹乃熱也不可用人參白朮當理血不用散血切記疹初起必發熱口必渴狀如紅雲一片與斑相同但斑無頭粒而疹有頭粒如蚤咬之狀元參三錢當歸二錢升麻五分甘草五分葛根一錢水煎服如心經有火加黃連三分肝火加枝子六分肺火加黃芩麥冬各一錢法制小兒免出痘蛋方雞蛋七個入童便桶內浸七日每日空心食一個每年於臘月甘四日浸起次第浸七日至正正月初一日服食一個吃七日如鄰家有出痘者即浸服重者可輕輕者免出寶之稀痘神方孕婦懷孕時用生白芝麻五升或六七升不等置於常出入處孕婦隨便食十個月生後小兒不受胎毒無痘可出即出亦稀而無害此江南薛浩然傳驗之方小兒痘花倒陷痘花倒陷毒遏在內用抱出雞子殼去膜新瓦焙研熱湯調服五七分嬰兒以酒調抹唇上並塗胸背及風池穴更效小兒痘多不能灌漿白水牛身上蝨二三錢新瓦焙乾研末龍眼湯送下此方極效服後亦不灌漿只起黑衣而愈其蝨冬天在牛耳中取之痘後毒赤小豆末雞子清調塗痘癤天麻子仁一兩松香一兩石臼內搗千杵敷患處痘風眼方吳啟孫先生傳荊芥穗蒼耳子北細辛薄荷葉炒去刺淨防風各等分同煎好傾入小瓷瓶內對眼先熏後洗洗後用神佛前燈架上滴下油燭淚搽之效痘風眼迎風流淚不論年久枯礬皂礬各一錢花椒五分清晨用滾水衝於碗內上用棉紙隔著將銅錢一個壓於紙上待自來熏蒸之氣水每日早午晚三次溫洗每劑可用三日共九次重者十服輕者三五服除根宜閉緊眼只洗眼皮稀痘龍鳳膏烏雞卵一個地龍取細小活者用一條即田間蚯蚓也以雞卵開一小竅入地龍在內夾皮紙封其竅飯甑上蒸熟去地龍與兒食之每歲立春日食一枚免痘絲瓜湯五六月間取絲瓜小小蔓延藤絲陰乾約二兩五錢收起包貯至正月初一日子時父母只令一人知將前絲瓜藤煎湯待溫洗兒全身頭面上下洗三年永不出豆即出稀少油飲子真麻油一斤每日飲少許飲盡亦免出痘硃砂散硃砂大顆者佳磨五七千下用蜜糖調服三五十次亦免出痘即出亦稀托裡散治小兒痘疹初發之先宜服此藥官桂黃耆人參甘草白芷防風川芎當歸桔梗川樸木香蟲蛻各五分用水一盅煎半盅溫服又方痘未出時先受風寒發熱或有驚病及解痘毒人參甘草雲苓羌活獨活柴胡前胡西桔梗川芎枳殼地骨皮天麻各等分紫草少許上水四碗姜二片薄荷二葉煎服倘先傷風微熱或有夾食可服參蘇飲痘出四五六日未綻滿人參五分甘草生用三分川芎四分當歸六分生耆七分白芷四分木香三分紫草三分桔梗四分防風三分川樸姜炒三分上桂二分水四盞煎三盞服痘出七八日膿少根窠欠紅或里作泄人參五分甘草四分雲苓五分白朮六分川芎五分當歸六分白芍五分生耆一錢官桂五分生地六分蓮肉五分上用水四盞姜三片棗一枚煎服如痘十日十一二日或泄瀉難住可用木香散異攻散加減服之未出痘之先以解毒為主瓜蒂灰硃砂蜜和服之亦可暑天出痘化毒湯紫草升麻各三錢甘草陳皮各一錢黏米五十粒上用水一盅煎半盅溫服小兒痘後餘毒腫痛用健牛糞尖燒灰存性以砂糖調下屢效痘後餘毒生瘡不己連翹五分蒼朮米泔浸一宿去粗皮五分當歸七分荊芥四分川芎五分赤芍牛子炒研各五分木通去皮甘草生用三分黃連四分紫草去蘆用茸四分生地酒洗八分水一杯煎二杯作二服或作丸散亦可滾水下小兒痘疹眼中生翳兔屎加蟬蛻木通甘草煎湯頻服又方兔屎飛過炒四兩石決明用七孔者火炙一兩草決明一兩木賊去節一兩當歸酒浸五錢白芍一兩防風一兩穀精草三錢上為末煉蜜丸如綠豆大每服數十丸荊芥湯下食後服應極之致效又方穀精草一兩生蛤粉五分黑豆皮二錢白芍酒微炒三錢上為末極細用豬肝一葉以竹刀批作片摻藥在內以稈繩縛定磁器內慢火煮熟令兒食之不拘時連汁服至一二月極效痘不落痂砂糖調新汲水一杯服之白糖調亦可日二服小兒夜啼豬窠中草鋪席下勿令母知又以硃砂書甲寅二字貼床頭又以蟬蛻七個焙乾存性為末搽乳頭上令小兒食之即止小兒肚大有青筋用蝙蝠屎三錢瓦焙乾為末將豬膽煮熟拌屎末食之即骨瘦如柴肚大如斗可活初生小兒無皮但赤丸紅筋乃母氣不充實受胎未足也早稻米粉撲之肌膚自生神效小兒不屎此胎熱也大蔥白一莖切四片乳汁煎頃刻作四服小兒大小便血乃傳熱於心肺以生地黃汁五七匙酒半匙蜜半匙和服小兒目閉或出血或腫澀此慢肝風以豬膽汁塗甘草之研末乳服小兒龜胸龜背取龜尿摩其胸背久久即瘥取龜尿法置龜瓦盆中以鏡照之即失尿急以物收之或以豬鬃刺其鼻中即尿小兒臍瘡馬齒莧燒研敷之小兒臍風鎖口烏梅煎湯灌之即愈小兒蓐瘡凡小兒百日內生瘡名蓐瘡由胎毒所致又名毒瘴從身漸延至頭齊眉癩遍則愈若從頭漸治腹者准治內服犀角丸牛黃犀角羚羊角全蠍酒洗殭蠶炒防風羌活天麻麻黃膽星天竺黃黃連京墨煅微煙為度各三錢共為細末蒸餅打糊為丸芡實大硃砂金箔為衣每服一丸薄荷湯下外宜用藥煮布衫穿之防毒入內而生他疾以青布做小衫二件同藥煮陰乾早晚換服再煮以愈為度煮衣之藥用大黃八兩甘草四兩當歸二兩朴硝二兩乳母宜服煎藥十劑其方列後苦參三錢羌活八分甘草四分連翹防風荊芥牛子研各一錢水煎服忌食雞鵝羊魚韭蔥蒜等酒宜少吃小兒齁喘活鯽魚七個以兒自尿養器中待紅煨熟食疳症仙方治一切肚大黃瘦腹痛蟲積神效雄黃三錢麝香五分膽星二錢全蠍火炕去頭足殭蠶炒各一錢巴豆紙打去油五分共稱研淨末神麯糊丸如菜子大硃砂飛二錢為衣每服一丸白湯下杭州智樂和尚流傳此方濟人千萬矣小兒口疳人中白煅黃黃柏蜜炙焦共為末各等分入冰片少許青布拭淨摻之走馬牙疳言患迅速不可遲延故也多屬痘症餘毒所中又有雜病熱甚而成者其患牙根腫爛隨便黑腐作臭有五種不治黑腐不脫不治牙落無血不治穿腮破唇不治用藥不效不治初起用人中白溺壺者佳煅紅二兩兒茶一兩黃柏薄荷青黛各末六錢冰片五分研極細末先用溫湯漱淨吹藥疳上日用六七次吹藥後涎從外流為吉涎毒內收為凶內服蘆薈銀柴胡胡黃連川黃連牛旁子元參桔梗山梔石膏薄荷羚羊角各五分甘草升麻各三分水二盅談竹葉十片煎六分食後服此方雖穿腮破唇並宜服之小兒口瘡不能吮乳蜜陀僧為末醋調塗足心愈即洗去小兒胎剝兩大腿近小腹頭生瘡皮脫開漸延小腹則不救此名胎剝用黃柏炙研以豬膽汁調塗之或加伏龍肝末等分共調塗之嬰兒胎瘡滿頭者用水邊烏桕樹根曬研入雄黃末少許生油調搽小兒赤遊風此丹行於心上即死急用白菜搗敷即止小兒浮腫絲瓜燈草蔥白等分煎汁飲之少許余多之湯遍身浴之小兒咳嗽麻黃防風荊芥各三錢為末綠豆麵五錢研勺杏仁三錢煎湯調前藥每服一錢上下量兒大小服之小兒血痢用馬齒莧搗汁一合蜜二匙空心煎服小兒痢疾雞子一個煮二三滾取起去白用黃研細以生薑汁半小杯和勻兩小兒食之不宜吃茶其效如神小兒疳痢新羊屎一升水一升浸一夜次早絞汁頓服日午乃食極重者三服愈小兒疳痢冷積腹大吐食面黃腿縮母丁香七枚為末乳汁和蒸三次薑湯服針砂丸治小兒面黃肚大積聚不消不思飲食針砂醋煅七次四兩皂角火煅四兩厚朴薑汁炒一兩青皮一兩三稜一兩陳皮草烏南木香雄黃檳榔使君肉各一兩鱉魚腳醋浸焙乾八隻上藥研極細末醋為丸如粟米大空心調服小兒一歲三分治急慢驚風六方治急驚神方用燈心二十根長五六寸蟬蛻七個去頭足翅蓋只用肚皮明殼上好辰砂三錢以新白紗紮緊用線繫好墜於砂罐兩邊懸空放水中量小兒大小或用水盅半煎一盅或用水一盅煎七分服下即愈治小兒驚癇腹滿大便青白柏子仁末溫酒調服一錢小兒驚風方麝香五釐硃砂二分烏梅去核一個共研碎用親人血數點再用鉤藤煎湯與兒食之驚風立愈治小兒寒熱驚癇發熱用荊芥柴燒瀝一杯入薑汁二匙消痰如神又驚癇嚼舌迷昏仰目牛黃一豆許研和蜜水灌之急慢驚風用山慈菇以灰水浸一宿蒸三次曬乾以上好七醋磨漿入口內以雞毛刷七次痰即下小兒溏泄柿餅燒熟食之即止小兒頭上肥瘡方陳鹽魚一塊以香油炸焦去魚以油搽瘡又方以編筐籃之葛條煅灰燈窩油調塗之治腹內蟲疼方此方照單加倍研末糖拌每晨用三錢兒大至三五錢亦可烏梅一個老薑三片榧子十個花椒十四粒黑糖少許煎服蟲盡出矣小兒誤將竹木刺入眼內白頸蚯蚓掐斷滴血入眼刺即出小兒天疱瘡大黃連翹皮硝地骨皮各等分水二碗煎一碗待冷以雞毛搽上又方以生百合搗塗一二日即安又方取絲瓜汁調辰粉頻搽之綠雲丹治小兒中風厭銅綠不拘多少面麩為丸如梧子大每以酒化開煎薄荷湯服一丸須臾吐痰涎如膠小兒痘瘡疳蝕膿水不絕以蠶繭一枚將生白礬末填滿煅枯為末擦之甚效小兒痘瘡入目羞明生翳飛鴻集方畢澄茄研極細末吹少許入鼻中三五次效小兒疳瘡用大棗去核填入綠礬燒存性研貼之或以香油調搽亦可並治耳生爛瘡瘡中生蛆綠礬末摻貼即化為水小兒疸瘧壯熱不寒黃丹二錢蜜水和服冷者酒服名鬼哭丹小兒痢疾黃連黃芩陳皮甘草以水煎服赤痢加紅花桃仁白痢加滑石末小兒食積痢此名保和丸神麯蒼朮滑石白芍黃芩白朮甘草陳皮以水煎服一方加茯苓小兒滿口生瘡江茶粉草共為末敷之一方加黃丹又方苦參黃丹五倍子青黛共末搽之效小兒夜啼此邪熱乘心黃連薑汁炒一錢甘草用竹汁葉二十片煎服芎黃散治小兒齒遲川芎山藥當歸白芍炒甘草炙各二錢五分共末白湯調食後服乾末搽牙根菖蒲丸治小兒語遲人參石菖蒲麥冬去心遠志去心川芎當歸乳香硃砂各二錢共末蜜丸如黍米大用米飲食遠服三十丸虎骨丸治小兒行遲虎頸骨酥油炙生地雲苓去皮棗仁去殼炒肉桂去粗皮牛膝洗去蘆防風當歸川芎各五錢共為細末蜜丸如黍米大木瓜湯下三十丸靈礬散治小兒蟲咬心疼五靈脂二錢白礬火枯半錢共末每服二錢水一盞不拘時煎服當吐出蟲即愈安蟲散凡蟲不可盡去宜安之檳榔胡粉炒黃川楝子去核皮鶴蝨炒黃各二兩白礬桔過二錢共為末每服一錢米飲調下胡黃連丸治小兒疳病腹大胡黃連五分去果子積阿魏一錢五分醋浸去肉積神麯二錢去食積麝香四粒黃連二錢炒去熱積之上為末豬膽汁丸如黍米大每服二三十丸白朮湯下小兒痞疾鴿糞皮硝飛過各四兩阿魏二錢麝香五分香餅三兩上俱成末拌勻收入磁器內聽用貼時用厚紙五七層將藥一撮滾水調攤紙上如疾在左在右在中此藥離疾五寸貼之三五次即效小兒臍瘡不幹白礬白龍骨各火煅研為末每用少許敷之又方用棉花籽燒灰亦可小兒痞積腹脹肌瘦立眉豎眼頭毛生瘡結如麥穗者並皆治之用立秋以後大蝦蟆一隻去其頭首四肢刮淨腸肚以清油塗其上上以覆瓦下以仰瓦用火炙之令熟與兒啖之腹中之積穢盡下連服四五個一月之後效應難述小兒臍腫用枯白礬末敷之或黃柏末敷之化毒丹治小兒胎毒口舌生瘡腫脹木舌重舌牙根腫脹甘草三錢桔梗五錢元參一兩茯苓二錢薄荷五錢人參一錢青黛五錢牙硝一錢共末蜜丸薄荷湯下小兒舌脹腫塞紫雪一分竹瀝半合細研和勻頻置口中以盡為度小兒外腎腫大木通甘草黃連炒當歸黃芩各等分用水一杯煎半杯服小兒尿血甘草湯調六一散加升麻煎服尤妙小兒禿瘡松樹厚皮燒灰二兩黃丹水飛一兩寒水石細研一兩枯白礬黃連大黃各五錢白膠香熬飛傾石上二兩輕粉一分上末熬熟油調敷瘡上須先用甘草花椒煎水洗之敷藥佳小兒遍頭生瘡又名黃水瘡用鹹魚幾尾以芝麻油煎熟去油魚獨取油渣塗於瘡上數次即愈治小兒喉中痰壅氣喘用巴豆一粒搗爛作丸以棉花包裹男左女右塞鼻痰即墜下神效治撮口臍風為風濕所傷或尿內袍裙之中遂成此症面赤喘急啼聲不出名曰撮口赤腳金頭蜈蚣炕研一條蠍稍炕研四尾殭蠶炕研七個瞿麥五分共研末將鵝毛管吹藥入鼻噴嚏啼哭可醫後用薄荷湯調服一二分量兒服之如不噴嚏啼哭不救一方小兒初生七日若有臍風必自發出青筋一道行至肚卻生兩岔待行至心不治必知者常視其青筋初發速照青筋上灸三柱或行至兩岔處亦照兩岔頭上截灸六柱青筋自消兒必活矣宣風散治初生大兒臍風撮口多啼不乳口出白沫全蠍頭尾全者去毒用好酒塗炙為末二十一個麝香另研一分上和為末用一半金銀煎湯調服小兒吐瀉香橘餅丁香橘紅各等分共末煉蜜丸如黃豆大作餅噙化小兒啟脾丸此丸消食止吐止瀉消疳消黃消脹定肚疼常服益胃生肌健脾開胃人參白朮茯苓山藥白蓮各一兩山楂甘草陳皮澤瀉各五錢共細末蜜丸如彈子大空心米湯化下一丸小兒食傷諸病服之有效助胃丸小兒服之不傷脾胃人參白朮茯苓神麯炒麥芽炒砂仁去皮香附去毛四制更佳糖球陳皮各一兩粉草五錢上末煉蜜丸如龍眼大每服一丸米湯下或作小丸亦可量兒大小服之小兒泄瀉用巴豆一大粒研膏貼在囟門上燒線香一炷未盡即去巴豆膏極效小兒吐瀉久痢赤茯苓白朮木香粉草各等分共細末煉蜜調湯服立效秘傳五疳散此方專治小兒五疳潮熱面黃肌瘦煩渴吐瀉肚大青筋手足如柴精神悸健歷試有效無疾預服此藥則諸疾不生元氣虛弱者服半月自然肥滿身體輕健白朮蜜水炒一兩五錢白茯苓去皮七錢五分甘草一錢五分麥冬去心一兩使君肉切碎略炒七錢五分山楂肉五錢麥芽炒五錢金櫻子肉略炒五錢芡實二錢五分蓮肉隔紙炒五錢青皮去瓤麵炒二錢橘紅五錢上為極細末和勻重七兩每次用藥末一兩用煉蜜半斤或四兩調成膏每日中晌晚間各服一二茶匙溫水漱口如身熱咳嗽加地骨皮百部各五分如肚腹飽脹大便稀水腸鳴作溏或蟲出不和加檳榔二錢五分木香一錢稟受氣弱加人參二錢五分煉蜜法用極大青竹筒一節削去外面青皮兩頭留節將一頭錐一孔灌蜜令滿仍用竹釘固孔以水煮蜜熱為度或加茅根一把在水中煮蜜更佳如將蜜通煉臨時調藥旋服亦好途中無蜜滾白水調服亦可小兒牙疳滑石銅綠杏仁青鹽各等分上為極細末搽瘡上立效走馬牙疳槐皮燒灰存性二錢泥鹽炒五分上為極細末若鼻與喉嚨內有加上片一分珍珠一分用鵝毛筒吹入烏犀丸治諸般疳積醜頭末二兩青皮三兩使君肉七錢五分白蕪荑二錢五分鶴蝨五錢蘆薈燒紅醋碎另研一錢苦楝根皮五錢上炒令焦黑色為末取丸麻子大每服三五十丸米飲送下食前量小兒大小加減黃龍丸三稜三兩莪朮三兩青皮一兩五錢山楂肉乾薑各七錢五分上用取丸麻子大日曬乾食後薑湯下量兒大小加減烏犀黃龍二丸間服食前服烏犀食後服黃龍釀乳方解胎中受熱生下面赤眼閉不開大小便不通不能進乳食澤瀉二兩五錢豬苓赤苓花粉茵陳甘草各一兩生地二兩上㕮咀每服二錢水一盅煎至半盅食後令乳母服去宿乳與兒服小兒諸驚燈火法凡仰向後者淬其囟門及兩眉齊之上下眼翻白不下者淬其臍之上下不省人事者淬其手心及心窩之上下手拳不開口往上者淬其頂心兩手心撮口出白沫者淬其口上下兩手足心
