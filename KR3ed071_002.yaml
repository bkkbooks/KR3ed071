body:
  text: 卷二齒牙門附口舌擦牙烏須方細辛六錢熟地曬乾白蒺藜去刺故紙五味曬乾沒石子黑黃者佳地骨皮去粗皮旱蓮草枸杞子曬乾青鹽用草紙酒濕透包放炭中微火煨各一兩五錢共研細末磁罐收貯不令泄氣每日清晨人之元氣統聚於口切毋漱口吐出惟以指蘸藥末擦齒上下周遍滾水含漱徐徐咽下總不間斷固齒烏須功效如神齒衄以五倍子燒研擦之牙疼神效方雄黃精明礬各三分牙硝一錢真冰片一分共研細末以半分擦患處流涎即愈極驗熏蟲牙疼方韭菜子一大撮入爐內燒燃先將蘆管一頭紙黏喇叭樣吸此煙至牙疼處其蟲俱出溫茶漱去牙疼噙藥方不論風火蟲牙皆治生草烏雄黃胡椒麝香蟾酥各等分共研細末用綢絹包噙疼牙上立止此藥又治蛇蠍傷以鹽水調塗立效風火牙疼方松木節一小片咬疼牙上即止走馬牙疳大五倍子一個將白礬納入內火煨存性加黃柏少許研勻聽用先將青布包手指頭上米泔水洗淨患處後以末藥搽之忌香料發物又方大徽草一枚青布包簽住蘸芝麻油於燈頭上燒之磁盅接承滴下油汁以棗枯油黑為度先以米泔水漱淨口再以雞翎蘸油刷患處上下走馬牙疳紅棗一個去皮核加白砒少許研細末入棗內紙包水濕火煨存性為末吹患處立效又方以二次蠶繭一個用白礬為末裝滿炭火煅枯為末置碗內加清水半碗攪勻以雞翎蘸掃患處立效牙根腫痛方瓦松白礬各等分水煎漱之立效牙根臭爛方芥菜根燒存性研末頻敷之即愈牙宣露痛方絲瓜藤陰乾火煅存性研末搽即止口牙辛連散治牙腫痛牙斷出血牙疳及舌並兩腮生瘡黃連一錢黃柏五錢蜜制細辛七分共研細末用苦茶漱口淨乾擦其病因治口舌瘡過服涼藥不效用理中湯反佐之故也牙搖動生地二兩蒺藜二兩炒去刺香附四兩炒青鹽一兩五錢沒食子大者四個故脂二兩炒共為末早晨擦牙津液咽下自然固齒牙落更生大公鼠一個去肉取全骨焙乾香附一兩白芷川芎地骨皮桑皮川椒蒲公英旱蓮草青鹽川桂皮各三錢共末擦牙百日復生固齒生大黃生石膏各等分共末擦牙溫水漱口吐出手盛洗眼牙疼蜂房五錢花椒三錢青鹽一錢共煎漱口又方潮腦尖四分傾銀火硝一錢共末擦患處又加入硼砂一錢青鹽一錢更佳又冷痛胡椒二粒母丁香二粒皂礬二分共末用絲綿或布包緊咬在痛處流去黏水熱涎其疼即止又方用桐油少許用指搽痛牙上亦愈風火牙疼乳香沒藥雄黃血竭兒茶各一錢火硝五錢石膏一錢煅存性共末男左女右吸人鼻內即止牙根出血草決明煎水噙之即止牙關出血如一線槐花略炒為末以指頭蘸藥擦牙關以止為度牙根爛穿唇破頰腫胡黃連五分膽礬五釐兒茶五釐為末擦牙蟲牙用豬肚肉油垢塗布上卷塞耳內左痛塞右耳右痛塞左良久不痛取出其蟲在布上如白線而頭紅者是又方蒼耳子三十個川椒三十粒小黑豆三十粒上陳醋一碗共煎半碗常溫漱牙即愈蟲牙齲齒神方牙根蟲痛蛀腫臭爛者馬夜眼燒灰存性研末摻入永遠除根馬夜眼在前大腿上有此方能夜行飼馬者識之牙折多年以鼠脊骨炕末日日擦之即生牙落復生大鼠一隻以青布渾身縫著懸吊簷下出氣處自然結成霜刮下擦牙走馬牙疳兼治小兒痘後餘毒牙根黑爛流血漏頰穿腮破喉落牙損命之症百發百中用此方馬鳴散人中白五錢蠶蛻紙二錢五分燒灰五倍子二錢生用一錢將一錢用細白礬炒枯共末擦患處固齒神驗方牙皂五味茯苓細辛各等分為末早晚擦之又牙疼方烏梅一個甘草七分冰片五釐共末含口中涎出即愈又方以荔枝連殼燒存性研末擦牙即止真仙方也又方或取大荔枝一個剔破開填鹽滿殼同肉核炕研擦之即愈牙疼奇方取新鮮白果二三個剝去殼皮膜每個去心入上冰片五釐將瓦炕黃研末擦之又方青鹽火硝樟腦各一錢研末不論風火蟲擦上疼止一凡牙痛當治於未痛之先或稍痛時取鮮旱蓮草搗汁拌食鹽炒每晨取鹽擦牙即可無牙痛之患或鮮桑葉搗汁炒鹽亦可又牙痛方蓽撥細辛良薑石燕每味各一錢醋一盅煎溫熱候漱口極效口瘡舌病門治口瘡生黃柏蜜炒研末塗之甚好又方幾茶口中噙含即愈又桑樹汁塗之亦愈又方陳白螺螄殼燒灰加兒茶少許為末吹患處一次即愈又方蠶繭五個包入硼砂瓦上焙乾焦為末擦抹即愈赴宴散治口瘡並三焦實熱口舌糜爛痛不可忍黃連黃柏黃芩梔子炒黑細辛乾薑各等分為末先用米泔水漱口後搽藥吐咽不拘口舌生瘡吳茱萸研末米醋調敷腳心移夜即愈舌腫神方此症卒然舌腫喉閉即時氣絶至危至險急用皂礬不拘多少以新瓦火炕變紅色放地上候冷研細將病人撬開牙齒以藥搽舌上即愈或用好醋調和舌上此方名破棺散舌瘡生黃柏八分生黃連五分兒茶一分共末搽之舌出血槐花末敷即止又以木賊草煎水漱口即愈舌出口外俗曰螟蚣毒即取雄雞冠血一小盞浸之即收舌卒腫如豬胞狀滿口不治須臾不救急用百草霜和酒塗舌下立愈要鄉間燒雜草者見千金方舌忽發脹滿口不能出聲蒲黃末頻滲如因寒加乾薑末等分舌腫硬百草霜海鹽各等分共末井花水調服又方以蒲黃為末擦之內以黃連煎水頻飲以瀉心火舌腫塞喉以朴硝白礬為末搽舌上立消舌忽出難入大麻子為末捲入紙條燒煙熏入鼻中有涎流出愈舌長過寸冰片研細末敷之即收又方番木鱉四個刮去淨毛切片黃連四兩水二碗煎一碗將舌浸藥水良久其舌自收小舌落下方用鹽橄欖並核燒灰存性研末吹之即愈又以吊揚塵灰點之亦上又以食鹽炒熱點之亦上臨點之時俱要先用筷子將大舌根壓住然後吹點藥方上口瘡乾薑黃連各等分研末泡水噙之口舌唇內生瘡以西瓜皮曝乾燒研噙之耳鼻門治大人小兒耳內腫痛流膿一切火症番木鱉一個水磨滴耳內即愈又方以枯礬末入麝香少許吹入耳一日四次或棉裹塞耳又治耳出膿方蛇蛻不拘多少新瓦焙黑存性研細末先將小竹條絞棉絮捻淨膿水吹入蛇末少許二三次愈耳閉作痛田螺去蓋入麝香五釐自化成水滴耳內即愈耳中膿痛出雞子蛋殼炒黃為末香油調灌又方蚯蚓焙乾為末捻捻耳內兼治耳底耳中出血龍骨末吹耳即止耳鳴耳癢流水風聲生烏頭一個乘濕削如棗核大塞耳早塞夜易過三五日便愈不然久則成聾耳猝聾閉萆麻子一百粒大棗十五枚去核共搗欄入男胎乳汁和作錠如棗核樣以絲綿一枚塞之覺耳中熱為度一日一換二十日瘥又方以細辛為末熔黃蠟成丸如鼠糞大綿裹一丸塞耳內二次愈聤耳出汁韭汁日滴三次耳痛以鬱金滴水入耳內即愈耳痛有膿桑螺蛸一個燒灰存性同麝香五釐共研末糝之耳內流水香附研末糝之自愈又耳出膿用胭脂枯礬釘鏽粉各等分共研末吹之立效少年耳聾用木耳一撮醋炒白糖拌食治耳聤用頭髮瓦上燒灰存性為末每一錢加真冰片七釐研勻吹少許入耳即愈耳爛用陳皮燈草燒灰各一錢冰片一分共研勻吹之撑耳風方獨活藁本荊芥防風各一錢五分薄荷生耆香附甘草節細辛各一錢共煎服外用敷藥輕者用靛花或磨鹿角搽重者則用大黃白芨五倍子共末以雞蛋清調搽蟲入耳將薑揸貓鼻其尿自出滴耳內蟲即出或用芝麻枕之亦出蟻入耳用豬肉一塊炙香放耳邊引出或用川山甲炒研末以水調灌亦可蜈蚣入耳以雞肉炒香放耳邊引出或以生薑汁灌之蜒蛐入耳將羊乳滴入耳內即化為水又方以生油灌之凡諸蟲入耳俱效又蟲入耳以菜油少許入耳其蟲即死或蟲入左耳掩右耳以左向明屏氣少頃即出不可爬挖其蟲愈深入右耳掩左治鼻淵即腦漏因風寒凝入腦戶與太陽濕熱交蒸乃成其患鼻流清涕或流黃水點點滴滴長濕無干老刀豆文火焙乾為末酒服三錢重者不過三服即愈又方白芷一兩蒼耳子炒辛荑仁各二錢五分薄荷五錢共末蔥湯茶湯清調食後服以鵝不食草塞鼻孔自止又方陳香圓木香扁柏砂仁川芎各一錢水煎服又鼻漏孔中長出一塊辛荑去殼四兩桑白皮四兩梔子二兩枳殼白芷桔梗各二兩共研末每服二錢淡蘿蔔湯送下鼻中息肉以藕節有毛處一節燒灰存性為末吹患處立效鼻赤方用硫黃取豆腐水煮三次淨二錢輕粉一錢密陀僧一錢白芷一錢白礬五分共末以津唾搽之晚搽日洗又方硫黃四兩燒酒三斤煮逐漸添待乾將口涎在手心化開搽鼻頭上鼻中流黃水不止頭中疼名空腦沙有蟲蝕腦也如生息肉者久服亦效用絲瓜近根三五寸燒灰存性酒調服二錢或跌成細丸開水下亦可神授鼻淵方漆綿一兩漆鋪內濾漆用過之一個絲綿也白鴿子翎去硬管用兩邊毛一兩將鴿翎卷綿內燒灰存性每灰一錢加真冰片七釐令患者仰臥輕輕吹入少許不可重吹恐噴嚏打出無用也每日吹一次四五夜即愈要戒房事百日神效無比鼻中生瘡杏仁去皮尖研如膏以人乳調塗之鼻中臭氣赤芍黃芩藁本生地黃連石菖蒲遠志去骨各八分甘草三分水浸炒水煎服鼻疳爛通其孔者鹿角一兩銼碎焙焦白礬一兩煅頭髮五錢燈上燒過共研末先用川椒煎水洗淨疳孔將此藥搽之如不收口可用瓦松燒存性為末搽之鼻淵鼻鼽鼻窒及痘後鼻瘡辛荑研末入麝香少許蔥白蘸入鼻內數次甚良李時珍方鼻衄久不止大蒜搗如泥左鼻出血左腳心塗右鼻出血右腳心塗兩鼻出血兩腳心餘兼治虛火上升眼目腫痛神效又方生地梔子各五錢炒水煎服即愈或用血餘燒灰吹鼻內更妙又方麥冬去心生地各五錢水煎服立效又方用青苔放囟門上立止又方或用白茇末唾津調塗山根便止山根即鼻粱上也鼻筍奇疼白礬硼砂研末少許吹鼻化水愈腦漏豬肺一個用水制淨入開口川椒照人年紀每歲三顆煮熱食之腦流臭氣蘄艾半斤黃酒五斤煎服一二料自愈鼻血不止槐花末敷之即止又用血餘燒灰吹之立止男用女發女用男發鼻出臭氣或鼻膿腥臭用稱星樹根常煎水服之若成肺癰者再用白茇末米湯每日調服二三錢神應鼻血方如鼻血不時來者只用荸薺去皮放溫茶內泡熱多食即除根不必服藥或新鮮柏葉陳者亦可煎湯代茶頻服亦妙又用四生湯生地生艾葉薄荷扁柏葉各等分煎服一二劑自愈又幹蘿蔔菜二兩豬精肉四兩濃煎飲之即止又方如猝然無藥即用陳香墨磨濃開水調服一茶杯亦妙此急方也又緑豆粉一兩細茶二錢為末涼水調服立效鼻衄又方纍醫不效粟殼燒存性研末粥飲服二錢頭髮洗淨燒灰吹鼻孔再以水服一錢如左邊孔出血用線扎右手中指右出扎左手中指兩孔扎兩手中指自止又方藕節搗汁飲之或滴入鼻中又方以硼砂一錢水服立止鼻內生肉氣閉辛荑白芷升麻藁木防風川芎木通細辛甘草各一錢五分共末每服三錢茶調下外用白礬燒灰加硼砂少許吹鼻中大笑脫腮烏梅搗細末為餅塞滿牙盡頭張口流涎隨手掇上痄腮赤小豆為末或水或醋調敷眼目門明目益腎還精丸治中年兩目昏花視物如兩皆由腎虛不足少年酒色過傷用此方最妙當歸四兩酒洗天冬二兩去心麥冬二兩去心白芍二兩醋炒生地二兩酒炒山藥二兩炒杜仲二兩鹽水炒淮牛膝二兩酒炒百部二兩知母四兩鹽水炒陳皮二兩川黃柏二兩鹽水炒甘菊花二兩黃耆一兩酒炒煉蜜為丸如梧子大早晚白滾湯下二錢雀目日落不見石決明二兩夜明砂二兩豬肝生用一兩白羯羊肝一兩將肝二片中間盛藥用麻扎定淘米泔水一碗砂罐煮少半臥時一併食之又方用烏羊肝一具切碎入鍋乾炒將目於氣上蒸看肝熟隨吃隨蒸吃完即明羊擇黑毛烏肉佳眼痛神效龍膽草一味用瓦器熬成膏點入眼內瞽目俱能點除雲翳不可以其平淡而忽之也林開宗傳飛絲入目不拘三五日紅腫如桃俱可治細刮指甲末用唾津蘸末點入其絲即出一切物入眼中用燈心點指甲末於上即出或頭垢點亦好一子丹仙翁治赤眼翳膜等症大訶子一枚以蜜磨點目中洗眼不昏花白礬五分細芽茶七分大黃豆七粒共研粗末用滾水一茶杯入碗內泡出汁飯上蒸過亦可不時勤洗極效報恩丸一官治罪囚出活之後囚已病死矣官患目疾為內障所苦喪明年餘適夜半獨坐嘆息聞階蟋蟀之聲官間為誰答曰是昔蒙活囚也今未報恩乃告一方言訖不見修服數日復明凡目疾皆可治忌豬肉冷物雄雞川黃連一兩白羊肝一個去筋膜忌鐵器以黃連研末和肝於砂盆內研令極細為丸如梧子大每服用滾水下三十丸勻作五劑服治眼翳障用大蜘蛛一個刺汁和人乳蒸三次其色如雞蛋黃取點障翳即除火熱時眼暴赤腫痛日夜難禁取生蔥連須搗爛用開水沖洗二三次即愈洗眼仙方不論雲翳昏花風火時眼一切目疾並瞽目復明久洗初如皮硝六錢桑白皮二兩生用白水煎熟每月只洗一日日洗數十次洗日開後正月初五二月初二三月初三四月初九五月初五六月初四七月初三八月初十九月十二十月十二十一月初四十二月初四閏月照前逐月吉日乃光明之期也按期日虔洗效驗如神聖惠方芒硝六錢水一盞六分澄清依法洗目至一年睛如童子也正月初三二月初八三月初四四月初四五月初五六月初四七月初三八月初一九月十三十月十三十一月十六十二月初五閏月同前新久目疾當歸白菊各三錢荊芥防風檳榔陳皮各二錢古錢十枚同煎水每服並洗每日洗三次沖洗寒熱火眼方甘石八分白菊一錢青礬銅緑各等分羌活五分冰糖二錢要潔白者佳水煎每日沖洗即效或飯上蒸滾亦可眼障及火眼受風寒各眼疼生地連召防風白芷歸尾白菊各五分荊芥五分明礬膽礬各一分皮硝三分用藥放入碗內上面用紙封好用水放入鍋內蒸一炷香時取出先沖後洗一日三五次即愈醴泉李南圃傳風眼下淚臘月不落桑葉煎湯日日溫洗之或加入芒硝少許風爛眼甘石五分煅好黃連五分銅緑三分研末煎濃露一宿每日先熏後洗又方甘石童便煅研末三分當歸二分膽礬一分沖滾水時時燉熱洗之明目單方此方宗丞徐公試服甚驗年七十而目力如少年時女貞子即冬青子陰乾按歲服風爛可除至老不花治翳障方取白鹽頭一塊放燈上煅至極紅至煅三次研末用燈草蘸濕黏點翳上三五日自除又除翳障方荸薺去皮取山塘野小者佳搗爛忌鐵器將水漿濾去渣陰乾末成極細粉每一兩加冰片一錢用骨簪點兩眼又方雞蛋一個掐一孔入極細真橡末三錢攪勻以紙封口蒸熟每早食一個翳自退蒸蛋以米坐之則不倒又方鵝不食草嗅鼻塞耳貼目去翳神方也目中諸疾爐甘石取如羊腦鴨頭色者煅紅色用童便淬七次洗淨飛過曬研海螵蛸硼砂各一兩共研末硃砂三錢另研極細末飛過入上三味點目極效或外加片腦三分研勻收貯亦可李時珍傳方暴發眼痛白礬二錢飛過研細同去皮薑汁塗眼皮上閉目勿開俟一炷香盡痛止用溫水輕輕洗去神效時眼火眼用黃連五分黃芩明礬各一錢紅棗二枚共杵細用水半盅飯上蒸熟搽又以三七磨水塗眼眶即愈赤目翳障黃連切片熬濃汁去渣待成膏入青魚膽汁又入片腦少許和習入磁罐封固備點眼生偷針鼻尖爆一燈火自愈又方初時必痛癢有一小眼用針到眼內刺出血即愈遠年雙目不明黑豆一百粒黃菊花五朵皮硝六錢水一杯煎七分帶熱熏洗五日換藥再洗五十日見效復明兩目夜不見物羯羊肝一幅不見水忌鐵器以竹刀切開加穀精草細末入瓦罐內煮熟不時服屢驗雀盲又方石決明即海巴有窟的有眼的火煅為末三錢用豬肝一個或羊肝雞肝亦可用竹刀剖破將石決明子入內麵包燒熟白滾水送下服一個即效小兒青盲眼木賊草白蒺藜各等分研末炒豬肝食洗風爛眼方白礬銅緑花椒各等分外加槐樹條六寸水煎涼洗風火眼紅方甘石煅極細末用菜油調勻盅內將盅於復於艾火上熏至黃色為度臨睡調搽於眼上次日溫水洗淨其藥入眼無妨開瞽復明雞苦膽一個入蜜半匙以線扎住再入豬膽內吊房簷下通風不見日處二十一日去豬膽留雞膽先用人乳點患處潤之少刻用骨簪蘸雞膽點上遍身透涼流淚出汗二次即明忌茶百日可將霜降後桑葉待其陰乾煎湯代茶飲之明目枸杞丸枸杞一斤以酒潤作四分一分小茴香炒一分芝麻炒要黑者一分川椒炒一分枸杞獨炒加熟地一兩搗爛白朮一兩土炒白菊二兩甘草一兩共研末煉蜜成丸梧子大空心每服五七十丸鹽湯送下清肝明目散歸身一錢枳殼菊花丹皮防風薄荷各八分白芍八分川芎生地蒺藜各一錢柴胡荊芥各六分燈心三十根水煎食遠服弩肉攀睛蛤粉滾水飛過蕤仁乳香去油洗輕粉各一錢水飛過冰片一分麝香一分共研細末以筆尖蘸涼水點之又方以橄欖核一枚象骨一塊磨人乳點之此方並能除雲翳膜障極驗目中翳障取櫻薁藤俗名野葡萄又名甘苦子藤以水浸過吹氣取汁滴目中去熱翳赤白障目疾用羊膽一枚割開入蜂蜜一錢線扎兩手揉勻水煮一滾取出浸冷水內半日傾出內汁點之又冰片熊膽各一分研極細末點之亦效天絲入目石菖蒲槌碎左目塞鼻右右目塞鼻左即出煙渣入目凡好吃煙者並小兒誤犯切勿將湯洗愈洗愈痛恐致其眼瞎用亂頭髮或綜纓緩緩揉之眼珠無故湧出用羌活煎湯洗熏之即入眼上皮突一生紅疱懸如魚膽取過江蜘蛛纏之即脫凡蜘蛛牽絲搭過屋者謂之過江眼前常見異物諸般禽蟲飛走棗仁元明粉青葙子花各一兩共研細末每服二錢水煎連渣飲三服即愈又天絲入目取桑漿點之立效或用木梳上垢為丸放於眼角邊亦出或用好京陳墨點眼內再將新筆或燈草展出又方以白菜揉爛帕包滴汁二三點入目即出火炮火藥沖眼目瞎其人倒地急令人以熱小便澆之徐用自己小便洗眼目睛垂出至鼻或時大便血痛名曰肝脹羌活煎汁服數杯咽喉門咽喉十八種方豬牙皂去根去弦水二盅煎六分去渣入蜜少許或雞子清少許溫服即吐出風痰毒氣即泄勝用刀針雙單鵝喉用桑螵蛸燒存性研末以竹管吹入即破出血立愈又方山豆根不拘多少加麝少許吹入喉中立愈研為細末纏喉風又喉痹內外俱腫不拘大人小兒俱效急用遠志為末水調敷立愈皂角為末米醋調塗外頸上干則易之立破而愈急喉風咽喉腫痛急取雄黃及燕子泥將燒酒調勻喉外敷之涎出即開後用陳壁土煎湯飲之雙單鵝俱有神效恐雄黃及燕子泥不便用火紙數張燒酒浸濕貼喉外隨干隨換以熱導熱之義也吹喉散冰片三分殭蠶五分硼砂二錢五分牙硝七錢研細末吹患五分處神效喉啞奇方硼砂一兩元明粉二錢膽星二錢百草霜二錢訶子肉二錢冰片三分共研細末再用大烏肉一兩搗如泥丸龍眼核大每用一丸噙化喉閉症有十八種多因火勝結熱而成宜用山豆根搗汁含咽之即開或用醋浸一匙亦可喉症手足厥冷氣閉不通白礬三錢慢火熬化入巴豆三粒去殼研爛候乾去巴豆取礬研末用少許吹入喉中頑痰立出鎖喉咽津不下土牛夕根即鼓槌風根搗爛取汁男左女右滴入鼻中少頃鼻中有紅絲出即愈又方桑樹上所出黃菌名桑黃搗汁漱之立愈如干者磨水漱之又方李樹根八角刺根各等分清水調灌喉間即愈喉嚨腫痛甘草貝母黃芩黃連薄荷川芎各一錢桔梗三錢元參二錢水煎服喉痹冰片五分生礬三分麝香五釐石膏一錢為末吹患處立愈喉癰腫脹飲食不進者膽礬二釐含口內吐出惡涎自愈又膽礬研細釅醋調灌能治喉閉急症七寶丹治雙單乳鵝及喉風腫脹殭蠶炒全蠍去頭尾十個牙皂去子弦硼砂各一錢雄黃一錢白礬一錢膽礬五分為末吹喉多次即愈百靈丸治喉中結塊不通水食危困欲死百草霜蜜丸芡實大新汲水化服一丸立愈普濟方雙單乳蛾喉癰風腫吐咽不下命在須臾元明粉吹入喉中用井花水噙咽立效普濟方又方急覓頭上有紅疙瘩用針挑破亦愈急救方喉痹口噤不開牙皂一條用蜜水調和水煎如危急即服若勢緩再露一宿尤妙口噤撬開灌之垂危立醒保無方喉內生毒堵塞頸項腫脹危急之症癩蝦蟆一隻白礬三錢同搗爛敷之如干再換集驗方骨鯁在咽用栗子內薄毛皮燒灰存性研末吹入咽中即下又方用栗子肉上皮五錢為末鮎魚肝一個乳香二錢五分同搗丸梧子大看硬遠近以線系綿裹一丸水潤吞之可提線釣出也紫袍散治咽喉十八種症石青一兩青黛一兩硃砂一兩硼砂一兩膽礬人中白煅元明粉各五錢上冰片三分山豆根八錢共為末入磁罐塞口急時用二三釐吹入咽喉神效無比喉中忽生肉如桃如雲屋屋而起用綿裹箸頭蘸食鹽點肉上一日五次自消再服後藥桔連湯桔梗黃連倍加枳實炒前胡連翹去心陳皮防風半夏制柴胡南星白附牛子炒研赤芍莪朮煨元參甘草各等分水煎服纏喉風其症先兩日胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷閉氣不通頃刻不治巴豆七粒三生四熟生者去殼生研熟者去殼炒去油存性雄黃皂子大揀明淨者鬱金一個蟬肚者研細末上三味研每服半字茶調細呷如口噤咽塞用小竹管納藥吹喉中須臾吐利即醒喉中腫塞將鹽燒紅為末以雞翎溫水塗鹽於患處即消不必刺破恐傷人喉閉不通染色紅花搗汁服一小升如干者浸汁服喉蛾將雄雞肫內皮陰乾焙為末吹入喉中極效又方以花椒樹上蠶繭燒存性以箸壓舌頭將繭末吹入喉中即愈雙單蛾喉並喉痹方用壁上蜘蛛白窩取下將患者腦後頭髮一根纏定蛛窩上以銀簪挑窩燒存性為末吹入患處立消蜘蛛有花者有毒不可用神授治蛾喉風乳蛾急症也此方甚效有力者宜預製以救人臘月八日取割雄豬膽一個裝入白礬末陰乾之後研末再入臘八日豬膽內三四次偶遇患者用一二分吹之神驗雙單蛾神方凡雙單蛾頭頂上有雙紫泡謂雙蛾有單紫泡謂單蛾先用銀針挑破捏出紫血則患勢稍衰不緊矣若看不出紫泡謂之隱蛾先用桐油蘸於鵝翎上在舌根攪出痰涎俟鼻中知桐油臭即止再用馬蘭頭草搗汁同好醋含漱次即愈冬月無馬頭草用山豆根一兩煎極濃汁用醋漱亦效破蛾方冰片三分麝香三分皂角刺三分山豆根七分射干花七分共研末吹入喉蛾即破立愈來泉散治乳蛾良方雄黃一錢雞內金三個焙脆存性生白礬一錢共研細末入瓶收貯聽用令患者先用涼水漱口將小管吹入喉中即吐涎水立愈又以茜草搗爛取汁和米醋漱口或用鵝毛搽探喉中亦效喉內火毒兼治各喉風及小兒口瘡人中白煅一錢硼砂五分膽礬三分冰片五釐青魚膽八分共末吹喉患處乳蛾用無殼蜒蚰不拘多少同醃梅乾入瓶內久貯遇患含一枚咽汁即愈喉風濟急丸雄黃五錢川鬱金三錢巴豆霜二錢五分醋糊丸如緑豆大青茶送下二丸吐出痰涎而愈喉痹將死者以烏鯉魚膽點入即瘥病深者水調灌之喉蛾急不及藥以銀針刺破腫處出黑水再以無殼蜒蚰如烏梅少許搗爛裹亂髮在箸上塗前藥攪患處去其痰涎立愈熱結於喉腫繞於外且麻且癢者急用牽牛鼻繩燒灰吹之甚效經驗急喉鳳仙方急喉風殺人最速倘僻處窮居或病發昏夜一時醫藥不及救者急取病人兩臂緊捋數十捋使血聚大指上用油頭繩扎住指根針刺少商穴出血如放痧一般兩手皆然其甚者十指俱刺之一面以鵝毛蘸桐油或燈盞油探喉中引其吐出痰涎即咽生蘿蔔汁其喉自寬或用礬湯探吐亦佳若一起便覺怕冷畏風頭疼身熱者此有表邪礬湯酸澀不可服尤大忌梅子誤服酸斂便難挽回如無表邪方可服蜒蚰梅子然不若一起便咽生蘿蔔汁為妙再遇時行喉痹早晚嚼生蘿蔔數片可免此患其刺法屢試屢驗好生君子廣為流傳功德不淺兩大指圈處即少商穴又方用鴨嘴膽礬研細末以釅醋調灌吐出膠痰立愈喉風舌大如脬立時不救即死冰片一分火硝三分青黛二分膽礬二分殭蠶五分硼砂三分共研細末吹喉立愈又方以射干花根山豆根為末吹之取效如神奇效五寶散此散能治喉疼並口舌諸瘡及牙疼均效硼砂二錢五分雄黃三錢兒茶一錢冰片三分蘇薄荷三兩另研極細末共研細末和勻再入薄荷葉末研勻貯罐不可泄氣用筆管吹入少許或用茶匙挑入舌上含一會咽下日八九次若喉風口內乾枯者以井水調灌即能開關生津若脾瀉胃弱者不宜多用余無禁忌蛾風急救奇方一時或無藥救急即用柴灰沖湯數杯服之立效又方用火酒拍頸取麻下刮即刻見它磁針刺破仍含酒吮出血將鹽蛋泥封上即刻開關又方如蛾子生在喉窩為落井不能窺探急按魚尾穴按定用燈火三炙再於左右大指甲根離一韭菜葉寬針刺出血立效仍服加減甘桔解毒湯魚尾穴即手大指後窩處喉中忽硬一塊如龍眼大吞吐不出不下者用厚朴半夏茯苓紫蘇各二錢甘草五分老薑一片煎服立愈或用藥不及照前方用針刺手指甲出血亦愈喉痛及乳蛾舌疼用生青果連肉五兩燒灰存性黃柏一錢黃芩一錢青黛五錢上冰片二錢共研細末鉛瓶收貯勿令泄氣臨用以筆管吹之立愈口疳喉癬喉癰橄欖核煅存性三錢鳳凰衣即哺退雞子殼煅存性三錢兒茶三錢人中白三錢共研細末每用藥一錢加冰片三分吹搽患處頭痛門諸頭痛生蘿蔔汁用蜆殼令人仰臥注鼻中左痛注左右痛注右立愈兩邊痛注兩鼻中此方系宋禁中方也又或有加龍腦少許者偏正頭風不論男婦連筋極痛者用茯苓搗末每服二錢湯酒任下數服愈痰火眩暈用大黃酒浸九蒸九曬為末水丸如緑豆大每服百丸食後臨臥服清茶送下立效治偏正頭風立刻止痛方硫黃一錢川椒炒去目取椒紅三分上二味拌勻熔成小餅左疼塞左鼻涕從右孔出右痛塞右鼻正中痛左右俱塞清涕流出即愈神驗又方白芷炒二兩五錢川芎炒甘草炒川烏半生半熟各一兩共為末每服一錢細茶薄荷煎湯調下又方石菖蒲根搗汁酒沖服立愈至多不過三四服如無鮮者即以乾者搗要先水浸周時然後搗汁又方用鯗魚頭中分左痛用右邊魚頭右痛用左炭火上燒酒熏鼻其痛即止治偏頭風日久不愈者用上白麵一杯以水和勻為一圈敷患處右敷右左敷左著鹽於圈內上安艾葺一丸燃香火炙之徐炙痛止痛止勿炙又方蘄艾四兩白菊四兩用小袋盛放枕內睡久不發偏正頭風熏鼻方藁本五分細辛五分白芷一錢辛荑八分共研末分為四分用紙四條卷實將火點著以煙燻鼻日熏二次即愈頭風用陳蕎麥麵作餅乘熱貼於頭上患處外用絹扎好出汗風毒盡收入餅內兩次即愈太陽痛用生薑三片皮紙包水濕入火灰煨熱貼太陽兩邊兩片貼印堂中一片以帶纏之立愈頭昏每早用茯神四五錢將豆腐皮四五張以小罐煮之服頭痛發汗不出細茶二錢生薑二錢核桃肉五個蔥白五根共搗爛水煎乘熱服出汗即愈偏頭風神效一邊頭痛甚則害人損目用牛子二兩炒研細末每服三錢紅砂糖三錢二味和勻視人酒量之大小酌量多少用好燒酒燉熱調服稍醉即將棉被蓋頭出汗即愈如汗不多再服二三次頭眩暈倒方老年人更妙鮮白果二個去殼衣研爛空心開水沖服至重者不過三五服即愈普門醫品噎膈翻胃門反胃吐食樹上黃香櫞糞內浸七日再用童便內浸七日風乾煎湯服香櫞十枚要取樹上自然黃透者用蒲包包好入糞便浸七日陰乾焙燥研末每服三錢又方乾柿餅每用三枚連蒂搗爛用酒服甚效又方甘蔗汁一升入生薑汁二合溫熱作五次服效噎食不下鳳仙花子即急性子酒浸三宿曬乾為末和丸緑豆大每服八丸溫酒下不可多服多用又方人干屎入蘿蔔內火煅三炷香取研每服三錢黃酒下三服海上名方又方擇貞潔寡婦木梳一個燒灰煎鑰匙湯調下二錢生生編反胃轉食灶心土要年久者為末米飲湯服三錢百一選方又方韭汁二杯薑汁牛乳各一杯日日溫服本草方又方乾柿餅乾飯二味日日同食之勿用水飯如法食之其病自愈驗方此方以柿餅雜飯內同蒸食完不用吃茶水旬日後見效此仙傳之方也神效噎食二十七方生薑不拘多少五月五日午時用布袋裝好浸於不見天日之東廁內四十九日取起掃去穢物懸空吊曬極干為末病二年者用薑末三分病一年者用薑末二分入麝香一二釐沖白滾水與病者吃下只一服而愈服藥後不可任病人吃飯須先飲米湯一二日方可少吃稀粥六七日後方漸漸吃飯總以少吃為妙忌暈腥鹽醬並醬小菜五十日永不再發此方極應異常好善者宜多預製廣為流傳救人濟急功德無量噎膈患此症者胸前必有兩小骨漸漸交合不能進食以致飢餓而死取熱鵝血不用鹽飲之則胸前二骨俱漸化去須要多取幾隻鵝血飲之即能飲食而愈又屢驗方取小兒胎髮一個以陰陽瓦焙焦存性研極細末陳酒送下即愈翻奇胃方藕二枝風乾三四日去其頭二三段單吃藕稍一段吞汁吞渣一日一段二日服完即愈膈食驗方大豆即羅漢豆或炒或煮頻頻食之久則自愈蓋此症諸物不能下咽惟食此無礙以其相畏也中膈方白水牛喉管一條竹刀刮去內膜不可見水米醋洗淨銅刀切片再用醋浸冬月浸七日一日一換夏月浸三日一日換取起濾干用新陰陽瓦分作數次炙乾如蜜黃色為度研細末磁罐收貯每服一錢病人先以甘草荊芥湯漱淨去涎然後服藥生白酒調下滾白湯亦可下如病久一服不開再一服無不愈者自腸至腹作響主吐痰涎無限或往下未定腹空即欲食先以清米湯一二盅飲之再以稀粥少用小碗稍愈切忌房事惱怒鮮魚大葷生冷麵食硬物一百日之後食粥飯宜少不宜多自不發也牛喉囑託屠人覓慎勿特傷保我生膈疾開關元明粉六七分沖燒酒服立開又方蘆薈六七分沖燒酒亦開膈食麥冬一斤糯米糖一斤入酒內煮三炷香埋土內一七起出飯後若膈熱飲少許即下又方用土內或牆內三五十年陳碗盞碎片搗碎取極細末水飛過用麥冬湯沖服三錢即愈要三五服反胃用籠養白雄雞一隻飼以白米五七日後其腸嗉俱淨拋糞色淨白餓一二日取小蛇一條將蛇切斷先以頭尾中截飼之其餘不飼亦可雞食蛇後所拋之糞以陰陽瓦焙乾用燒酒吞一匙即愈小蛇即鱔魚又方取雞肫鴨肫鵝肫內黃皮炕灰存性為末開水化服一二錢即愈又方取果子貍頭一個煅為末酒送下一二錢亦效又方以大魚內小魚焙乾為末以生酒沖服又方取真虎肚煅為末酒送三錢一二次最效又方取豬母糞煅存性研末砂糖服之又方每晨用滾水半碗涼水半碗服之可斷反胃仙傳反胃奇方燕子舊窠陳糞炒焦為末取白頸蚯蚓數條去泥用淨腈肉切碎加椒為肉餅煎熟服之即愈又方取陳倉米飯焙乾五兩入沉香五錢共末和勻米飲送下三錢又方白礬半生半熟每服五七分冷水送下膈疼蜣螂十個水壇浸之取出去足翅新瓦焙乾存性為末蜜丸梧子大每日服一丸白湯下服完之日用紋銀一錢打丸十粒用葳蕤四兩黑砂糖四兩入水同煮銀丸一晝夜日服一丸自愈仙傳膈食方雄羊膽雄鵝膽各一具明雄精二錢共為末入豬膽內懸陰處二十一日候乾取用每用四五釐即開關通引諸膈疾黑砂糖一斤連皮老薑一片共搗成膏入磁罐封固埋入乾燥淨土內七日取出每日和滾湯服之反胃回食水糝不進即刻回生夏日中伏天糞坑中蛆愈大愈好撈出以長流水洗淨用桶瓦二個盛蛆在內鹽水和泥將瓦兩頭封固木炭火煅一炷香煅至蛆身黃色如尚未黃再入砂鍋焙黃最忌用鐵器銅器每服用黃蛆一錢五分細松蘿茶七分五釐廣木香一分五釐制豆蔻四分五釐共研極細末五更時空心溫燒酒半茶盅調服如不能飲者水酒調下切忌麵食葷腥數日又方用頂大枳殼兩半個去內穰將真阿魏六七分杏仁去皮尖十餘粒共搗爛入枳殼內將兩半殼合口外用棉紙裹好線扎緊入滾水內大火煮半日取去殼內藥將殼焙乾為末燒酒送下重者不過二次即愈初起者神效久難見功噎食轉食黃鱔魚一條用無灰黃酒量魚大小酌酒多寡煮酒干為度連皮帶骨用淨砂鍋焙存性研末病勢重者每服三錢輕者每服二錢五分為止不可多用黃酒調服若在上半月其效尤速下半月其效較遲三服見功五服痊愈愈後宜薄淡飲食陸續吃稀粥可已忌一切思慮籌度葷腥蔥椒酒色財氣切宜慎之轉食用靛花水送下服藥後恐受寒宜常吃些薑湯尤妙五噎五膈多取生荸薺十餘斤風乾日逐早晝夜每服五七個服半月即見奇效此方已經驗過余母患此症曾服此方已服半載即獲痊愈仙傳反胃及膈食病靛青葉曬乾收好三錢薑一錢水一碗煎一茶杯用米一酒杯日煮粥一碗俟前藥煎好即將粥預備服藥後即將粥吃下不必吃飯又將藥再煎過半日又服飲以粥投下三日三服即愈不再吃他藥每日吃粥二三碗十日方可吃飯百日不可吃鹽此病復反不可治矣厄逆門厄逆不止川椒四兩去閉口及子炒研面和丸梧子大每服十丸食遠醋湯下神效邵以正經驗方又方荔枝七個連皮核燒存性為末白湯調服立止楊拱傳方又方以黃臘燒煙張開口熏二三次愈上氣厄逆砂仁炒研生薑連皮各等分搗爛熱酒食遠泡服二錢極效胃冷厄逆氣厥不通母丁香三個陳橘紅一塊炒水一盅煎半盅食遠熱服十便良方偶然厄逆不止以紙捻鼻孔得嚏即止常發者頻飲柿蒂湯自愈簡便方凡厄逆不止聲聞鄰家用刀豆子燒存性研末白湯調服二錢即止咳嗽門遠年痰火飴糖二兩豆腐漿一碗煮化頻服自愈隔年老痰不論男婦老積老痰或發喘或氣促湯藥不效者用蜜陀僧一二錢砂糖調白滾湯送下痰與藥從大便出無礙久咳嗽連四五十聲者生薑帶皮搗自然汁一勺加白蜜二匙同放茶碗內煎一沸溫服二三次即止暴失音用公豬板油一片入鍋熬油濾去渣入白蜜一斤再熬少頃濾淨投磁器內冷定成膏不時挑服一二茶匙其音漸清並能潤肺化痰丸治一切風痰老痰眩暈發病久不愈者生白礬一兩細茶五錢為末煉蜜成丸梧子大食遠薑湯下五十丸久服痰自大便出鄧筆峰傳痰氣喘急蘿蔔子炒皂莢燒存性各等分共為末薑汁和煉蜜丸梧子大每服五十丸食遠白滾湯送下便元集方又方瓜蔞仁五個明礬一塊如棗大同燒存性為末以熟蘿蔔蘸食藥盡病除普濟方乾咳不止白蜆殼為細末米飯調服一錢日三服救急方痰結胸中氣不升降不能飲食蜜陀僧一兩好醋一盞水一盞同煎乾為末每服二錢以熱水半盞入酒半盞空心溫服少頃吐出痰涎即愈聖惠方又方以白果煨熟降痰定喘溫肺肺燥咳嗽松子仁一兩胡桃仁二兩研爛和熟蜜五錢收之每服二錢食後沸湯點服外臺祕要又方鮮百合四兩和蜜蒸之時時含一片咽津聖惠方痰嗽帶血大柿餅飯上蒸熟批開每用一枚糝真青黛一錢臨臥食之薄荷湯下哮喘方凡天雨陰氣觸動即發坐臥不得飲食不進淡豆豉一兩去皮尖明礬煅用三錢白砒煅過一錢共搗如泥將此藥約做丸五百粒用溫茶半盞每服九粒十一粒十三粒十五粒為止量病輕重孕婦忌服五聖丹南星半夏陳皮各一兩甘草五錢先以南星半夏研末薑汁皂角汁拌勻同陳皮甘草共為末和餅取竹瀝一碗將餅浸濕焙乾又浸又焙以瀝汁盡為度再研杏仁四十九粒蜜和為丸薄荷湯下久服可以斷根神效治大人小兒吼疾仙方雞肫內黃皮三錢人參一錢真膽南星五分蘇葉二錢共研細末竹葉薑汁煎調服大人一錢小兒五分或七分連服三四次即愈咳嗽川貝母茶葉各一錢冰糖三錢共末滾水送下久嗽不瘥黃明膠淡豆豉薄荷各一錢蔥白一寸煎湯時時溫呷之老人痰盛氣壅時喘懶食紫蘇子白芥子蘿蔔子各二錢微炒研末煎服又方蘇子芥子蘿蔔子南星制半夏泡赤苓去皮片苓各八分陳皮去白枳實麵炒各六分甘草二分薑一片引水煎服咳嗽異方蘿蔔切下一蓋挖空心用蜜灌滿自早曬至晚露一宿次早仍用原蓋蓋上早晨飯上蒸熟滾水空心常服妙久咳成癆鳳尾草為末將魚鮓蘸食之痰火症真麻油三兩牛黃五錢明礬一兩研末浸油內痰火發時服一二匙白沸湯下或不用白湯下亦可七粒金丹及治哮吼之症神效將瓦放火上燒紅放鵓鴿糞於紅瓦上自然成灰研細好酒送下二三錢即愈治哮病方哮有虛實之分熱哮鹽哮酒哮皆虛症也寒哮實症也寒哮遇冷風而發熱哮傷熱傷暑而發治各不同虛哮麥冬三錢桔梗三錢甘草二錢水煎服一貼即愈不必加去痰之藥加則不效不能斷根另有良藥實哮百部二錢炙草二錢桔梗三錢半夏一錢陳皮一錢茯苓一錢五分水煎服二貼即愈斷根方用海螵蛸火煅為末大人五錢小兒二錢砂糖拌勻調服一貼即除根如不服上煎藥止貫得半也上煎藥如熱哮加元參三錢冷哮加乾薑一錢鹽哮加飴糖三錢酒哮加柞木三錢又鹽冷哮方每早清晨服豆腐漿愈又冷哮方茯苓乾薑各一兩南星石膏各七錢生半夏杏仁各五錢共研細末每服三錢烏梅湯燈心湯服痰喘五味子枯白礬各等分為末每服二錢以炙熟豬肺蘸末藥細嚼白湯下吼病神效使君肉緑豆粉各四兩枯礬生礬各二兩杏仁一兩明雄一兩陳茶一兩白信六錢信茶共炒研末再合各味研末麵糊為丸如黃豆大硃砂五錢為衣每日早中晚服三次用陳茶送下每服三丸五丸量病輕重服之自效又方用野貓肝焙乾為末蜜和丸梧子大每服十丸薑湯送下極有應效咳嗽不問遠近經霜萆麻葉經霜桑葉御米殼蜜炒各一兩此苗葉名無憂草共末蜜丸彈子每日一丸白湯下痰咳不寐面浮蚌粉新瓦炒紅為末入青黛少許用淡干鹽菜煎水一杯滴麻油數點調服咳嗽失聲潤肺湯訶子五味子五倍子黃芩甘草各八分水煎服咳嗽每歲用女貞子二個如三十歲用六十個取水二杯煎一杯服女貞子即冬青子也煎湯洗眼如常明目之良方也老人喘嗽胡桃肉去皮杏仁去皮尖生薑各一兩共研膏入蜜少許丸如彈子大每臥時嚼一丸薑湯下氣促難臥服此立效三子養親湯治老人痰喘咳嗽氣急胸滿紫蘇子蘿蔔子白芥子各等分曬乾紙上微烘炒研煮湯隨飲嚼子咳嗽上氣用合州乾薑炮皂莢炮去皮子及蛀者桂心去皮取紫色者並搗篩各等分煉白蜜和搗三千杵丸梧子大每飲服三丸嗽發即服日三五服禁食蔥面油膩其效如神昔劉禹錫在淮南與李亞同幕府李每治人不出其方或消其吝李曰凡人患嗽多進冷藥若見此方用藥熱燥必不肯服故但出藥即多效也試之信然血症門暴吐血方廣陳皮生甘草各五錢為末每服一錢五分燒酒調服立刻止血吐血成鬥病在須臾管仲五錢為末頭髮五錢燒灰存性側柏葉搗汁一碗將藥末入內用大碗盛之重湯煮一炷香取出入童便一杯黃酒少許徐徐服之吐血雞蛋一個打開和三七末一錢藕汁一小盅再入灑半盅隔湯燉熟食之不過二三枚自愈又方百草霜五錢山村人家專燒草窩底者更佳槐花二兩共為末每服二錢白茅根煎湯下此藥火中有水輕浮無毒不傷臟腑又方亂髮燒灰水服二錢一日三服上下諸血通治或吐血或心衄或內崩或血上出血如箕孔或鼻衄或下便出血並皆治之引血歸經方當歸酒洗三錢白芍酒炒二錢熟地五錢川芎一錢荊芥穗一錢炒黑生地酒炒五錢麥冬五錢去心茜草一錢甘草一錢水煎服極穩吐血神效方肉桂五分去粗皮研不見火川鬱金八分當歸七分桔梗一錢蘇子八分炒研枳殼七分麵煨大黃八分酒略煮厚朴八分薑汁炒水煎六分另加童便半盞薑汁二茶匙服二劑又照後方服十劑續斷一錢丹參五分山藥四分赤芍七分川貝母一錢去心益母草三分麥冬一錢去心遠志六分甘草水泡去骨不用引水煎服汲古堂李文先傳又方用藕節搗煎湯調白茇末服下即止兼治衄血咯血均效偶然吐血生韭汁磨鬱金陳京墨一盅服之效吐血不臭可治以本人之血取來用砂鍋焙乾為末每服一錢二分麥冬去心煎湯下吐血不止以白雞冠花醋浸煮七次焙乾為末每服二錢熱酒調下七生湯治血向口鼻中出如湧泉者生地黃生荷葉生韭葉生茅根生藕汁各一兩生薑汁五錢俱搗自然汁一碗磨上京墨同汁服元霜膏治咯血吐血虛癆咳嗽神效烏梅汁梨汁柿霜白糖白蜜蘿蔔汁各四兩生薑汁一兩赤苓末八兩乳汁浸曬乾款冬花紫苑末各二兩共入砂鍋內熬成膏丸如彈子大每服一丸臨臥含化咽下又吐血方凡吐血切不可服藥只取自己小便一味可以除根每朝晨起將隔宿小便溺去稍食米食點心靜坐一室不可説話亦不可立起惟閉目靜心用藕二三片薇搗泡湯置壺內隨斟隨飲俟湯漸完即欲小便用潔淨大碗盛受其色白如泉味極淡乘熱吃下以南棗二枚咀嚼自不噁心吃後徐徐行十數步仍靜坐半時忌蔥薑椒蒜辛辣之物飲至半月即可除根矣每逢節氣照前飲幾日更妙治癆病虛病神方此方專治氣血兩虛骨蒸勞熱身體羸瘦四肢痠軟精神倦怠腰疼脊痛飲食不進以及陰虛吐血咳逆一切不足弱症服之屢效症輕者二三料痊愈症重者四五料除根即無病常服可保身強神旺此方極效極應余得之異授見者廣傳功德無量枇杷葉五十六片新鮮者更佳如無即乾者亦可凡咳盛者多加倘不咳嗽者不必用多洗淨葉上毛大雪梨二個深臍者佳去皮心切片用白廣蜜一盅先熬滴水成珠大便乾燥者用大便溏泄者勿用大棗半斤或黑圓徽棗皆可建蓮肉四兩不必去皮尖先將枇把葉放銅鍋內或砂鍋用河水多煎幾滾取湯用絹濾清汁其煎過葉去葉不用後將梨棗蓮肉同拌放鍋內鋪平然後將所煎枇杷葉清汁淹滿略高些蓋好煮半炷線香翻轉再煮半炷線香用磁罐收貯隨意溫熱服之最益臟腑棗煮熟乘熱剝去皮虛弱咳嗽者頗多若不早治致肺虧損則難醫治惟此方治咳嗽效應如神如虛弱並不咳嗽者枇杷葉不用只用河水同煮咳嗽多痰者加川貝母一兩研極細末俟煮熟時入內再一二沸取起若吐血用藕節搗汁同煮冬月多制久收不壞夏月少制供一二日食虛勞骨蒸癆熱服之如神當歸大熟地各三錢川芎白芍炒各二錢柳樹根酒炒一兩水二盅煎七分不拘時服治癆怯妙法凡男女患一切癆怯但有脈有神者無不效應上好箭頭砂一兩透明雄黃五錢以上二味研為細末單層綿紙包固男患選未曾行經十二三歲壯實重女將藥貼放童女臍內汗中拴縛一周時取下稱藥三二錢者更妙即刻拴於病人臍上先備人乳十杯候病者口乾發燥飲之渴止然後解去臍上之藥其病自去再用補藥調理十活八九女患用未曾破陽十二三發童男壯實者余均照前法癆症症吐血無論年深日久服此方大有奇效龍眼十六個連皮打破核桃十六個去皮用仁紅棗十六個去核建蓮十六個去心雄黑豆一歲一粒松蘿茶葉三錢用白布包三大碗水煎一碗服後將諸樣藥陸續食之服三服後去松蘿茶添白果十六個連皮打細去殼去心再服三劑即除根永不復發又方凡癆症受補能絶酒色並賭博勞神等事其命可保白蓮藕搗爛取汁一斤人乳四兩白蜜四兩三味攪勻以磁瓶盛放水鍋內蒸一炷香早晚服一盅此藥忌飲茶如渴煎白水飲之自愈吐血勞傷川活黃鼠狼一個裝入黃砂瓶蓋好以泥封口用炭火炙一炷香時候將鼠成灰取出伏地氣一日和六味地黃丸一料每日淡鹽湯送下吐血不止荊芥連根洗淨搗汁半盞服或用干穗為末生地黃汁調服二錢癆怯陰虛發熱火乘金位吐血咳嗽用多年瓦夜壺一把入二斤重鰻魚一條鹽泥封固炭末炙透打碎夜壺取壺內人中白並鰻魚灰研末每日米飲服二錢三錢神效舉重傷肺吐血白茇為末米湯調服治嘔血咯血亦良諸失血病紫蘇不拘多少入大鍋內水煎令乾去渣熬膏以炒熟赤小豆為末和丸梧子大每日黃酒下四十丸勞心吐血糯米五錢蓮子心七枚煎湯服此張上舍方積熱吐血馬勃為末砂糖丸如彈子大每服半丸冷水化下鼻衄不止乾薑削尖煨塞鼻中即止吐血及下血口鼻中俱出血如泉湧須臾不救荊芥一兩燒過蓋地上出火毒研末米湯調下三錢連進二服立止又方鍋底煤研末米湯調下錢許亦妙凡吐血吐出全是血而多者謂之吐血與痰中帶血者異而暴吐全是血者急用全當歸一支有三四兩重者更佳切碎用好陳黃酒一斤漫火煎至一滿碗頓於鍋中以溫為妙候將吐未吐口中有血含住取藥酒連血嗽下服二劑決愈斷不復發每有醫家云吐血要戒酒不知灑煮當歸乃引血歸經之藥故其效如神五勞七傷咳嗽吐血等症白蒺藜二斤炒過春去刺為末枸杞一斤漫火炒不可過焦南黑芝麻二斤炒極熟研成芝麻鹽樣牛骨髓二斤化開去渣生白蜜二斤化開去渣上將三味藥末拌入隨蜜內和勻盛磁盆內放在水鍋中鍋上蓋蒸籠下用微火蒸熟為度丸如指頂大隨意食之白沸水送下吐血方取胭脂花根燉腈豬肉食之即愈又方取藕節荷蒂各七個以蜜少許擂爛用水二杯煎八分去渣溫服或為末作丸服亦可吐血不止乾薑為末童子小便調服一錢即止嘔吐門橘皮湯治男婦傷寒並一切雜病嘔穢手足厥冷橘皮四兩生薑一兩水二升煎一升徐徐呷之即止凡人嘔吐服藥不納者必有蛔在膈間聞藥即動動則作嘔藥出謂之蟲嘔豫嘔吐藥中加炒川椒十粒服之可止蓋蛔見椒則頭伏也戴原禮方胃冷噁心食即欲吐白豆蔻三枚泡去子搗細灑一盞溫服再飲數杯佳凡作惡心嚼白豆蔻子最妙仲景備急方乾嘔不止薑汁一分甘蔗汁四分溫服日三次噁心頻嚼生薑自止脹滿腫蠱門四肢腫脹乾雞糞一斤炒黃酒三碗煮一碗濾去渣飲之少頃腹中動作瀉一二回次日以田螺二個滾酒煮熟食之即止取線雞屎更妙按本草雞屎白微寒無毒治中風痰迷療瘕症鼓脹利大小便用之有奇效此等方不宜與病人知之又方白雞屎半斤酒一斗浸七日日飲三杯或為末下二錢又方盧絲烏焙乾為末酒服效水臌兔絲子洗淨車前子大蒜白蜜各四兩盛入健豬肚內用水取河內水更佳置砂鍋內煮熟抖去藥渣將肚再入原汁內煮爛食之重者用二三個肚服之即愈愈後戒鹽一百二十日小兒腹脹雞屎一兩丁香一錢蒸餅丸米湯下一錢按以上五方治一切水腫濕腫氣腫肚腹四肢發腫皆效不可以其賤猥之物忽之此峨眉山僧傳奇方醫者權用不與病人知之亦可十種水病腹滿喘促不得臥土狗五枚焙乾為末白滾湯服一錢至小便利為效清河餅治水腫膨脹大田螺四個大蒜五個去皮車前子三錢三味為末研成餅貼臍中以手帖縛之貼藥後少頃水從小便中出其腫立消五種蠱楝樹皮焙為末米飲調服二錢又方雄黃白礬各等分為末黃臘化溶成丸每服七丸又方胡荽絞汁半升和酒服之立下神效中諸蠱毒白礬細茶等分為末新汲水調下二錢吐瀉即效未吐再服二錢婦人血蠱馬鞭草劉寄奴煎湯服治血蠱之神藥或為末服按嶺南有此病而此物亦易得以其有解毒消熱之功也試蠱法用鹽四兩炒熱絹袋包放臍上水蠱鹽化水食蠱變鹽紅色血蠱鹽變紫紅色氣蠱鹽變紫黑色氣虛中滿本色遍身黃腫百部洗搗罨臍上以糯米飯半斤拌灑半合以布包住蓋在藥上一二日口中有酒氣則水從小便出腫自消矣臌脹取蓋屋陳稻草煎湯傾盆內先坐盆上熏待湯溫頻沃其腹小便隨下黃水如是兩三次永不復發解蠱毒次淫術也廣東有之藏於魚肉害人毒在上則服升麻以吐之毒在下則服鬱金以下之或合升麻鬱金服之不吐即下宋李巽岩侍郎為雷州推官鞠獄得此方活人無算見範石湖集臌脹奇方黃牛糞三兩男用雄女用雌陰乾炒為末每服一兩酒三碗煎一碗絹濾去渣飲酒三服即愈垂危者勿救不可以汙穢而忽之並勿令病人知也食蠱雄雞七隻先餓一日後以穀米喂之取糞焙乾以葛布袋盛之煮燒酒水酒二壺不拘時飲氣臌陳香櫞多年者佳以布袋盛放清糞坑內浸一晝夜取出曬乾再清水浸一晝夜取出仍放坑內如此制五次曬乾切片用新瓦焙黃色存性研為末以黃酒服空心每服一丸三次愈又方白蘿蔔汁浸砂仁炒乾連浸連炒數次後將砂仁為末每服一錢米湯下數服必效水臌起病時頭腫四肢腹肚俱腫大烏魚一個重六七斤的帶殼砂仁從活魚口中塞入俟填滿用水和黃泥通身裹沿用炭火煨一夜其內成黑灰樣取出研細末每日用五錢淡開水送下中滿臌脹陳葫蘆瓢三五年者一個以糯米一斗作酒待熟以瓢於炭火上炙熱以酒浸之如此三五次將瓢燒存性研末每服三錢酒下神效又水臌方此方百發百中可除患根紅芽大戟一兩杭州者佳連珠甘遂一兩芫花一兩醋炒淡澤蘭一兩五錢苦葶藶五錢另研先將前四味研細末後加葶藶末和勻酒煮糊丸梧子大每服二十丸量人虛實加減其藥引湯液俱先煎好候用次日五更空心服第一日煎商陸湯送下取黃水第二日煎燈心湯送下取黃水第三日煎麥冬湯送下取白水第四日用田螺四枚煎酒送下取腹水第五日用大鯽魚二尾煎酒下取五臟六腑水皆盡第六日煎木通湯下第七日煎枝子湯下腫消臌散忌食鹽醬房事再服善後之藥七日畢方服鹽醬開鹽醬服藥方赤芍藥白朮白茯苓澤瀉各等分共研細末用鮮鯽魚一尾剖其腸入鹽麝少許將前四味裝魚腹內火上焙乾為末每服二三錢殭蠶湯送下經驗水臌方裕州養生龔方遂云水臌者乃寒茶冷水積聚所成溢於皮膚是為水臌非外感風寒內因脾胃虛寒也惟攻去積聚使水從大便而出則小便利而病去矣補益之藥只可微施於病愈之後斷不可施於正病之時此屢驗之論也豫嘗患此症按書載各方治之勿瘥遇一雲遊瘍醫教服雷音丸而痊雷音丸巴豆二兩去仁不用只用豆皮每豆二兩可得皮三四錢微炒黃色萬不可用豆仁一粒西砂仁一兩炒川大黃三錢半生半炒乾薑三錢炒黑廣木香三錢牙皂二個去筋炒甘遂一錢五分炒黃色上七味共研細末絹節過醋打麵糊丸如緑豆大鍋底煙煤研細為衣曬乾每早空心薑湯送下三四十丸每服可泄水一二次日服日瀉日瀉日消大便漸實小便漸長漸白服至水盡為度但須量人老少強弱瀉之多寡加減丸數不可拘執此藥治病多則一料少則半料必愈並能兼治酒積食積俱獲奇效珍之祕之慎勿妄授匪人如仁人君子亦當傳流此藥雖泄而不傷元氣凡水臌服藥後切忌鹽醬一百多日若一患鹽醬再病不救矣醋用臘醋煙煤即百草霜宜用燒雜草者佳甘遂用甘草水浸三日日換一次要看水無黑色為度然後用麵包向火煨之面俱黃色為止但甘遂以甘草相反在醫者善用之蓋甘遂性烈去其暴也凡水腫服藥不全消者以甘遂未塗腹繞臍令滿內服甘草水其腫便去氣臌水臌奇方頭生男胎臍糞一具頭生雞子一枚將雞子敲一孔傾盡清黃將糞填滿殼內用厚紙封好候母雞抱卵日同抱二十一日取出將糞研極細末預選好沉香木簡一個將糞入筒內上蓋以水銀一兩養之再用黃臘封固筒口常帶身邊借人氣養之遇用時傾出水銀以骨簪挑糞按男左女右點大眼角內如系氣臌則下氣水臌則小便多俟腹平如常仍用調補之藥收功又方芫花三錢研極細末芝麻三錢同入白麵烙為焦餅食之滾白水下忌鹽醬一百二十日敷脹消脹歌活鯽魚連腸用二個麝香開竅一錢真兩般搗如泥一樣燉熱敷臍布扎均熱手時時臍上尉腹中垢物潰頻頻忌鹽百日君須記臌脹全消廣濟人又水臌方取陳敗鼓皮一塊燒存性沖酒服水即泄瀉而下臌症奇方用烏魚二斤一尾者去腸淨入皂礬二兩外用粗紙打濕包好入粗粳火內煨午時起子時止取出去紙灰骨只用淨魚皂礬研末收貯每服三錢老米湯下此藥行而不泄最為神效水腫尿少以針砂醋煮炒乾豬苓生地龍各三錢為末蔥涎研末敷臍中約一寸厚縛之待小便多為度日二易之入甘遂更妙德生堂方腰痛門腰痛難忍用絲瓜根燒存性為末酒下二錢立下又方以大刀豆角殼燒存性為末沖好酒服立止男婦腎虛腰痛小茴香為末煨豬腰子服用濕紙包煨以腰子批開將茴末糝入在內煨熟空心食之鹽酒送下腰痛如刺面腫垢黑血氣虛憊發落牙枯唾涕痰涎腰脊並痛不能行立鹿角銼屑四兩炒黃為末酒下二錢加牛膝更妙閃逆腰痛杜仲故脂核桃肉各等分酒煎服又方糯米一二升炒熱盛囊中縛於痛處細研入八角茴香三錢以鹽酒隨時服之均效凡閃折並打傷腰疼及手足傷損未經出血但有青紫內傷者先以蔥白搗爛炒熱將痛處偏擦用生大黃研末薑汁調敷即儘量飲好酒有童便對服更妙腰痛用豬腰一付去內膜裝破故脂杜仲末線扎好將黑料豆三合以豬腰子放豆中水比豆高一紙少入鹽兩匙煮三四滾悶一時去其藥末將腰子空心嚼吃料豆常吃不過三服其痛自愈六合散治腰疼不能步履傴僂不伸杜仲炒斷絲肉蓯蓉酒洗去鱗甲川巴戟小茴香淨青鹽補骨脂鹽湯浸浮水面者掠去不用各等分共研細末聽用再用羊腰子二個將竹刀剖開散藥末在上仍合住外用熟麵包好微火煨熟好酒送下腰腿中濕冷疼痛年久不已屢驗方當歸酒洗熟地久制白芍酒炒川牛膝石斛酒焙茯苓各一錢川芎木瓜肉桂防風獨活各五分廣木香炙草各三分生薑一片黃酒半盞水二盅煎一盅空心服銼閃腰痛神麯一塊如拳大火燒通紅淬酒二大碗飲之即愈定風丸治半身不遂日夜骨疼川烏附子草烏各三兩俱用生薑煮過川椒二兩共研末酒糊為丸如緑豆大每服九丸早午晚日服三次空心酒送下此料藥可治數人藥酒方生地熟地枸杞木通川牛膝川芎苡仁當歸金銀花各二兩五加皮蒼朮各一兩川烏草烏各五錢黃柏甘草各四錢五分松節四兩以上好酒十六斤煮三炷香埋土退火早午晚日三服腰疼骨痛不拘何處五加皮三錢胡椒七粒鼠糞頭尖者三粒頭圓者四粒薑三片好燒酒一斤煮一炷香食飽略後儘量飲取微汗輕者一次重者二三次以愈為度腰腿疼痛甜瓜子三兩酒浸十日為末每服三錢空心酒下腰痛如刺用八角茴香炒研每服二錢食前鹽湯下外以糯米一二升炒熱袋盛拴於痛處又方八角茴香杜仲各炒研三錢木香一錢水一杯酒半杯煎服思仙散強筋健骨大力丸以肉蓯蓉同鱔魚二味炒研作末以黃精煮汁作丸服之可力倍於常出乾寧記黃疸門黃病奇方此症由肝膽之熱令人目黃至遍身金色久則腰腳俱軟行動倦怠取桃竹根鬚剪下洗淨不拘多少先炆酒服二三次後蚊腈肉食二三次即愈又方清明時勿令雞犬婦人見取東引桃根細如筋若叉股者一握切細以水一大升煎一小升空腹頓服後三五日其黃離離如薄雲散開百日方平復也黃散後可時時飲清酒一杯則眼中易散否則散遲忌食熱面魚肉等物此是徐之才家祕方也又方乾麵干蒸熟砂鍋片四兩研細末砂鍋系煤炭燒成者要常煮油葷的方好以二味煉蜜為丸每服三錢服久面色發黑然後男人用薄荷湯女人用紅花湯下再服幾次面色還原即不用服又方用茵陳二兩矮黃梔子根三兩二味煎湯數升每日自早至晚當茶飲服至七八日而黃自漸退服十餘日即愈服此方之時須要忌吃茶口渴只飲此藥又方遍身焦黃目睛盡黃病最遲延川廣多有之以黃蜜燒酒錠粉各等分和勻令人揉擦前後心起去黃數次可瘥又方黑棗二十個蒲黃五錢煎湯服又方馬鞭草煎湯常常飲之自愈又方皂礬八兩面一斤和作餅入火內煨焦為度蒼朮米泔浸厚朴薑汁炒陳皮甘草各六兩川椒去閉口及椒目十兩共為末好棗肉三斤煮熟去皮核桃三斤去皮同搗成膏丸梧子大每服七八十九酒服初服覺香愈則聞臭矣黃疸腫脹砂仁一兩川椒一兩去目及閉口者針砂三兩大麥不拘多少炒磨粉大黑棗一斤去皮搗爛共前藥拌勻搗和成丸梧子大若丸不就將前粉打糊為丸每服二錢好灑送下早晚進服又方皂礬一斤面一斤水和為餅將礬包在餅內放灰火中漫漫煨焦連面為末以煮熟紅棗去皮核搗和為丸梧子大每服五十丸滾湯下制一斤可治二人扣在臍上一寸許汗巾縛住越一晝夜解下腹上自起一大泡用銀針從泡下面刺破漸漸流出黃水水儘自愈如草無鮮者以乾者為末水調照前法用亦可黃腫水腫名推車丸用明礬二兩青礬一兩白麵半斤炒令赤以醋煮米粉為丸棗湯下三十丸愈後忌鹽百日黃疸食茶青礬四兩入小壇內泥封火煅一夜取出紅棗三斤煮去皮核共搗為丸每服三錢或酒下或水下黃胖方取饅頭一個用竹刀剜開其口不可大四圍不可擦破將皂礬填滿在篾上烘松燥莫使大焦搗如細面沸水和丸如桐子大每服二錢或一錢五分量人大小服之又方治面色眼色鼻水唾津小便指甲俱黃者冬瓜煮酒早晚飯時服連服數日漸退愈血症黃疸緑礬四兩百草霜一升炒麵半升為末砂糖和丸梧子大每服三四十丸食後薑湯下鄭時舉先生傳又方小麥淘淨一斤皂礬半斤同炒黃為末黑棗肉半斤搗勻米醋打糊丸梧子大每薑湯下八九十丸一日三服脾病黃腫青礬四兩煅成赤珠子當歸四兩酒醉浸七日焙百草霜三兩為末以浸藥之酒打糊丸如梧子大每服五丸至七丸溫水下一月後黃去立效又方緑礬四兩百草霜五倍子各一兩木香一錢為末酒和麵為丸梧子大每空心酒下五丸至七丸取黃法屢試屢驗用扛連紙一張裁為四條筆管卷如爆竹式將一個用糊黏固外用黃臘一兩鐵銚溶化將紙筒四圍澆勻不可使臘入筒內令患者仰臥將臘筒套在臍上再用面作圈護住筒根勿令倒勿令泄氣筒頭上點火燒至筒根面圈處剪斷另換一新筒再燒看臍中有黃水如雞子清者取出輕者熏四五筒重者熏二七或三七或七七筒總以取黃水為度神效黃疸尿赤頭髮燒灰水服一錢日三次祕方也黃胖方馬蘭頭根杵汁半碗沖酒服之每日一服半月即愈四寶丹治黃疸使君肉二兩檳榔一兩南星一兩薑汁製如吃茶葉加炒茶葉一斤如吃生米加炒麥芽一斤吃黃泥加壁土一斤吃黑炭加黑炭一斤隨所嗜而加之共研末煉蜜為丸梧子大每服五十丸晨早以砂糖水送下又方枸杞根搗汁滾生白酒沖服又方土牛膝四兩生白酒三碗煎六七次空心連服三日除根又方白芥子二錢研細燒酒調用白布攤之貼臍下小肚子上一周時起泡為度須戒鹽甜之物小兒只用五分又方用六味地黃丸料加膽礬二兩醋炒紅為末煉蜜丸如梧桐子大白沸湯早晚服酒黃龍膽草一兩去蘆甘草湯洗苦參三兩米泔水浸洗黑牛膽一個將前二味為末入膽汁為丸梧子大如膽汁少加煉蜜少許每服五六十丸燈心湯下黃疸症鮮虎掌草即天南星葉搗爛貯茶盅內平口又方平胃散青礬二兩為末醋丸米湯下或加烏沉湯亦可酒黃水腫黃腫積痛青礬半斤醋一大盞和勻瓦鉢內煅干為度平胃散烏藥順氣散各半兩為末醋煮糊丸梧子大每酒或薑湯下二三十丸不忌口加百草霜楊真人方食勞黃病身目俱黃用青礬鍋內安炭煅赤三四兩米醋拌為末棗肉和丸梧子大每薑湯下二三十丸痞積門痞積新殺生鵝血乘熱好酒泡服儘量沖服隨症新舊多寡自消化無形病深多服數次痞塊尉法以蔥蜜同搗攤在布上貼於患處用尉斗微火尉之痞立下腹中痞積觀音柳即垂楊柳煎湯露一夜五更空心飲數次痞自消食積血痞木賊草末三四分白湯空心服即消年久不過二服蟲積作痛口中必有涎流出湯飲不能進危在旦夕用烏梅花椒生薑煎湯服治痞透骨草一味貼患處一炷香或半炷香即掀開起泡即愈大人小兒痞積水紅花子為細末以面和一處加麝一釐放痞上以尉斗烙之數次即愈又方或每日清晨生服三錢滾水下多服自消即水紅花子腹中硬塊臭椿皮在上中者佳要一大束去粗皮只用白皮二斤切碎入鍋內水熬濾去渣用文武火熬成膏蒲攤標布上先以生薑搓去垢膩後以火烘熱膏藥貼痞塊上其初微痛半日後即不痛俟其自落一張即好永不再發貼膏時微撒麝香少許於膏上然後貼之貼上膏藥周圍破壞出水即驗此方已驗多人即脹滿腹硬過臍者貼一二張即愈真神方也珍之重之孕婦忌用此方仁人君子廣為流傳陰功非淺幸勿妄授匪人致籍射利切囑痞塊神效膏真川白芥子二斤穿山甲八兩用真桐油二斤入銅鍋內先熬半晌次入山甲熬數沸再次入白芥子俟爆止濾去渣入飛淨炒黑黃丹八兩收之離火再入麝香末四錢去火氣七日用攤時隔湯化開不可用火又加阿魏四兩更妙此膏效難言述廣傳多合救人甚妙治痞祕方不論遠年近日服之內化無形不可輕視大黃皮硝各一兩水紅花子研末急性子各五錢亦研末用白鴨一隻撏去毛並臟雜不可經水藥共研勻裝入鴨腹用線縫好盛砂鍋內加入無灰酒兩大碗上用一砂鍋蓋住要封口嚴密文武火炙乾將鴨翻掉炙黃色破開鴨肚去藥用新青布將鴨腹內揩得乾淨患者將鴨分作二三次吃完即愈消痞神丸香附童便浸炒山楂肉各二兩枳實炒陳皮烏藥白朮土炒各一兩半夏薑汁炒厚朴薑汁炒神麯炒蒼朮炒麥芽各一兩二錢當歸身四兩砂仁七錢炒沉香八錢木香五錢共研末老米飲和丸梧子大食遠下二錢五分白滾水下消滯丸消一切酒食痰脹腫痛積痞癥瘕此方消而不響響而不動藥味尋常功效甚速黑醜頭末二兩微焙南香附一兩醋浸透五靈脂一兩微焙檳榔一兩共研末醋和丸如梧子大每服一錢漸加至二錢薑湯下治痞外消黃牙魚一尾米泔水洗淨韭菜二十餘根蒜頭七個同搗爛入鍋內乘熱以絹袋包敷患處內有響聲即愈內消散雄雞肫皮四個陰乾新瓦焙存性砂仁四錢神麯二錢共為末作六服淡薑湯下如此全消常服健脾丸倘末痊愈已成老痞再用糯米一升炒黃砂仁四兩神麯二兩共為末每服五錢用陳皮三錢煎湯下早晚服忌豬肉多食鯽魚治痞膏蔥白汁四兩薑汁四兩廣膠八分好黃酒二盅同熬水成珠攤狗皮上貼痞上待痞化去藥痞氣成龜錫四兩豬腿精肉一斤緩緩乾炒熟待錫器入內為度不用鹽將真麥燒酒咽肉如龜未成大害減錫二兩如前法制食之痞塊不化水紅花炒焦搗為末以酒送下打出白沫於大便中為效飲食不消麥芽一兩神麯一兩炒煎同滾水調服傷肉食以山楂三十個搗碎煎服食物不化即以其類燒存性為末酒服少許或傷肉即以肉燒化酒服痞塊雪水三斤滴花燒酒三斤肉蓯蓉三錢海蜇頭三斤浸淡荸薺百個同入鍋內煎至將干取荸薺不對食之食盡除根治痞初起治痞初起者須輯其根用桃腦七枝每枝七葉獨頭蒜一個共搗爛入麝香二分攤膏貼之鼻聞麝香即揭去如不見消仍前再貼四神消積丸陳皮三兩去白青皮醋炒厚朴薑汁炒枳實蒸莪朮煨切山楂炒麥芽炒半夏炒香附炒檳榔各二兩山稜煨吳萸湯泡去蒂曬乾杏仁炒各一兩廣木香白芥子各五錢炒神麯二兩一錢炒共末蘿蔔湯煎濃為丸如緑豆大食遠白湯下八十丸小兒三十丸淺者用一兩深者二三兩治癖仙方香附三斤皂礬三斤二味拌勻分三份各用紙包外用黃泥裹成團陰乾若裂處再以泥補之候乾以大炭火煅之自早至晚過夜冷透取中間不焦者去礬用香附為細末以棗肉丸菜子大每早白湯下十丸不忌口輕不過三五重不過七服即愈病自大便而下煅時忌一切人見並不可聞雞犬聲犯則傷人致火災切記嗜茶成癖男用女人穿過新鞋女用男人穿過新鞋貯茶葉令滿任吃完再貯一鞋吃完三鞋即不嗜矣積酒金距子又名雞距子煎湯服之即愈此子色黃其葉如石楠狀如蓮子越中山間墳傍可得葉可煎湯亦解宿酒若能多采為膏便可時時救人停食或因醉飽即睡胸膈痰飲積熱氣結滿悶陳皮五錢微炒研末以水濃煎如茶呷即寬酒肉過多脹滿不快鹽花擦牙用溫水漱口二三次即舒暢大小人積食諸藥不能消陳年火腿骨煅黑色研末三錢用火肉一斤煮熟去浮上肥油取清湯一碗將末送下酒病方烏藥一錢枳實一錢金距子六個葛根一錢海螺蛸一錢甘草梢五分水煎服葫蘆殼引又方以黃苦菜俗名黃古老菜田中有之俟開黃花時多多取來晾乾久年者更妙取煎水飲數服即愈又方取陳樟木皮煎水飲之亦效虛寒積癖在背膜之外流於兩脅氣逆喘急久則營衛凝