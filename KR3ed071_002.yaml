腹中欲動或鳴或腹痛速取去又方黃臘三分服之即愈病愈後大便日久不下蘆筍一錢硃砂一錢共末開水服小便不通棕皮毛燒灰存性薄酒調下又方麥稈華不拘新舊於節處剪斷按一歲一根煎湯飲之小便出血不拘病否皆治鏡面草俗呼螺螄眼拇汁無灰酒下之或用淡豆豉湯下之尿血小便有血不痛者為尿血主虛白芷當歸各等分為末服之大小便同出苡仁研末白糯米研末二味用鋼罐熬粥以上白糖調服男婦小便熱淋大麥芽四兩擂水服之效老小溺床白紙一張鋪於身下待遺尿在上取出曬乾燒灰沖酒服之又方以破故脂炒為末每服二三錢空心熱水調下水酒亦可又方向氣海穴灸之亦愈遺精大烏梅三錢益母仁一歲一粒搗碎鹽一撮水煎空心服之夢遺五味子數十粒研爛以陳米麵醋為丸梧子大每服三十丸空心淡鹽湯下又方以雄黃塞馬口不遺睡著即遺韭子一谷白龍骨一兩共末每服二錢空心酒調服夢遺食減白色苦參三兩白朮四兩牡蠣粉四兩共為末用雄豬肚一具洗淨砂罐煮爛石臼搗和藥干則入膽汁為丸小豆大每服四十丸日三服湯下白龍湯治男子遺精女人夢交盜汗等症白芍酒炒龍骨煅牡蠣煅桂枝各三錢炙甘草三分棗三枚水煎服治五淋方赤芍一兩檳榔一個麵裹共末每服一錢水一盅煎七分空心腋血淋沙淋車前搗汁空心燉服淋痰以芝麻一撮核桃肉一個石上馬齒莧一把共搗爛生酒沖服淋症方防風荊芥三稜烏藥木通滑石車前赤芍藥瞿麥梔子甘草各等分薑皮八分燈心十根為引水煎早晚服血淋便血極老苦馬菜陰乾一大把水煎一大碗空心服亦效大便下血此臍積濕熱也不問糞前糞後並腸風下血大人十服小兒三服不拘年遠日近服此均效當歸酒洗地榆各八分黃芩炒梔子炒黃柏炒各七分阿膠炒珠六分白芍黃連柏葉俱炒各六分槐角炒川芎炒各五分生地一錢水煎空心服如腹脹加陳皮六分氣虛加人參白朮木香各三分腸風加荊芥五分氣下陷加升麻五分心血不足加茯苓六分虛寒加炒黑乾薑五分一方去阿膠加苦參七分燈草引水煎服治赤白濁並治血淋要入熟大黃不用生的鴨蛋一個頂開一孔入生大黃末五分銀簪絞勻蒸熟空心服黃酒下血淋聖方取藕節汁調發灰二錢三日血止痛除糞後下血艾葉生薑共煎濃汁服三合腸紅臭椿樹根皮東行者三錢槐角一錢側柏葉一錢小竹葉一錢地榆炒黑一錢水煎服只要溫熱重者不過三服愈屢驗卒瀉鮮血小薊根葉搗汁溫服一升腸風臟毒柿餅燒灰沖滾水飲服二錢神效忌同蟹食臟毒下血苦楝子炒黃為末煉蜜為丸梧子大服十丸添至二十丸空心米湯服脫肛奇方蟬蛻為末菜油調敷肛門立收燥結輕粉五分砂痛一彈丸同搗丸梧子大每服五丸臨臥溫水下小便頻數有餘滴腰膝冷腎囊濕兩腳無力故脂鹽水浸灑炒二兩茯苓一兩沒藥五錢為末黃酒浸高藥一指煮化和沒藥丸梧子大每服三十丸空心白湯下小便閉脹不治殺人蔥白三錢切炒帕盛二個更換尉小腹上氣通即便又方以鼠糞三錢研末煎酒空心服又方以肉蓯蓉當歸二味煎酒服立愈又方以甘遂末水調敷臍內以甘草節煎湯飲之癃淋馬齒莧搗汁飲之小便將出而痛既出而癢大黃瞿麥木通滑石扁蓄梔子甘草車前子各等分燈心引水煎空心服地髓湯治五淋小水不利莖痛欲死牛膝一兩洗淨水五杯煎一杯去渣加麝香少許研調空心服小水不通芒硝一錢研末以龍眼肉包之細嚼咽下立愈又方舊麥草帽一頂煎水飲之即通大便閉結同此小便淋通蜀葵花根洗銼水煎五七沸服之如神若琳血加車前子一錢同葵煎服萃仙丸專治遺精沙蒺藜八兩蓮鬚芡實山萸肉各四兩枸杞續斷覆盆子菟絲子杜仲鹽水炒去絲各二兩龍骨五錢金櫻子膏一兩白蜜十兩共和為丸每服五錢清早淡鹽湯下無夢遺精韭子一兩炒研酒服二錢並治白濁盜汗夢泄雄豬肚一個洗淨杜仲半斤用線縫固煮爛去藥連湯食盡即愈此方兼能治腰疼神效小便不通用蚯蚓五六條研爛投入涼水一碗攪勻澄清去泥渣飲下立通此物大解熱毒垂死者無不效腹脹如鼓危急垂死百藥不效用鳳眼草即臭梧桐子皂角四兩水煎五七沸加麝香少許入磁壇內將玉莖入壇口熏半炷香時使藥氣入竅即通極驗大便不通産婦及老人虛弱人難用行藥者以松子仁去皮研爛酒一盅沖沸水服立效便血大蘿蔔皮荷葉二味燒灰存性炒蒲黃各等分為末每服米飲調一錢神效或專食蜜炙蘿蔔亦妙腸紅棉花子炒燥去殼取仁三錢沸湯送下立效又方以赤豆燉爛拌紅砂糖立愈又方生槐米四兩和生地同炒炒黃去生地不用再研細末大生地二兩切薄片豬尾大腸一尺余水洗淨將槐米末盡灌腸內兩頭用線扎緊放砂鍋內文火漫燉爛搗如泥再添餘剩槐末為丸每早開水送下三四錢男子遺精婦人白帶茯苓一兩茯神一兩遠志五錢龍骨五錢牡蠣二兩煅共末醋糊為丸如梧子大每服五六十丸空心鹽湯下年老塞閉小便不通上桂五錢為末納入臍中即下大小便閉關隔不通脹悶二三日則殺人胡椒二十一粒打碎水一盞煎六分去渣入芒硝五錢煎化服痔初起腫痛皮硝煎湯熏洗用一烘熱舊布鞋底墊坐煮豬大腸同蜜蘸空心徐徐食之如此法行七日自愈痔瘡各種治法雄豬膽一個和蕎麥麵為丸空心白湯送下三錢三服即愈痔瘡疼痛胡連末同鵝膽汁調敷之穿腸痔漏水安息此物出安斯國形似膏藥稀黏黃黑色著手香透指甲塗之十日痊愈便紅及痔烏梅好醋煮爛去核半斤百草霜即鍋臍煤研末二兩胡黃連四兩用大腸一節將黃胡連納入兩頭線縛在飯鍋內蒸以腸爛為度去腸曬乾研末以上藥俱入烏梅中搗成膏作丸如梧子大每服三錢一料即愈痔漏兼治牛皮等癬黃蜂窩一個內有蜂子者佳明礬研細末填滿蜂窩以微火煅之俟窩內礬滾透窩亦成灰研成細末以香油調搽患處三四次即愈又方乘瘡發時取芝麻蟲一個活搗爛熱酒沖服其漏管即墜落又方羊牛豬蹄殼三全副五穀蟲四兩蟬蛻四兩將三樣蹄殼洗淨夾碎葛粉炒脆合藥為末用蜜丸每重五錢每晨用槐米金銀花各錢數煎湯送下一丸如有管者十日可退下又方龍眼肉四兩川黃連一錢犀角尖二錢白礬二錢共杵丸如梧子大硃砂為衣空心服七八粒內痔蜒蚰蟲七隻銀硃一兩共入罐內封口放陰處七日啓視化水矣以濕朱塗搽神效有管者即退內外痔蕎麥磨粉每日服之內外痔腫痛出血兼治腸風下血臭椿樹根微去黑皮用白皮煎湯空心飲一盞數日見愈痔生管燈草灰每服一錢即退又方每清晨洗面後之水另傾木盆內洗患處久則發亦不狠可免痛楚無管者易愈痔漏奇方槐花一兩皮硝一兩鳳眼草仁一兩槌碎豬大腸頭一條將藥入腸內蒸爛每日空心食之食後仍以好黃酒壓之此藥可能將漏管一日衝出一線不過二餘日可痊愈矣又方無名異五錢煅紅米醋淬再煅再淬七次為度研細末糯米蒸熱以藥合共一處為捻量管之淺深下之外用膏藥貼住仍用大蚯蚓一條焙乾為末黃酒七日見效忌房勞百日要緊洗痔方冰片二分青黛三錢乳香三錢元明粉一兩作小絹囊數個盛藥日坐患處如覺濕即易去再換一個久而自愈又方用鳳尾草洗之亦妙痔瘡腫痛脫肛用象糞熬水先熏後洗另用馬前子焙焦研末麻油調搽可愈頻治可以斷根痔痛膏名熊膽膏熊膽五分冰片一分研細井花水調雞翎掃痔上即愈又方蝸牛膏用蝸牛一枚負殼有角者冰片麝香少許同研爛盛磁器內次早取汁敷之即愈治痔奇方用鼾狗皮作座墊三日便止鼾肉可治弱症皮褥可卻濕寒暑有益長毛者為貴又方用鍋粳曬乾炒至黑焦食二三斤痔可終身不發此以鍋底穀精治穀道底病自然愈所謂醫者意也痔漏不拘新久通腸汙從孔出先服此藥追盡膿血再服藥即效胡黃連切片薑汁炒拌刺蝟皮炙切片再炒黃各一兩麝二分為末研飯和丸麻子大食前酒下一錢服後膿水反多是藥力到勿懼後用胡黃連淨一兩川山甲麻油內煮黃色石決明煅槐花微炒各五錢為末煉蜜丸麻子大米湯下一錢早晚各一服如痔漏四邊有肉突起者加蠶絲二十個炒研入藥治諸漏俱效痔腫痛立效白鵝膽二三個取汁入熊膽二分冰片少許研勻入磁器密封臨用以手指蘸藥搽之甚效五淋血淋木龍即野葡萄藤也竹園荽淡竹葉麥冬門連根苗紅棗肉燈草烏梅當歸各等分煎湯代茶飲男婦熱淋取野葡萄根七錢葛根三錢水一盅煎七分入童子小便三分空心溫服此方並能治女人腹痛大小便閉臌脹氣促用八角茴香七個大麻仁五錢共研末同生蔥白三七根和研煎湯調五苓散末服之每日一服普濟方陰囊濕癢麩炭蘇葉共末撲之男子陽痿女人陰癢蛇床子煎湯洗之愈囊濕搔癢甘石制蛤粉各等分為末撲之陽莖挺脹甘草梢二兩黑豆半升水濃煎服之腎漏長硬不痿精出捏之脆癢如針刺補骨脂韭子各一兩研末每三錢水煎服一日三次下陰腫痛絲瓜子擂如泥熱黃酒沖服陰腫如燈籠灶口黃土蒼朮牡蠣炒各等分研共極細末用紗作袋撲之陰腫如斗雄黃礬右各二兩甘草一兩水五升煎二升浸洗自愈陰羹腫痛蔥白乳香搗爛塗之又方煨蔥入鹽杵如泥塗之腎囊瘋癢艾葉蘇葉明礬各三錢同煎水洗又方砂仁殼將米泔水煎極濃洗之洗後即坐曬熱土磚上取出毒水水盡即愈又方花椒一錢每夜煎水洗腎囊再用甘草黃柏枯礬各三錢共末用豬膽汁調搽之大氣脬白毛藤無灰酒服之龜頭瘡疳冰片一分研末燈心燒灰先將甘草湯洗後將二味調勻敷之外將烏金紙貼上一日換三次龜頭瘡並治諸惡瘡白蜜調甘草末敷之龜頭生瘡甚至蠟燭花用藤黃磨麻油搽之陰毛生蟲名八腳又名陰蝨用檳榔煎水熏洗愈又方煙油調雄黃搽之亦妙婦人陰癢用鯽魚切片以布裹納陰戶內良久其蟲自出盡入布眼二三次以出盡不癢為度又方蘆薈黃柏苦參蛇床子荊芥防風花椒明礬各等分煎水熏洗數次即愈陰戶並糞門生白蟲蜂蜜煉過甘草研細末二味和勻放癢處蟲出即好
