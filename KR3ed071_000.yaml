body:
  text: 序虛白先生未知何許人也里居世系不傳性嗜山水遍遊江湖間歲甲申遊於洪都有李生者識先生於風塵相與訂交為東道主適罹目疾幾失明先生示之方應手而愈以此益異先生之為人師事之惟謹既而先生謂李曰子好從事筆墨吾囊中得有治疾方書試屢屢驗而見聞所及亦隨得隨録無倫序子盍分類續編之俾得成帙將來有益於目者當不止此李生欣然領命不輟晨昏為之增訂敬書之不數月而卷帙編次釐然矣果其目力如撥雲霧信極光明燈下作蠅頭小楷逾於少年時噫是誠異矣先生來江右近十餘年蹤迹往來無定凡所駐足隨時隨地恆以丸散救人無不立驗而方不離乎古人都人士耳先生之名者亦甚衆而願一見顏色卒不易得於是秋水蒹葭深溯洄之思者竟測先生之為何如人而先生救世之婆心昭然可以共信耳愛集同志敬以李生所録是編付之梓梨顏曰救生集將欲廣為流傳俾通都大邑以及遐陬僻壤莫不蒙先生之惠澤其於先生之功行或不為無補於萬一尤賴仁人君子以先生之心為心為之播傳無徒慕先生之為人而異其行迹是則先生之志亦齊民之幸也夫朱仁圃識
