body:
  text: 卷四通治諸病門太乙紫金錠一名紫金丹一名萬病解毒丹一名玉樞丹此藥解諸毒療諸瘡利關竅通治百病真能起死回生奇效不可盡述凡居家出入嘗制濟人或遇窮鄉僻壤無藥之處帶備此丹保身濟急功德匪淺凡閩廣雲貴仕宦尤宜多備山茨菰南北處處有之俗名金燈籠葉似韭花似燈籠色白上有黑點結子三稜二月開花三月結子四月初苗枯即挖地得之遲則苗腐難尋矣與老鴉蒜極相類但蒜無毛茨菰有毛包裹宜辨去皮洗極淨焙二兩川文蛤一名五倍子槌破洗淨焙乾二兩麝香揀淨血毛皮殼細研淨三錢千金子一名續隨子去殼揀色極白者用紙包裹同研換紙數十次去盡油以色白再研紙無油成霜為度一兩紅芽大戟杭州紫大戟為上江南土大戟次之去蘆根洗極淨焙乾一兩半北方綿大戟色白者太峻利反傷人弱人服有吐血者慎之有製法宜端午七夕重陽或天月德黃道上吉日修合量藥多寡預期數日前主人及醫生俱齊戒沐浴浣濯新潔衣巾履襪於僻靜淨室焚香將前五味各為細末設盥洗盆出入必淨手薰香各用新潔器盛紙蓋至期夙與主人率醫生焚香陳設藥品拜禱天地藥王畢將逐盆配合分兩攪和數百次極勻仍重羅兩遍依方用糯米濃飲調和於木臼內杵數千下極光潤為度每錠一錢每服一錠病勢重者連服數錠服後用溫粥稍潤臟腑修合此丹總要齊心至誠極其潔淨制時毋令喪服體形不具之人並婦人雞犬見之治一切飲食藥毒蠱毒瘴氣惡菌河魨吃死牛馬駝騾等諸毒並用涼水磨服一錠或吐或利隨手便愈治癰疽發背對口天蛇頭無名疔毒楊梅惡症一切瘡頑等毒諸風隱疹赤腫未破時及痔瘡用無灰淡酒磨服及用涼水調塗瘡上日夜各數次癢疼即消出膿血者亦減漸愈治陰陽二毒傷寒心悶狂言妄語胸膈壅滯邪毒未發瘟疫流行及喉閉喉風用薄荷一小葉研末冷水化下治各種氣疼用淡酒或淡薑湯磨服治赤白痢及泄瀉肚腹急痛霍亂絞腸沙等症及諸痰症並用薄荷湯磨服治男子婦人急中顛邪喝叫亂走鬼交鬼胎鬼氣狂亂失心羊兒豬顛等風中風中氣口眼歪邪牙關緊急語言蹇澀筋脈攣縮骨節風腫手足腰腿周身疼痛行步艱辛諸風諸癰並用無灰暖酒下治白縊溺水死心頭暖者驚嚇鬼迷死未隔宿者冷水磨赧治毒蛇風犬一應蟲傷冷水磨塗傷處另用淡姜磨服治久近瘧疾臨發時取東流水煎桃柳枝湯磨下治小兒急慢驚風五疳五痢脾病黃腫隱疹瘡瘤牙關緊急並用蜜水薄荷小葉同磨下及搽量兒大小一圓作二三服治牙疼酒磨塗及含藥少許良久吞下治湯火傷流水磨塗傷處治打撲傷損炒松節無灰酒煎下治年深月久頭疼太陽疼用酒入薄荷研爛開紙上貼太陽穴治諸蠱腫脹大麥芽湯煎下治婦人女子經水不通紅花煎湯下孕婦忌服此丹應驗如神一家患傳尸勞兄弟五人已死者三方土令服此丹遂各進一錠一下惡物如膿狀一下死蟲如蛾形俱獲全生其人遂以藥廣齊死證無不愈者又一女子久患癆瘵為尸蟲所噬磨一錠服之一時吐下小蟲十餘條後服蘇合香丸半月遂如當此丹藥品雖不言補虛弱之人亦服有效誠濟世之方也內用山茨菰千金子皆白子可種仁人君子合以濟人陰功不小一牛馬中毒以此丹治亦應一方加明雄黃取透加石榴子者用三錢治一切瘡毒極效蘇合香丸犀角銼碎二兩冰片另研一兩檀香銼末二兩木香二兩安息香酒浸二兩沉香銼末二兩蘇合香一兩硃砂另研二兩白朮二兩蓽撥二兩訶肉二兩乳香一兩丁香二兩香附二兩明天麻二兩金箔為衣用一百張麝香另研一兩上將各味銼成粗片研為細末入冰射安息蘇合油同藥拌勻煉蜜為丸稱過一錢用蠟包裹此丸治一切氣痛氣逆中氣不和婦人噯氣或暴卒鬼魅惡氣等症保靈丹治蠱毒諸毒一切藥毒大山豆根五錢雄黃硃砂淨細研一兩黃丹麝香斑蝥去頭足各二錢五分赤蜈蚣一生一炙二條川巴豆揀肥大者取肉不去油二錢五分續隨子生杵末二錢五分黃柏子二錢五分糯米生半炒一撮半上藥入磁鉢研和於端午重陽臘日修合宜避婦人及雞犬用糯米湯和丸如龍眼小核大陰乾磁罐收貯每一丸好茶清吞下不得嚼破須臾毒物下藥丸凝血並下以水淨取收可救三人之命太乙救苦全生丹即大道保命丹茅山蒼朮要色黑而小有硃砂點為佳米泔水浸軟曬乾為末一錢丁香不拘公母二錢錦紋大黃切片曬為末二錢雄黃要明透水飛一錢二分明天麻切片焙乾為末一錢二麻黃去節為細末一錢二分硃砂要槐子水飛為衣一錢二分麝香此味要真者試驗之法放在火紙煤上焰香即真一分蟾酥好燒酒化試驗之法將舌尖舐而即麻是真三分甘草微炒八分以上各藥研極細末稱准分兩合勻將化蟾酥和藥倘不能成丸再添好燒酒打丸如米粒大些用硃砂為衣曬乾收貯磁瓶內勿令出氣隨用隨開治中暑頭暈眼黑及絞腸腹痛一時昏悶不省人事及斑痧等症先將二丸研細吹入鼻內或納之舌下發麻吞咽再灌六丸陰陽水下涼水亦可中寒驟然腹痛陰陽反錯睡臥不寧轉筋吐瀉手足厥冷並吐瀉不出猝然難過者治法照前山嵐瘴氣夏月途行及空心觸穢口含三丸邪熱不侵感冒風寒噁心頭痛肚腹飽脹及風痰等症治法同前癰疽疔毒及蛇蠍所傷研細好酒調塗即愈治寒熱瘧疾臨發之時早晨向東方薑湯吞服九丸以一二粒納鼻孔男左女右隨其噴嚏小兒發豆不出並麻疹不發閉悶而死及痰涎壅盛並老年膨脹噎膈等症燈草湯涼水加倍調服俱能有效小兒急慢驚風兩腳已直兩眼反白牙關緊閉不能服藥者即將四五丸研末吹入鼻內即刻醒轉隨以此藥調湯灌之立愈凡有跌死打死驚死喝死魘魅死氣悶死痰厥不省人事者只要略有微氣皆可將此藥研末吹鼻灌口可冀復活既活之後仍服內料調理遇有自縊之人輕輕解下攤放平地速將藥丸研末吹入鼻內若胸口尚溫者皆可救活復生回應丹臺烏藥防風羌活前胡川芎酒浸白芷法半夏薑汁炒廣皮砂仁炒赤茯苓厚朴薑汁炒廣木香藿香葉薄荷葉蒼朮米泔水浸以上各四兩香附米黃酒童便醋炒三分白蔻仁二兩枳殼麩炒一兩五錢草果入微火內煨熟去殼取肉再炒一兩白扁豆炒二兩六神麯薑汁炒黃研十八兩以上各味共研細末薑汁為丸硃砂為衣此丹專治老幼中風中寒中暑中氣口眼歪斜牙關緊閉不省人事霍亂吐瀉肚疼轉筋內傷飲食生冷胃停痰滯胸膈脹悶不思飲食或出外遠方不服水土作瀉心腹疼痛噁心水泄瘧疾四時感冒瘟疫傷寒頭疼發熱遍身痛疼惡寒無汗傷風咳嗽噯氣吞酸紅白痢疾山嵐瘴氣小兒急慢驚風婦人産後昏迷惡露不盡一切痰迷諸症俱用薑湯化服大人服二錢重者三錢小兒一錢婦人有孕忌服身體結實病重者服五錢紅白水瀉痢疾加紅糖三錢化下許祖如意至寶丹茯苓去皮桔梗去蘆肉桂去皮川厚朴去皮薑汁炒石菖蒲洗淨當歸酒洗廣木香川椒去目炒乾吳萸去皮鹽水浸一宿炒巴豆去殼用紙壓去油淨各五錢大附子童便泡去皮尖一個柴胡去蘆紫苑去須洗淨豬牙皂去皮筋尖泡檳榔揀大花白者以上之藥各一兩五月五日午時或每月上七日或庚申甲子福德天德天醫天巫吉日雞犬不聞婦女不至之處虔合此丹先安真君神位供奉共為細末入臼內杵三千下或煉蜜或面麩為丸如梧子大硃砂為衣磁罐收貯遇疾照引五更時吞服立效忌葷醒生冷七日引開於後治瘟疫熱病服三五丸井華水下陰陽二毒傷寒傷風三五丸薄荷湯下陰症傷寒九丸薑湯下鬼崇邪氣七丸山嵐瘴氣不服水土時災伏尸傳癆五痢怔忡三五丸顛狂九丸俱黑棗湯下大麻風塊遍身面如中行口眼歪斜脫眉爛肉左癱右瘓偏正頭風七丸用生水酒下服一七見效初服之時用荊芥銀花苦參麻仁煎酒引鶴膝白紫癜風痰風癬疥五七丸荊芥湯同生水酒下誤吞毒藥九丸消渴泄瀉三五丸大小便閉七九丸酒毒便紅三五丸喉閉喉風七九丸俱甘草湯下腮腫丹瘤癰疽疔瘡五七丸俱溫酒下赤痢五七丸黃連湯下白痢五七丸甘草湯下諸痔三五丸淡礬湯下隔氣積食心腹疼痛五七丸氣咳嗽三五丸俱用陳皮半夏枳殼生薑湯下蠱脹五七丸甘草湯下五淋三五丸燈草湯下腸中氣塊三五丸枳殼煨薑湯下腹中成塊痛不止五七丸皂角湯下寒熱瘧疾五七丸生薑莪朮湯下腰背痛三五丸鹽湯下邪瘧桃枝湯下十種風氣三五丸茯苓湯下黃疸三五丸茵陳湯下膀胱疝氣腫痛三五丸炒萊服子小茴香湯下婦人血崩三五丸百草霜調酒下血暈頭疼三五丸山楂炭薑湯下血癆咳嗽三五丸荊芥薑湯下血氣疼痛三五丸牛膝楂炭下月水不調子宮冷不受孕孕笑孕哭三五丸醋炒艾葉湯下赤白帶下三五丸絲綿燒灰調酒下産後腹痛下血五七丸阿膠煎酒下胎死五七丸葶藶煎酒下鬼胎三五丸紙書馗二字燒入滾白水下一翻胃吐食五七丸蓽澄茄湯下小兒急慢驚風一歲一丸金銀花薄荷湯下氣疼一歲一丸薑湯下疳蟲一歲一丸使君子湯下垂涎咬牙一歲一丸淡鹽湯下諸引預備恐一時不及止用白滾湯亦可孕婦忌之幼孩勿多服凡往來探病帶此丹幾丸避穢除邪如遠客商尤宜多備不但寶身並可濟急回生産寶丹柯集庵曰回生丹誠寶産之仙方也前有修合送人者臨産服一丸坦然快便不覺其功但聞製藥齊戒虔心發願普濟然後擇一淨室如法遵行吳門馬同學合此丸蒙以十丸見贈豫知其方之好而不知其方之神也歸即隨便送人癸丑冬有一難産者子死腹中余聞而急撿笥尚有一丸與服之死胎立下母命獲全人咸驚歎余遂發願修制送人迄今已數十年屢試屢驗而艱難諸症之獲救者不下數萬人但不知此方起於何人記云長葛孫奎臺得之異人傳授然製法湯引尚有缺處不若余得者詳且明也今列於左錦紋大黃為末一斤大黑豆水浸取殼用絹袋盛殼同豆煮熟去豆不用曬乾其汁留用三升紅花炒黃色入酒四五碗煎三五滾去渣存汁待用三兩米醋陳久者佳九斤將大黃末一斤入淨砂鍋下米醋三斤文武火熬之以一長木筋不住手攪之成膏再加醋三斤熬之又加醋三斤次第加畢然後下黑豆汁三碗再熬次下蘇木汁又次下紅花汁熬成大黃膏取入磁鉢盛之大黃鍋耙亦剷下入藥土白黨二兩當歸酒洗一兩川芎酒洗一兩香附醋炒一兩元胡醋炒一兩蒼朮米汁浸炒一兩蒲黃隔紙炒一兩茯苓一兩桃仁去皮尖並油一兩川牛膝酒洗五錢炙草五錢地榆酒洗五錢川羌活五錢化橘紅五錢白芍酒炒五錢木瓜三錢青皮炒三錢白朮米汁浸炒三錢烏藥去皮二兩五錢木香四錢良薑四錢乳香研末二錢沒藥研末二錢益母草二兩馬鞭草五錢秋葵子三錢熟地一兩三稜醋浸紙包煨五錢五靈脂醋煮化焙乾為末五錢山萸肉酒蒸搗爛去核五錢上藥三十味並前黑豆殼共曬為末入石臼內下大八分拌勻再下煉蜜一斤共搗千杵取起為丸重二錢黃膏陰乾須二十日不可日曬不可火烘後重二錢零以蠟包之臨産用參湯服一丸則分娩全不費力如無參淡鹽湯亦可論曰凡胎已成子食母血月足血成塊謂之兒枕將産兒枕先破血裹孩兒敢難産服此逐去敗血須臾自生橫生逆生同治亦有因氣血虛損宜多服人參為引子死腹中因産母染病所致用車前子一錢煎湯服一丸或二三丸無不下者若因血下太早子死用陳酒少許煎車前服之立下有力者用人參同煎以助元氣胎衣不下用炒鹽少許泡湯服一丸二丸即下産後血暈用薄荷湯服一丸即醒以上四條危症乃臨産緊要關頭一時即有名醫措手不及起死回生此丹必須預備産後三日血氣未定遠走五臟奔充於肝血暈起止不得眼見黑花滾水服一丸立愈産後七日氣血未定因食物與血結聚胸中口乾心悶煩渴滾水服一丸立愈産後虛羸血入於心肺熱入於脾胃寒熱似瘧實非瘧也滾水服一丸立愈産後敗血走注五臟轉滿四肢留停化為浮腫口渴而四肢作寒乃血腫非水腫也服此丹愈産後敗血熱極心中煩燥言語顛狂非風邪也滾水服一丸愈産後敗血流入心竅閉塞失音用甘菊花三分桔梗三分甘草二分煎湯服一丸愈産未滿月誤食酸寒堅硬之物與物相搏流入大腸不得克化泄痢膿血用山楂煎湯服此丸立愈生産時百節開張血入經絡停留日久虛脹痠痛非濕症也蘇梗煎湯服此丸愈産後月中飲食不得應時並致怒氣余血流入小腸閉塞水道小便澀結溺血以雞肝色用木通四分煎服此丸又或流入於大腸閉卻肛門大腸艱難有瘀血成塊如雞肝者用陳皮湯煎服此丸愈産後惡露未淨飲食寒熱不得調和以致崩漏形如肝色潮熱煩悶背膊拘急用白朮三分廣皮二分煎湯服此丸愈産後敗血入五臟六腑並走肌膚四肢面黃口乾鼻中流血遍生斑點危症也陳酒化服此丸愈産後小便澀大便閉乍寒乍熱如醉如癡滾水調服此丸立愈産後赤白帶下阿膠艾葉湯下産後崩疾糯米湯下産後頭疼身熱有汗為傷風桂枝三分薑蔥煎湯下頭疼身熱為傷寒麻黃二分薑蔥煎湯下産後變生異症或單所未載者俱以童便黃酒各半連服二丸立效以上之症皆産後破血為害也故此單方屢見奇功誠為至寶産後一切異症醫人不識人所未經但服此方無不獲驗一丸未應二丸三丸必效無凝胎前常服此丸壯氣養胎滋陰順産調和臟腑平理陰陽更為神妙室女經閉月水不調諸症並效南方近來此等病症最多極為可憫應廣為流傳有力者多制送人俾四海閨中免此難症幸甚矣神授奪命救急丹又名文昌救世方上肉桂四錢飛硃砂一錢明雄黃一錢母丁香一錢五分蟾酥一錢赤飛金五十張上牛黃一錢真麝香一錢共研細肉將上藥配合於五月五日七月七日九月九日齊戒沐浴避雞犬婦人到擇淨室修合此丹專治男婦老幼四時感冒瘟疫傷寒頭疼發熱遍身疼痛無汗傷風咳嗽噯氣吞酸不思飲食山嵐瘴氣一切風寒暑邪痰氣逼閉牙關緊急不省人事口眼歪邪心神恍惚心舌發麻或誤食冷物腹疼陰症小兒急慢驚風如心疼絞腸烏痧冷麻痧指甲發青先用此藥吹入鼻內復用銀針刺入少商穴三針男左女右出去紫血後服淡鹽湯黃酒半杯更妙凡一切陰陽危急諸症藥不能服者將此藥吹入鼻內孕婦忌服此藥上通泥丸下達湧泉散周身百病起死回生效驗之至病有緩急或出外遠行宜多帶備可以濟急此丸用上上火酒為丸如緑豆大大人五七丸小兒三丸未滿歲者一丸菩提丸方半夏薑汁製蒼朮米泔浸一宿厚朴薑汁炒制陳皮藿香葉蘇葉扁豆炒砂仁香附四制者佳桔梗山楂黃芩酒炒枳殼炒薄荷麥芽神麯俱炒以上每味各一兩用鮮荷葉煎湯調拌各藥曬乾研末煉蜜為丸每丸重三錢治四時不正之氣時寒感冒瘟疫流行嵐瘴氣胸中不爽頭目不清一切時行不順之症俱用淡薑湯下一二丸治霍亂吐瀉用緑豆四十九粒胡椒七粒煎湯服一二丸治紅白痢疾車前子煎服一二丸如遠行途中不便滾水亦可藿香正氣丸藿香三兩白朮炒二兩蘇梗二兩陳木瓜三兩桔梗二兩五錢川芎二兩柴胡二兩大腹皮三兩茯苓二兩陳皮去白二兩五錢半夏曲二兩五錢甘草八錢此方仙傳專治外冒感寒內傷食滯中暑霍亂嘔吐水瀉赤白噤口痢疾濕熱寒痰凝結並久近瘧疾兼頭暈目弦腹痛胃疼四肢麻木胸中飽膈大小便閉照方加味服之無不應效以上各藥共研細末用薑汁酒滴為丸每丸重一錢每服三丸小兒服一丸重者加一丸身弱者服二丸薑湯引如瘧疾加常山一錢烏梅二個煎湯引痢疾加檳榔八分引如孕婦虛弱過甚者忌服小兒未一歲者量服幾分道藏經祕製大黃清寧丸法用錦紋大黃十斤先以淘米泔水浸半日取去粗皮切片曬乾再入無灰酒浸三日取出曬半乾第一次將大黃入甑內用側柏葉不拘多少墊底蒸檀條香一炷時取出曬乾每次用側柏葉墊甑底蒸過蒸畢起去葉二次用緑豆三升熬濃汁將大黃拌透蒸一炷香取出曬乾三次用大麥三升熬汁製法同前四次用黑豆三升熬汁製法同前五次用槐條葉熬汁六次用桑葉熬汁七次用桃葉熬汁八次用車前草熬汁製法俱同前以上均用一斤九次用厚朴八兩煎湯十次用陳皮八兩煎湯十一次用半夏八兩薑汁拌煎湯十二次用白朮八兩土炒煎汁十三次用香附八兩醋炒煎汁十四次用黃芩一斤煎汁製法俱同煎十五次用無灰灑三廳將大黃拌透串蒸三炷香時起出曬乾以上制過十五次以後曬乾磨為細末每一斤入黃牛乳二兩姜藕汁各二兩童便二兩如不用童便以煉蜜二兩代之外再用煉蜜煉蜜六兩拌勻為丸如梧桐子大每服三錢治一切病症對病用引開後治頭疼身不發熱口舌作渴火痰症也用荷葉煎湯送下頭疼牽連兩眉稜骨疼痰火症也用姜皮燈草煎湯送下頭左邊疼柴胡湯送下右邊疼桑白皮湯下頭兩太陽疼白芷石膏各二錢煎湯下頭頂疼藁本三錢升麻一錢煎湯下頭時常眩暈燈心煎湯下治發眼初起先服湯藥一二劑白芷一錢二分枳殼八分川芎一錢甘菊一錢五分蟲退一錢陳皮八分赤芍七分荊芥七分羌活一錢紅花三分防風八分甘草四分蔥頭二根生薑一片將前藥用水二碗煎一碗溫服一二劑再服此丸三錢用菊花煎湯送下害眼久不愈用歸身一錢菊花一錢二分同煎湯下眼目勞碌即疼內見黑花用龍眼七枚去核煎湯下鼻孔多瘡用枇杷葉煎湯下耳暴聾燈草湯下耳癢同耳鳴乃心腎不足用淡鹽湯下口舌生瘡是胃火上升竹葉燈心湯下冬天去竹葉一味口唇腫硬生瘡生疳甘草稍三錢煎湯下舌腫滿口乃心經火盛茯苓燈草湯下咽喉腫疼津吐難咽桔梗甘草湯下咽喉生乳蛾或單或雙俱用牛膝湯下牙齒疼石膏三錢升麻三分同煎湯下如老人止用燈心湯下左癱右瘓秦艽三錢生薑三錢煎湯下吐血紅花一錢童便半酒中入紅花湯下嗽血麥冬湯下吐紫血成塊名為蓄血紅花三錢歸尾一錢煎好後入童便半酒中下牙縫出血甘草稍三錢煎湯下鼻血不止燈心湯下從高墜下跌傷蓄血在內不思飲食蘇木五錢煎湯入半酒中童便在內並加黃酒半中送下每服丸藥五錢溺血人或身體壯實平日喜歡飲酒及油膩之物燈心湯下溺血人或老年人體弱乃膀胱血腎水不足宜服六味地黃丸兼服此藥淡鹽湯下自愈膏梁之人自奉太過諸凡勞心以致心腎不交溺血如魚蝦如絮石用牛膝一兩水二碗煎一碗下此藥三錢溺血管中作疼麥冬三錢去心煎湯下治大便糞前下血者當歸一錢生地一錢白芍一錢煎湯下治大便糞後下血者槐花一錢地榆一錢煎湯下大便或純血帶紫者紅花湯下大便或純鮮血者當歸湯下胸中作嘈者姜皮湯下作酸者薑湯下或時疼時止口吐酸水用橘餅半個切碎沖湯下治傷寒後胸膈不開百藥不效用多年陳香櫞一個槌破長流水二碗煎一碗去渣露一宿溫服送下翻胃嘔吐俱用煨薑湯下乾嘔生薑湯下吐痰涎薑汁沖湯下背心時常作疼又作冷者即伏天亦怕冷煨薑湯下胖人素常飲酒無病忽然昏沉如癡或蹲地不起眼生黑花乃痰也生薑湯下凡人眼眶下黑如煤乃痰也薑汁沖湯下胸膈飽滿生薑汁沖湯下水腫者赤茯苓煎湯下如久病發腫者不宜服噎膈者生薑湯下若至五十日仙方莫治此藥可治用四物湯送下中暑姜皮燈草湯下中熱暑瀉香薷湯下寒伏暑霍亂羌活湯下陰陽不和霍亂生薑湯陰陽水下酒傷甘草湯下哮喘大腹皮湯下濕痰流注初起生薑湯下有膿者忌服盜汗浮麥湯下自汗桂圓湯下暑伏寒霍亂姜皮湯下驚悸怔忡石菖蒲湯下夜不能寐妙棗仁湯下心神不安夜夢顛倒伏神入遠志肉少許煎湯下小便不通燈草湯下凡人在船上久則動火松蘿茶服年老痰火夜不能寐氣急用真木香五分廣皮同煎湯下凡人遍身作癢纍塊如紅雲乃風勢也久則成大麻風用菊花三錢煎湯下顛狂症燈草湯下嘴眼歪斜出言無緒罵詈不堪頃刻即好乃心中經絡有痰遇肝火薰蒸痰入心竅用茯苓三錢煎湯下此症非數十服不得見效咳吐痰腥臭如膿血胸中作痛乃肺癰也用苡仁合煎湯下治大腸癰肛門墜痛並無糞出只有紅白水亦如痢疾用槐花湯下凡人遍身筋骨疼痛四肢無力痛徹骨髓反側艱難用木通一兩水二碗煎一碗每服四錢即效黃病眼目俱如黃金用茵陳二錢煎湯下年老大便燥結當歸三錢煎湯下小腸癰腹中疼痛臍間出膿小便短少燈草湯下蠱腹大腹皮湯下瘧疾寒熱往來蘇葉二錢檳榔一錢二分同煎湯下遺精淡鹽湯下白濁燈草湯下淋症燈草湯下兼痛者海金砂三錢同煎胸膈有痰火燈草同薑汁送下胃脘作痛飲食減少薑湯下傷寒汗後餘熱未清滾白湯下傷寒咳嗽發過汗熱尚未清仍然咳嗽不止薑湯下久嗽諸藥不效兼有痰者陳皮一錢姜皮一錢同煎湯下嗽吐黃痰者生薑湯下白痰者紫蘇湯下久嗽聲啞者柯子葉麥冬同煎湯下發熱久不退者柴胡湯下煩渴飲水不休者燈草湯或繅絲湯下痢疾初起或單紅者檳榔紅花煎湯下單白者生薑湯下紅白相兼者姜皮燈草湯下久痢不止炙甘草湯下禁口痢陳老米煮湯送下鼻上生紅瘡紅點者乃心上火炎薰灼肺經桑白皮燈草同煎湯下要服數十服見效乃愈婦人病症用引開後治經水不調用四物湯地黃一錢白芍三分當歸三錢川芎三分同煎湯下骨蒸發熱地骨皮湯下潮熱盜汗浮麥湯下胸膈不開香附三錢煎湯下胃腕時時作痛生薑湯下胸膈有痰涎生薑湯下常常噯氣不思飲食悶悶不樂乃憂鬱之疾香附五錢生薑三片同煎湯送下凡經行時色紫腹痛者蘇木三錢煎湯入薑汁三匙送下經行發熱遍身疼痛益母草五錢煎湯下孕婦小便不通燈心湯下孕掃遍身發腫大腹皮湯下産後諸症惡露不淨腹中作痛益母草五錢煎湯入童便三匙或加蘇木三錢煎湯下産後頭眩目暗者四物湯下産後大便不通肛門墜重當歸三錢紅花一錢同煎湯下産後小便不利木通煎湯下産後胸膈不開益母草三錢香附三錢同煎湯下産後發熱四物湯加益母草三錢煎湯下産後嘔吐不止藿香湯下乳汁不通王不留行煎湯下此方丸製法得宜獲自京都大家屢治各病照引進服無不效驗誠壽世之良方也余不敢私鈔傳公仁人君子廣傳施濟陰功匪淺幸甚幸甚神授清平丸檳榔一斤厚朴薑汁炒十二兩蒼朮制八兩半夏曲制八兩陳皮十二兩草果仁四兩黃芩酒炒十二兩知母酒炒十兩白芍酒炒八兩枳實六兩青皮八兩藿梗六兩紫蘇六兩楂肉八兩北柴胡十兩乾葛煨六兩神麯三斤制香附八兩甘草四兩梔仁八兩炒上藥共研極細末用生薑三四斤搗汁打糊為丸彈子大病輕者一二丸重者三四丸白湯化下禁口痢噙化咽下胃氣自開小兒只須半丸重則一丸孕婦虛弱人忌服治時行疫氣潮熱頭痛治嘔吐泄瀉治瘧疾初起治食積胸腹膨脹治胃腕痛腹痛大人小兒皆效觀音救苦感應靈膏此方系唐天師葉真人誠心濟世往求菩薩賜以良方以三十六罡攻之於外以菩提水應之於內則萬病可迅除矣藥有三十六種合天罡之數菩提水乃生甘草湯也久病七日可愈新病三日可除真神方也大黃一兩香附七錢三稜一兩羌活八錢杏仁七錢芫花