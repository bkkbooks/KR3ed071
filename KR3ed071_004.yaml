白芍一兩五錢甘草銼炒五兩麥冬去心一兩五錢黃芩一兩五錢大棗蒸熟去皮核研成膏一百個神麯研二兩五錢白斂七錢五分肉桂去皮一兩七錢五分人參去蘆二兩五分芎藭一兩二錢五分乾薑淨七錢五分白朮一兩五錢于山藥七兩麝香研一兩雄黃研飛八錢金箔一千二百另研八百張內四百為衣柴胡去苗一兩二錢五分陳枳殼一兩桔梗一兩二錢五分杏仁去皮尖雙仁麩炒黃一兩二錢五分另研大豆黃卷一兩七錢五分蒲黃炒二兩五錢當歸去苗一兩五錢上除棗杏仁金泊犀角末及牛黃射香雄黃冰片即龍腦四味別為末入余藥和勻煉蜜棗膏為丸每兩作十九以金箔為衣此丸專治男婦諸風緩縱不隨言語蹇澀痰涎壅盛卒然暈倒口眼相引手足攣搐脊背僵直口吐涎末或心怔忡健忘癲狂癇病言語錯亂神不守舍或歌或哭或癡或呆忽如見神鬼或驚悸恐心神恍惚夢寐不安或積熱吐血骨蒸癆病每用一丸或用半丸切開薄荷湯或滾白湯化下及治小兒五癇天吊急慢驚風潮熱發搐頭自仰視或發痘疹鬱結不出驚過昏迷每一丸分作四次亦依前引煎湯下此丸以蠟包裹遇仙丹白牽牛頭末炒半生四兩半白檳榔一兩茵陳五錢逢術醋煮五錢三稜醋煮五錢牙皂炙去皮五錢上為細末醋糊為丸如緑豆大凡經數服後或以粥啖之忌食他物此丸能治邪熱上攻痰涎壅滯翻胃吐食十膈五噎齁哈酒積蟲疾血積氣塊諸般痞疾瘡熱腫疼或大小便不利婦人女子面色痿黃鬼産癥瘕吞食銅鐵物銀悉皆治之五更時用冷茶送下三錢天明可看去後之物此藥有疾去疾有蟲去蟲不傷元氣亦不傷臟腑功效不能盡述小兒減半孕婦勿服寶之寶之金花如聖散蒼朮米泔水浸宿去皮六兩川烏火煨四兩草烏生用四兩川芎三兩五錢細辛二兩五錢防風去蘆生用二兩五錢白芷二兩五錢白朮二兩五錢蠍稍五錢雄黃淨研五錢上藥十味共為細末每服二錢或一錢半量其人之大小病之輕重加減用之好酒送下汗出為度忌熱物半日得汗時切忌不可見風此丸散能治男子婦人小兒一切諸般病症金刀傷用小便洗貼上藥割傷破傷風牙關緊好酒調服一錢著被蓋矇頭約重車行五里地汗出即愈如無汗出涎水亦好若涎水汗俱無再服一服蠍螫用唾津調貼蛇蟲傷用飛礬和藥貼患處酒服一錢婦人産後淋血不止紅花煎酒服一錢多年惡瘡刺去痂水洗淨貼此散腦風口噙藥吹入鼻或用生薑調貼兩太陽穴諸般瘡或茶或薄荷湯服一錢出汗火燒瘡用涼水調貼多年瘡用小便洗貼咳嗽用桑白皮湯同酒對服一錢惡瘡疽癤魚眼紅絲疔瘡調藥用鵝翅掃上患處偏正頭風用口噙藥水吹入鼻內遍身疥癬瘰癧杖瘡有血者將水貼藥繼服二錢溫酒送下舌根瘡外臁瘡及一切無名腫毒新汲涼水調貼患處諸風倒地不省人事好酒調服一錢被蓋出汗立效騾馬等畜揭鞍風並諸藥不效抽身抱膝者藥五錢酒半碗灌下將氈蓋出汗立效此藥加真蘄州白花蛇一條重七八錢的更佳如少重大者或三四錢的亦好炕研末入前藥內六合定中丸嶽撫憲傳蘇葉霍香香薷各四兩木香另研一兩赤苓木瓜羌活各二兩柴胡生甘草檀香另研末各一兩枳殼二兩五錢厚朴薑汁炒一兩五錢上藥共為細末煉蜜杵均為丸重一錢五分治四時瘟疫薑湯服春冬宜用薑湯夏秋宜用黑豆甘草湯下婦人産後惡露不盡用紅花山楂煎湯下大人小兒飲食傷者用萊蔔子煎湯下男婦心胃痛者用吳茱萸湯下感冒頭痛發熱用薑湯下小兒發熱吐乳用山楂燈心湯下心胸飽脹嘔吐用薑湯下小兒驚風用薄荷湯下中暑用冰水或冷水下霍亂轉筋用陰陽水下痢疾腸瀉用溫水下瘧疾用薑湯下胃口不開用滾白水下神授祕訣單方歌途中伏暑熱難前急取車輪土五錢攪水澄清湯盡服身安體健遇神仙傷風咳嗽夜無眠細研明礬末一錢青皮陳皮姜共煮煎湯服下化痰涎肚臍瘡毒不易痊火內飛礬地上攤寒食麵糊敷貼上生肌解毒可安全口瘡時發不能言銅緑麝香一處研乾摻些兒頻搽上好如一刻遇神仙婦人口舌痛加干若是遲醫便少安尋取黃龍膽草用燒灰調服即仙方迎風灑淚目昏然臘月尋桑莫待閉覓取枝頭不落葉煎湯快洗好因緣熱淋小便卻難言不費諸般藥散丸扁竹煎湯連口飲方知妙藥不虛傳大腸乾澀藥難攻起坐艱難脹腹中水碾芝麻尋取汁時時呷下自然通鼻中衄血湧如泉頭髮燒灰一處研仍管慢吹鼻內去方知神散取效先齒牙痛苦不堪言得法猶如遇聖仙大戟取來疼處咬名方傳下古今綿婦人難産最堪憐要覓醫方似隔仙尋取路傍草鞋鼻燒灰酒下娩安全遠年咳嗽未曾停怨道醫書藥少靈但用款冬花作末燒煙喉吸便安寧刀傷出血不能停下子秋蛾最效靈研細燒灰貼傷處即時安愈見方真小兒骨痛不能言出血流膿實可憐尋取水蛇皮一隻燒灰調油敷痛邊若問水瀉有何方焦炒車前子最良細末一錢調米飲止消一劑保安康髁外臁瘡久未痊令人行動痛如煎要知會取牛蹄甲燒灰油拌敷痛邊人身痼冷夜難眠生用川烏細研好絹醋調攤患處令君冷處暖如綿木鱉川芎二味平雄黃減半共調勻用棗為丸燒數粒任他請毒不相侵凡人忽被毒蛇傷獨蒜原來力甚強取切片兒遮患處艾燒七壯自然安眼睛內瘴淚連連好把心來撿藥篇但取鯽魚同腦膽調和塗上即安痊火燒湯潑最難當肉爛皮傷痛異常急取雞蛋清調酒頻搽瘡上自清涼咽喉閉塞不能言幸有硼砂可保全和搗鹽梅如棗大口中噙化即時寬自身狐臭不堪聞說破真方小便淋每夜頻頻乘熱洗兒孫後代勉相傳懸梁自縊莫亂牽好解扶安地上眠皂角細辛吹鼻內須臾一命可相延耳聾重聽又虛鳴不問多年近歲用鼠膽刺破傾耳內一時開聽即安痊小兒啼哭最堪憐徹夜呱呱不得眠牛蹄甲末臍上貼終宵安睡謝神天耳門疼痛如刀割出血流膿久不幹鳩糞夜明砂吹耳止膿消腫即時安一個烏梅二個棗七個杏仁一處搗男酒女醋送下之不害心疼直到老一撮黑豆數根蔥陳皮川椒共有功半碗水煎噙共漱牙疼立止顯神通肺風赤鼻最難醫遺有良方好受持但用硫凡為細末調和茄汁最相宜小兒腫舌最憂焦鏽鎖將來火上燒打下鏽兒為細末水調吃下即時消脫肛陰脫病均憂尋取鯽魚頭用留火上炕枯為細末半搽半服自然收脫肛不收最堪憐海上仙方遇有緣急取蜘蛛隨搗爛塗搽肛上即時痊作寒作熱瘧邪纏反覆無常似鬼牽陌上蜘蛛三兩個將他系在脈門邊咽喉緊急閉加疼快取蘆都草的根好灑煎下三五滾竹筒灌入遇真仙牛膝生根擂取汁男左女右鼻中吸又將好酒調藥吞雙蛾一服無蹤跡婦人經水不能通鼠糞燒灰立見功熱灑調吞三兩服此方攙信有神通婦人乳少聽吾言尋取川山甲五錢燒研米泔連次飲流通恰似井中泉乳瘡腫痛叫連聲焦炒芝麻研細勻燈盞內油調患處除膿消腫即安寧小便不禁自遺延尋取天台烏藥研飯後時服宜米飯日須三次各三錢胎前瘧疾最糾纏寒熱無休實可憐急取夜明砂作末搽調空心服三錢婦人崩漏血來多貫衆相同米炒和每服三錢酒醋炒方知此散起沉疴走馬牙疼齒動搖白砒包放棗中燒取將黃柏同為末急痛旋搽痛立消滿口生瘡痛可憐乾薑好合與黃連口中細嚼涎流出頃刻人邀可赴筵小兒吐瀉日淹纏滑石雄黃一處研每服一錢調飲下方知此藥是靈仙頭風痛苦太陽邊白芷川芎一處煎再入石膏等分末熱茶調下兩三錢自汗不止防風末浮麥煎湯服三錢不愈煎同牡蠣散二方經驗可流傳婦人吹乳最難當急用男梳百草霜須使飯丸梧子大三丸酒下見清涼痔漏脫肛人難說川椒蒸制用一撮空心酒送兩三錢功效如神何等悅疔瘡最效稀蘞草五月五日午時討四錢細末灑服調遍身汗出方真好細辛蓽撥及雄黃用酒研和入麝香不問蛇傷並虎咬當時沖飲保平安咳嗽無分久與新誰知只用干浮萍取來搗爛濃煎服一夜平安睡到明金槍刀斧動傷殘只取黃丹對白礬最好生肌能止痛即時傷愈見平安小便終日被閉塞烏頭急炒研如泥將來作餅臍上貼能通利在片時胃虛肚腹成疼痛內有寸白與蛔蟲急採蜂窩炕存性酒調一服見神功頭面若生乾溼癬半生半熟白明礬好將美酒調塗上啓然漸換好容顏若人翻胃苦多時乾柿三枚搗似泥姜酒調吞乘熱服此方神效少人知血汗不止是如何驢糞燒灰不用多但將些兒吹鼻內管教此病漸消磨灶心土是伏龍肝藥賤功殊仔細看為末酒調空心服胎衣不下是靈丹兒在胎中被倒懸全家驚駭計無能急取伏龍肝作末酒調一服即時生婦人有患陰中腫蔥白石膏入乳香貼付愈時休洗去聽其自落是神方婦人陰內多生瘡痛癢無時不可當尋取鯽魚將膽抹不逾時刻便清涼瀉痢脫肛甚憂心槐花為末米湯吞食前一盞頻頻進取效良方實有靈犬傷何用苦熬煎得有良方一處研刮取磚苔牛糞等旋搽患處即安痊心疼急急最難當我有真人海上方扁竹醋炒連口飲痛身頃刻得安康鐵錘火煅透心紅淬酒乘溫服一鍾專保婦人胎産下即時分娩喜相逢婦人産後患心疼痛叫牽連醉欲顛急取雞子空心服酒和童便對同煎婦人産後血難住諸藥無知百草霜為末酒調乘暖服明朝立止見平康産後胎衣不落身卒然驚動一家人萆麻去殼四十粒白麵同研敷足心小兒咳嗽多氣喘石膏火內慢飛研速為細末蜜調下一夜分明減半痊急驚風與慢驚風奪命方知有大功磨水但將青礞石調下痰涎立便通小兒夜哭不能眠收拾燈花四五團研爛燈心湯送下一宵肅靜到天明撮口臍風不易痊十兒難得兩三全急取姜蠶為細末蜜調塗向口中填一切心疼最難當馬兜鈴兒一個方燒存性末溫酒飲男女服之保安康一撮花椒水一鍾細辛白芷與防風濃煎漱滷三更後不怕牙疼風火蟲發背疔瘡識者稀醋調陳墨繞四圍生薑豬膽同塗上天命恰似鬼神移人間龜病不堪言肚內生有硬似磚自死殭蠶白馬尿不逾時刻軟如綿此治腹內龜病制皂角單方擇蟲未蛀而肥者去皮核與膜如法炒焦研為細末聽用治風症濕痰氣塞不通用皂角末一兩加白礬五錢膩粉五錢共研勻每服二錢滾白湯送下時氣頭痛煩熱先用滾水沐浴隨用新極水一鍾加薑汁蜂蜜少許將皂角末二錢和服出汗乃愈中風口喎眼斜用皂角五兩陳醋調塗患處須替換塗之以塗盡末為度霍亂轉筋用皂末吹入鼻內或燒煙黛之令得噴嚏即安大小便不通用皂末三錢入粥內食之立通中風口噤用豬油塗在皂角上將火炙黃研為末每服一錢溫湯下氣壯者服二錢如牙關用柏枝搽急喉閉用皂末生熟各半和勻以筋頭蘸末點腫處以醋調腫處項下如腫須出血而愈目昏咫尺不辨人物眉發脫落鼻梁崩陷皮肉起瘡而癬用皂角刺二斤搗為末每服一錢濃煎大黃湯下連服十日山豆根單方通治將山豆根洗淨切細搗為末聽用解蠱毒水和調下癬瘡用蠟油調搽五種痔漏水研汁服赤白痢疾煉蜜為丸空心酒下霍亂每服二錢橘皮湯下女子氣腫每服三錢熱酒下狗咬蛇傷用水研成膏貼之商陸單方通治忌鐵器並鹽味赤花者不可食之喉中卒被毒氣攻痛用商陸根切細炒熱布包尉患處瘰癘攻痛用根搗成餅敷瘡上以艾火灸之或數十壯逐日炙之炙至不痛為愈浮腫用根搗汁一碗作三次頓熱服則水從大便出諸瘡毒用根和紫花地丁切碎酒煎服咸靈仙單方通治於九月內丙丁戊己日尋威靈仙根要不近水聲者洗淨焙乾為末以好酒和令為濕裝甑內蒸透放大桶內緊封勿令泄氣過二三日又取如前蒸之九蒸九曬如干漆狀用白飯搗令為丸梧子大每服二三十丸溫酒下名靈仙丹作修此丸務要擇一淨室齊戒沐浴心誠身潔效驗異常寶之慎之治男女中風不語薑湯或滾白湯下手足不隨等症並口眼喎斜薑湯下筋骨疼痛水酒下治熱毒瘡毒金銀花煎酒下燈草單方通治治一切淋症竅塞不利能降心火煎水服愈喉塞喉閉喉風燒取灰吹喉立愈婦人産胎不下子斃腹中者用燈草半斤燒灰聽用將羊角一個去空如筒裝燈草灰在內擇一老誠穩婆以羊角插入陰門將灰吹入其腹胎化為水下身弱之婦止用燈草灰二兩五錢身壯者四兩此方救母損子不可亂用破傷風嚼爛和津液貼患處又以棉裹嚼爛敷之止血三七單方通治三七者血屬之聖藥也七葉三毛故名三七主治之效備詳於後今特揭而傳之跌首破碎置上止血三日全效又不潰爛吐血上衝者研末以上京墨研濃水酒化下婦人久不受胎研末每服三錢早米湯同無灰酒任下久則受胎婦人赤白帶下血崩研細服二錢白酒調下後服四物加三七五分煎水服婦人吐血不止每服一錢或五分自嚼米湯下有力之家或用人參五分無力之家或用上上黨參三錢同末煎服腸風下血每用四物加三七一錢水煎服或空心一錢研末酒調服亦可刀傷箭傷血出不止嚼爛罨上即止痛止血婦人産後血湧研末用三錢水酒調服即止跌打損傷以三七嚼細罨在患處即消青腫仍以酒沖服末一二錢天時害眼十分重者以三七磨水調點眼眶內即愈赤白痢疾用三錢為末米泔水調服虎狼蛇咬研末每用三錢酒調服另嚼少許塗患處受下蠱毒先吃少許其毒漸出瘡毒癰疽痛不可忍研末以燒酒調和取蟾酥少許同塗傷寒口齒牙不閉將生薑搽牙即用三七末三錢薑湯灌下男婦肚痛用一錢塗腹外見咸痛止男婦雙單蛾喉風為末用一錢鹽酒下小兒痘瘡為末蜜水滾熱下男子血淋用一錢燈心湯同姜一片引化服男婦氣痛量年近遠為末一錢鹽湯下棉花子單方通治治婦人肚腫腳腫將子炒枯研末沖水酒服下治男婦筋骨腰膝疼痛炒枯研末沖水酒化服男婦諸病香烏散香附烏藥各等分為末每服一二錢治飲食不進薑棗湯下治瘧疾乾薑白鹽湯下治婦人冷氣米飲下治婦人血海痛男子疝氣痛茴香湯下治頭風虛腫茶湯下治腹中有蟲檳榔湯下治産後血攻心脾童便下四制枳殼丸積殼四兩米泔水浸去穰切片分四處炒一用蒼朮一兩同煮乾炒黃色去蒼朮不用再用萊蔔子一兩水煮炒乾黃色去萊蔔子不用再用小茴香一兩同水煮乾去小茴香不用再用乾漆一兩同水煮乾去幹漆不用外加香附醋炒二兩檳榔一兩元胡微炒切一兩三稜二兩莪朮二兩三稜莪朮二味另制用童便一鍾浸一宿次日用巴豆去殼三十粒同水煮炒黃色去巴豆不用制畢取香附檳榔元胡積殼四味共研為末再用蒼朮萊蔔子小茴香乾漆煮炙好醋一碗同麵糊為丸和梧子大每服七十丸清米湯下此丸能治氣血凝滯腹中膨脹積聚宿食快膈寬中順氣化痰消導飲食無不應驗瘡毒門治一切腫毒屢驗方杏仁不拘甜苦皆用剖開兩瓣擇邊稜齊全者數枚塗以溏雞糞加麝香些須置在瘡上即吸住不脫移時毒聚則杏仁迸起隨以第二枚置之如仍前吸住進起乃毒未盡也即以第三枚置之其毒起必輕一觸即脫無不愈者巴公膏系四川巴公治母痊傳此方此膏治一切無名腫毒及一切痞塊神效木鱉子二十一個象皮一兩大川山甲油煎化為度四十九片巴豆三十五粒山梔子紅者去殼熬化去渣八十一個真芝麻油四斤桃柳楊槐桑五種嫩枝各九條撅碎將油煤枯樹枝用鐵絲小綱杓撈起樹枝再入木鱉子等藥煤化用絹袋濾去渣滓將前油食入鍋內熬沸撤火稍定入炒過黃丹攪勻將鍋取起再入血竭兒茶制乳香制末藥各三錢硼砂五錢細細攪勻用涼水一盆將膏傾入水內用手扯藥干余遍再換水數次拔去火氣收貯磁罐內臨用重湯燉開攤貼忌用火烘治一切無名腫毒服藥澤蘭葉一兩廣膠另器酒化衝入五錢白芨三錢淮牛膝三錢白芷三錢人身以臍為中如患臍以上及頭面者去牛膝入白芷臍以下及足膝者去白芷入牛膝上下俱患者二味並用水煎臨臥時服接飲熱陳酒必得酩酊蓋被出汗為度已潰未潰服一二三四劑即愈一切腫毒山藥搗成泥塗之立消又方用獨腳蓮根七八錢生酒擂服儘量飲之一夜見效惡瘡不斂瓦松陰乾為末先以槐枝蔥白湯洗淨後摻之立效諸瘡久不瘥者鯽魚煅灰和醬塗之治毒膏貼一切腫毒神效萆麻子去油皮四兩血竭三兩蟾酥乳化一兩乳香出汗一兩白松香一兩五錢加頂上麝香一二錢共成為膏貼之神效拔毒法以極細鐵屑將好醋調之煎二三沸撈醋中鐵屑鋪於患處片時將上好磁石即吸鐵石也一大塊頻頻吸之陰症用之其毒自出一筆銷鬧洋花數斤揀極淨煎膏將草烏川烏幾錢研細入內煎收成膏凡遇有患瘡毒用筆蘸藥塗之治腦疽發背一切惡瘡初起方此方系張公伯玉榜示傳人獲福無疆採獨岩蒼耳草一根連葉帶子用細切不見鐵器用砂鍋入水二大碗如瘡在上部飯後徐徐服訖俟吐出吐定再服以藥盡為度如瘡在下部空心服瘡自破出膿以膏藥貼之治發背對口及一切癰疽潰爛有回生起死之功宮粉一兩輕粉銀硃雄黃乳香制淨沒藥制淨各二分五釐共研極細末聽用先將好茶葉煎濃湯洗患處後將公豬腰子切開摻花五分於腰子上蓋患處待藥如蒸良久取去一日一次拔毒減痛潰出濃穢不可手擠輕者二次愈重者五七次愈此方濟人甚衆切勿輕視呂祖靈寶膏桐盧一人因母病患發青百治不痊祈禱備至一夜忽夢祖師曰君孝格天命豫救拔如遲延一日病即不可復療遂授此方得痊遂留傳世栝蔞取子去殼五枚乳香如棗大者五塊二味共研細末以白蜜一斤同熬成膏每服三錢溫黃灑調化服之又發背真祕方狗牙取大者或取二三個炒黑研極細末聽用先將生蔥熬湯洗瘡再將前末用好醋調敷患處即愈又發背方鮮苦參根去泥洗淨搗爛同雞蛋清攪如糊未潰者滿塗之已潰者四圍敷之中心留頂若經時藥干以井水掃潤之有起回生之功真神方也勿以平常之方忽之神膏方此方得之甚難禮下於人設法購求後方得傳遇患照方修合無不應效滴乳香箬包燒紅磚壓去油四兩淨沒藥箬包燒紅磚壓去油四兩鮮血竭要紅豔者四兩白兒茶四兩上銀硃四兩杭定粉四兩好黃丹四兩好銅緑二兩以上之藥各另碾無聲篩細末共一處臨時照患瘡之大小用夾連四油紙一塊用針多刺小孔每張稱藥末五錢用真芝麻油調攤在油紙上再用油紙一塊蓋上周圍用小片帶扎縛瘡上用軟綢帛扎緊自然上痛化腐生新過三日將膏揭開濃煎蔥湯將瘡上洗淨軟綢拭乾將膏翻過用針照前多刺小孔貼之取其又得一面之藥力也無火之人內服十全大補湯有火之人減去肉桂薑棗煎服兼以飲食滋補無不取效至重者用膏二張百無一失無名腫毒單方紫花地丁三伏時採收曬乾為末飛羅面為糊將末和成餅收貯臨用鹽醋浸一宿貼之甚效對口瘡方薑汁磨京墨四邊圍住以白梅豬膽塗瘡口亦效治對口仙方此名天疽十有九死不可不慎鯽魚一尾去鱗腸搗爛入頭垢五六錢再極均加白蜜半杯攪勻從外塗入裡面留一孔出毒氣二次全消即時止痛如已成形有頭將出膿或他醫已治不效而出膿者內服三香定痛散則能起死回生矣三香定痛飲原方無分兩臨用延醫酌定木香黃耆紫蘇人參厚朴甘草桔梗上官桂烏藥當歸白芍川芎防風明乳香沒藥水二杯姜三片紅棗二枚煎好食後服對口初起方不論偏正用蛇蛻一條煅灰以好酒調服亦驗即消一切癰疽瘡疔無腫毒不論陰陽已潰來潰外治總方取桑條如手大指粗二根炭火燒著一頭吹滅用心煙薰針瘡上如未成者便消已成便破有疔去疔有毒去毒須薰針數遍不疼者針至痛疼如痛疼針至不疼即愈又方治無名毒起初發掀熱未破者神效此名烏龍散膏隔年陳小麥粉礬鍋焙炒初炒如錫久炒則幹成黃黑色冷定又放於地上出火毒研為末陳米醋愈陳者更佳調糊熬如漆磁罐收貯臨用攤紙上貼之即如冰冷疼痛隨止少刻覺癢干亦不可動或纏裹之久則自消力盡脫落藥易功大濟生者珍之治癰大如盤臭不可近桐樹葉醋蒸貼之退熱止痛漸漸收口祕方也醫傳云如是腸癰不可藥治單用皂角刺酒煎服即從小便出膿立效又方凡屬小腸癰則左足縮大腸癰則右足縮是也用地榆一斤水十碗煎三碗再用生甘草二兩金銀花一兩再煎一碗空心服一服即消久亦不須兩服也但忌房事余不必忌鼠瘻核痛未成膿者以柏葉搗塗熬鹽尉之氣下即消頸上癧瘡舊琉璃燈燒灰菜油調搽神效內消瘰瘻祕傳經驗方未潰者內消已潰者外貼大乙膏收口即愈夏枯草八兩元參青鹽火煅過各五兩海藻花粉生地酒洗海粉川大黃酒蒸貝母白斂薄荷葉連翹桔梗當歸酒蒸枳殼麩炒焰硝甘草各一兩共末酒糊作丸緑豆大食後臨臥低枕用白沸湯吞百餘丸就臥一時妙項癭豬喉下肉子七枚瓦焙研末每夜酒服一錢忌酸鹼油膩寒氣之物肺痿肺癰者先因感受風寒未經發越停留肺中亦有七情飢飽勞役損傷脾肺而生者又有勞力內傷迎風響叫外寒侵入而生者其初則毛聳惡風咳嗽聲重胸隔隱痛項強不能轉側者是其真候也久則鼻流清淚咳吐膿痰黃色腥穢重則胸塞脹滿呼吸不利飲食減少脈洪自汗漸至久咳勞傷咳吐痰血寒熱往來形體消削咯吐瘀膿聲啞咽痛其候轉為肺痿如此者百死一生之病也用大栝蔞一個開一孔內子有多少粒數配杏仁去皮尖如數入栝蔞內將孔封好外用黃泥包好煅紅無煙候冷去土將栝蔞又配川貝母如前數共研為細末用蜜調二錢臥時服燈心湯過口又方用童便四合大粉甘草寸許四破浸之露一夜平旦頓服一日一次又方咳吐膿血胸中隱痛用薏苡仁略炒為末糯米飲調服或者粥或水煎服當又方癰危急以橘葉絞汁一盞服之吐出膿血即愈治肺癰奇驗方凡人肺癰初起時咳而兩胸即疼者是也即宜急服此方元參半斤天冬四兩桔梗二兩炙甘草一兩水十碗煎至二碗再用蒲公英五錢金銀花五錢再煎一碗食後飽服之初象者即消日久者即生肉奇方也肺風瘡金頭蜈蚣去頭足瓦上焙乾一條雄黃一錢硫黃一錢共研細末夏月用白茄子搗汁調搽冬月用桕油杵膏塗之臥塗於面次早洗去半月全愈又方此方曾經驗過黑芝麻去皮蓮肉不去心水浸軟每早食之即愈懸癰由於三陰虧損濕熱效聚而成此穴在於穀道之前陰器之後又為海底穴也初生狀如蓮子少癢多痛日久漸如桃李赤腫焮痛潰後輕則成漏重則瀝盡氣血變為癆瘵不起者多矣用大粉草四兩長流水浸透炭火上炙乾再浸再炙如此三度切片甘草三兩當歸身三兩水三碗慢柴煎至稠膏去渣再煎稠後為度每用三錢無灰熱酒一大杯化膏空心服之未成者即消已成者即潰即潰者即斂此懸癰良藥也囊癰凡小腹作痛牽引腎子多寒少熱好飲熱湯乃疝氣也如陰囊紅腫發熱大便赤澀內熱口乾墜重作痛乃囊癰之候不宜用疝家熱藥清肝滲濕湯主之正川芎龍膽草天花粉當歸生地柴胡山梔子黃芩各一錢澤瀉木通甘草各五分加燈心水煎食前服潰後摻藥蚌殼黃連青黛各等分研極細敷子又方以抱出雞蛋殼黃連輕粉等分為末以煉過麻油調藥敷之胎元七味丸方泰安太守薩公諱槎傳專治痔漏不拘遠年近日膿血通腸服之化理除根此仙人傳授之方救人災難活人甚多此方宜廣為流傳不可妄授非人心存取利胎元即男子臍帶新瓦上焙乾存性三個陳棕陳久者更佳燒灰存性七錢京牛黃三分槐角子肥大者瓦上焙乾存性五錢刺蝟皮酥炙三錢象皮酥炙四錢地榆曬乾三錢上七味共研細末酥油為丸如蠶子大若不成丸加糯米糊少許即成每服七丸空心白滾水送下三日化管止痛七日平滿血清膿止十日除根第一奇洗痔回春方河邊柳根鬚一把白芥子花椒各二錢煎湯薰洗其其蟲頭黑身白俱從瘡出立愈芥子花椒或四五錢亦可外敷藥方大黑棗三枚剖兩片去核入銅緑銜住外以淨紅土和泥包好煅紅取起去土研細真麻油調塗痔漏神效丸方江南錫山謝漢文楨氏傳當歸酒洗川連酒洗象牙末各五錢淨槐花小川芎酒洗滴乳香箬葉去油各二錢露蜂房槐樹上者更佳椒樹上者次之微火炒一個共研細末黃蠟二兩濃化入前藥末為丸桐子大每服五六十丸空心煎漏蘆湯送下至五日漏孔內退出內管待二三指長用剪剪去再退出再剪之內管盡出自然從內生肌長肉神驗之極牛奶痔九里光似野菊花無論花梗不拘多少槌爛煎濃去渣復熬成膏存渣煎水洗後搽上每晚一次漏痔有管白鴿類一升入罐內以開水灌之即坐在罐口上其管自落入罐中數日即生肉要坐久忍痛洗痔方金星草銀星草夏枯草瓦松各八錢樟木連皮一兩加荷葉一張煎水薰洗每日三次三日再煎渣洗一日洗痔丸藥方青黛飛淨四兩女貞子四兩象牙末四兩陳松蘿茶四兩用黃狗大腸一付洗淨將藥灌下腸內兩頭扎住入礬鍋和水煨爛取起涼少刻用石臼搗爛為丸梧子大每服三錢酒送下如痔痛甚用大蚯蚓理開洗淨以多為妙又取雞一隻之腸理開洗淨將蚯蚓同雞腸切為細斷加木耳作料同雞炒食治疔方取茶花根煎酒服出汗仍用此藥皮搗爛敷患處又方菊花四兩甘草四錢水二大碗煎一碗服如疔瘡有紅絲者以燈草一根蘸油迎絲頭連燒十餘下並燒瘡頭皆燒至不痛又燒至復痛即止護心散見疔苗速用此散凡患瘍症見食噁心乃毒攻心也急宜服之緑豆粉一兩乳香去油三錢每服五錢甘草水送下如心慌加硃砂三分酒調亦可治唇生疔即至大腿彎中紫筋上銀針刺出血即愈發背及疔瘡或初起或成形未破者宜用之以銅戥盤入人新糞少滿合患上用指頭大艾炙之如癢炙至痛如痛炙至癢為度項後黃水瘡以多年陳葛藤燒存性為末真菜油調搽遍身風癢九里光不拘多少搗爛煎去渣沐浴一二次凍瘡煎熱桐油入密陀僧調搽又方以白茄根煎湯濃洗又方以羊糞焙乾為末清油調搽又治疔方白礬放鍋內慢慢化溶為丸如緑豆大以硃砂為衣每服十丸將連根蔥七根入水三碗煎至二碗送下汗出已成不傷未成立消又疔走毒氣攻心即以生黃豆食之其毒因嘔吐而出又治諸般腫毒以生山藥三寸大麻子去殼數十粒同搗爛一大膏藥貼之即癢不可動即愈治諸腫毒並湯火傷芭蕉根搗汁以生酒和飲渣復搗入鹽少許敷患處治破傷風方鴿糞尖者炒一二錢白麥面炒胡麻不拘分兩炒存性以上三味為末如遇破傷風腫得頭如斗大或垂死者用好酒調藥灌之即生屢驗又方用手足十指甲香油炒黃為末黃酒沖服汗出即愈真奇方也破傷風病槐子炒一合黃好酒一碗煎八分熱服汗出為愈八寶丹專治一切魚口便毒頑瘡二三年不愈者服次如手取之效川大黃一兩香白芷獨活天南星製半夏花粉各三錢川貝母穿山甲各五錢共研細末每藥一兩加粉霜三錢糯米濃汁為丸如鳳仙花子大硃砂為衣每服三分空心白滾湯送下一日一服即用柳根白皮熬水漱口十餘次不過十餘服即瘥其毒從大便而出不吐不泄極為平和治魚口方東平展子明傳牛牙煅灰研細末每服一兩黃酒調送下二服即愈治坐板瘡方松香宮粉等分入蔥管內瓦上炙乾為末真麻油調塗一二次即愈神效無比又方蜂殼燒灰存性研末和真冰片少許糝上一二次即愈治干瘡腫癢方俗名一掃光水銀輕粉潮腦各一錢大楓子肉十兩杏仁去皮尖一粒蛇床子一錢共研末以桐油燭油調勻先以肥皂水洗澡再糊患處須邊疽有數年不愈者用豬貓頭上毛各一撮燒灰用鼠糞一粒為末清油調塗立愈脅疽赤小豆末敷仍煮豆食飲汁骨疽不和骨從孔出掘地作坑口小里大深三尺以乾雞糞二升同艾及荊葉搗碎入坑內燒煙將疽就薰用衣擁之勿泄半日當有蟲出蛇纏丹毒糯米粉和鹽嚼塗之治赤白蛇纏瘡用兜糞杓上竹箍燒灰研細用香油或麻油調搽患處即愈天蛇頭疔荔枝肉同麻油嚼敷禿瘡羊糞曬乾研細篩過用老鼠煎油調搽三次即愈且能發生又方蕎麥麵炒研細一兩硫黃研細五錢共和勻或羊油或羊髓油亦可調勻搽之牛皮癬方牛膝三錢寒水石白礬飛過各三錢花椒一錢五分共末以健豬油同雞蛋清調搽即愈治一切頑癰雞子四枚和香油蔥椒炒作餅子乘熱貼患處效又牛皮癬方煙膏即硝牛皮刮下者用菜油調搽即愈治膿窠瘡用陳齷齪鞋一雙陳久棉絮筋二種俱燒成灰候冷再用大風子肉為末合一處以香油調勻敷之兩日全愈如有未乾者以末灰糝之其效如神甘露丸楊澤清傳治眼漏鼻漏耳漏牙漏肘漏腕漏乳漏胸漏臍漏大小腸漏臀漏膝漏踝漏周身或一處不等及諸瘡年久不愈悉能治象牙末八錢飛白礬五錢大螞蜂窩帶子者二個蝟皮一張以上二味用新砂鍋焙黃色爪兒血竭五錢硃砂六錢明雄七錢乳香去油淨三錢沒藥去油淨三錢兒茶四錢共研極細末熔黃蠟為丸如桐子大每服二十四丸槐花煎湯沖黃酒空心送下藥內加白頸蚯蚓槐花更妙服後忌葷腥又敷漏瘡人牙灰油發雄雞內金灰各等分為末射香輕粉少許油調敷之大麻鳳仙方此方只除眼暗聲啞者不治其餘年深月久皆可治之先服防風通聖散十劑先一帖加芒硝大黃麻黃三味後劑不用如內火盛者多服一劑亦可服後接服丸藥通聖散防風川芎當歸白芍連翹薄荷大黃磨黃各四分石膏桔梗黃芩各八分白朮梔子荊芥各三分滑石二錢四分芒硝四分甘草一錢生薑三片水煎溫服丸藥方荊芥防風各一斤苦參一斤六兩大胡麻仁四兩北細辛十兩大風子肉去油一斤當歸十二兩白蒺藜一斤共為細末白糯米飲為丸如梧子大每日辰午戌三時好水酒送下約五錢爛麻敷藥先用蘿蔔搗爛敷四五次後用輕粉研末蘿蔔汁調搽蘿蔔要取白淨結實如芤者勿用大麻風五臟六腑並主藥施治之本症以六味藥為主苦參一斤四兩用米泔水洗淨切片一斤防風淨四兩荊芥淨十兩白蒺藜一斤大風子肉四兩去淨油胡麻仁四兩水洗淨此六味主藥加減詳後肝經受風先以四肢起遍身發紫如雲朵樣漸紅蔥白色或隱或現或春發一次加連翹一兩牛黃一錢心經受風先穿腳底兩眼流淚加硃砂二錢歸尾一兩婦人用歸身遍身發桃紅朵樣加山梔仁五錢連翹九錢牛膝八錢蒺藜二兩肺經受風百毛禿落遍身發癢頭面似蟲行加黃芩一兩八錢牙皂二兩脾經受風聲啞發多瘡或生血毒遍身如蛇皮蟹爪露癢破血黃水流出加白朮一錢大風一兩腎經受風口眼歪斜手足為拳遍身發紅白大小風塊如荷葉樣癬白硬者屬氣虛為陽軟者屬血虛為陰加破故紙五錢硃砂二錢五臟受風多咳嗽出冷痰內熱多鼻中出血此屬五臟筋冷四肢無為行步艱辛手足如風癬加蒼朮五錢黃柏二兩六腑受症四肢起白癬加威靈仙二兩續斷一兩薄荷七錢何首烏七錢若鼻塞加藁本一兩面腫加白芷一兩苡仁四兩眼痛加菊花一兩面紅加大風子一兩春夏加黃連二兩冬月加烏藥一兩五錢面黑加白芷一兩五錢若遍身浮腫加蒼朮五錢腳底腫加牛膝一兩五錢木瓜一兩若手拳握加靈仙一兩遍身痛加乳香五錢沒藥七錢骨節痛加虎骨脛二兩酒炙土茯苓二兩若兩眼昏迷加川芎當歸雲苓黃連生地梔子木賊荊子蟲退青箱子草決明膽草連翹防風羌活紅花荊芥黃柏菊花木通苡仁以上各一兩若腳漏加血竭二錢兒茶五錢冰片一錢白蠟二錢乳香二錢沒藥一錢珍珠琥珀熊膽牛黃各五分看是何症便人何方於六味主藥不可混共一處此分別緊要為末清茶送下每服三錢如噁心用鹽少許又治麻風奇方一治一效不論鬚眉脫落兩足皆爛不妨癩蝦蟆一個將鹽泥作匣取蝦蟆入內將泥封固裹定燒熟去泥令病人坐定以大碗盛蝦蟆用小碗蓋貯乘熱衝入滾生酒烹一刻止服酒取汗為度止服二三次即愈又方白色松香砂罐水煮乾則添水煮化投水不澀為好研末忌鐵器蜜丸桐子大每服七十丸加至百丸豬脬七個即尿泡也每個入連肉七粒煮極爛酒食之旋取松節槐條桃條梅條側柏葉各數斤大鍋水煎出脂缸內先薰後洗一二時勿揩拭穿新青布衣蟲當出布衣上永不發矣忌大葷鹽二月如手足拘攣加川烏草烏煎洗又方黃柏末皂莢刺灰各三錢研勻空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如肢腫用針出水再服忌一切魚肉發風之物又眉毛脫落生半夏末羊屎燒焦等分生薑自然汁調日塗又方扁柏葉九蒸九曬為細末煉蜜為丸梧子大每服六十丸食遠白滾湯下日服三次久服自愈騎馬毒金銀花八兩煎水二大碗入大黃當歸各一兩牛膝三錢車前子生甘草地榆各五錢煎半碗空腹服後即仰睡病失過一日微瀉而愈真奇方也須忌房事一月為要上疳方上疳者喉疳牙疳也輕粉三分硃砂七釐半雄黃七釐半冰片二分定粉二分半共研細末吹入口內無有不效臨吹先用薄荷湯漱口爛膀瘡生石膏研末極細和東丹桐油調搽三四次即愈雷頭風頭面疙瘩腫痛增寒發熱狀傷寒用荷葉一片升麻蒼朮各五錢水煎服臁瘡久害用蔥白煎豬油去膜潮腦五六錢共搗極爛先用防風金銀花甘草煎湯淋洗患處候乾將前藥厚厚敷上用薄油紙裹好外用舊棉花扎緊一日兩換不可見風忌食發物數日生肌長肉全愈藥用磁罐緊盛莫泄香氣此方又可治杖瘡並跌打皮肉損傷多年臁瘡密雲縣牛欄山楊醫傳獸醫剷下驢蹄片不拘多少砂鍋炒黑存性研末芝麻油調搽患處如瘡濕者不必加油干敷之即愈此瘡百方不效走用此奇驗又方用舊爛牛皮或鞋掌上取下砍碎陰陽瓦煅存為末麻油調敷患處神效異常王府祕傳治楊梅瘡方用癩蝦蟆一隻大者更佳紅眼者有毒不可用取時不可拿重恐走蟬酥宜用圓口小瓶一個置於地上緩緩趕其自進量能飯酒半斤者下酒一斤須折半斤可服其瓶口用木針針固仍以紙條封緊不可出氣慢火煨煎先將瓦瓶與酒共蝦蟆稱過斤兩若干煎折半可住火除去蝦蟆止取清酒溫服服後即將棉被覆暖取汗俟汗乾方可起動切勿坐立當風處恐又受風若上部瘡多略吃些粥服下部瘡多空心服如一服未愈停三四日再服一個即全愈且終身不發屢驗之方也羊鬚瘡宮粉松香共研末燈盞油調塗之漆瘡方石灰水調敷上一日除根又方芒硝泡水待冷洗之亦愈流火神方夏枯草一斤水二十碗煎十碗放甕內薰痛處立止鵝掌風起皮核桃殼搗細三兩鴿糞三兩共煎湯洗手桐油搽上洗數次搽數次炭火炙一炷香止牛皮癬牛蹄殼燒存性為末香油調搽血癬以檳榔磨水調搽三次愈腳風瘡白果葉煮熟貼立愈鵝掌風開裂水龍骨即船底縫石灰取來研末用桐油調搽將青松枝燒煙薰一炷香二次即愈臁瘡用桐油煮滾入煤炭再煮成膏以油紙作夾膏藥下面以針刺多眼用茶洗過瘡口貼上布纏二日一換又方如腳患臁左足患用黃牛前邊一半蹄殼燒存性為末末破者以麻油調搽破者干搽右足如前洗藥楓樹葉柑子葉花椒葉槐樹葉金銀花五味同煎洗血風瘡開裂出血水痛不可忍取久撒尿處臭泥塗於患處效小兒頭上熱癤用釅魚尾貼上即不痛而愈奇方屢驗治濕痰流注神驗方用薑黃母子是大薑黃身上小針子是也為末小紅棗去核藥末入內填平用絲棉扎緊塞入鼻孔內隨量飲醉蓋暖出汗已潰者自然愈未潰者內消神效之極鼻孔照男左女右塞之不可經婦女之手足甲疽以鹽湯洗煅緑礬研末厚敷甲疽膿血努肉裹趾以生牡蠣研末每服二錢紅花煎酒對服仍用敷痄腮腫痛赤小豆浸軟杵末水調塗之即愈治頭痛耳邊發腫太陽痄腮俱疼不可忍大黃一兩青木香薑黃檳榔各三錢以上共末用醋蜜和調塗患處中留一孔氣干則易塗二三次即愈耳麵肥瘡馬齒莧為末和黃柏末敷之護心散又名內托散又名乳香萬全散此散凡有患惡毒惡疽一日至三日之內宜連進十餘服方免變症使毒氣出外服之稍遲毒氣內攻漸生嘔吐或鼻生瘡菌不食即危矣四五日後亦宜間服之若毒氣衝心有嘔逆之症大宜服此真緑豆粉一兩乳香五錢燈心同研和勻以生甘草濃煎湯調下一錢時時呷之蓋緑豆壓熱下氣消腫解毒乳香消諸癰腫毒服至一兩則香徹瘡孔中真神方也李嗣立方傳多年惡瘡百方不瘥或痛焮不已即用此方馬齒莧搗爛敷上不過三兩遍此方出於武元衡相國武在西川自苦脛瘡掀痛癢甚百醫無效及到京廳吏上此方用之便愈千金不易膏能治一切腫毒瘰癧𩽴魚一隻重一二斤者或兩隻亦可每斤用香油一斤煎魚已枯撈去魚入黃丹六兩熬成膏攤紙上貼患處又膏藥方貼一切寒涼腰氣筋骨流痰等症香油一斤野大黃根半斤煎糊去渣後入黃丹六兩熬成膏攤紙上貼愈簡易百病膏香油一斤黃蠟白礬新剃頭髮用熱水洗淨油膩燒存性各三錢乳香沒藥各三錢共入油內熬去渣入黃丹六兩成膏百病可貼風濕骨疼膏獨大蒜四兩大椒四兩生薑生蔥各四兩蛇退全者佳一條香油一斤同上藥熬去渣後入黃丹成膏貼患處松香膏松香一斤搗爛羅過去渣入鍋內熬化濾入冷水中待冰冷取起如此九次然後入糞溝內埋七日取起蒜汁生薑汁韭汁頭燒酒陳米泔水各一碗同熬至指捻無絲方下清油熬如常法治一切諸瘡無名腫毒初起貼散久則生肌又可貼筋骨疼痛風濕諸般疼痛膏元參苦參各四兩黃柏三兩荊芥二錢五分乙金二錢防己三錢川烏四錢草烏四錢大黃生薑各三錢香油三斤將衆藥入油內浸三日取起用鐵鍋熬入鱉甲一個以驗火色以鱉甲黑枯為度去藥渣下黃丹一斤半以水飛過炒乾文武熬至滴水成珠下乳香沒藥各三錢麝香一分攪勻將磁瓶盛之埋土內一七去火氣攤紙上用之蠟礬丸治癰疽發背諸瘡毒瘰癧痔漏手足患瘡服此有膿即潰無膿即散黃蠟一兩白礬二兩二錢蜂蜜二兩辰砂一錢雄黃四分先將雄黃辰砂共為細末將蠟蜜礬入銅鍋內熔化離火置開候蠟蜜礬稍凝入前藥合作一塊令人近火傍烘將手轉側勿令太化為丸如梧子大每服二十九或四十丸空心白滾湯下癭瘤藥線以蜘蛛絲作捻插入孔內即化消瘤去瘰白丁香五分糯米十粒共為末黃蠟一兩化開入藥在內攤紙上貼之效治瘰癧方五倍子數個取大者每個開一孔入蜈蚣一條角紙封孔將蕎殼拌炒煙盡取起候冷去蕎殼用麻豆調搽以消為止傷損門拔傷方用芥子炒研為末以醋調敷患處其傷即出現或紫或青跌打損傷方四川提督軍門吳英言昔得祕方治跌打損傷極效雖重傷瀕危但有一絲之氣未絶者立蘇前在福建為副將時軍中有一辨相鬥皆致重傷其一則死矣馳往視之其一惟心頭氣尚微暖急命以藥灌之覺胸膈喀調食前服痛甚者加蔥三根水煎空心熱服腳膝門捉虎丹白膠香藝香草烏去皮臍乳香五靈脂木鱉子去油地龍去土各一兩五錢沒藥當歸各七錢五分麝香二錢五分京墨一錢五分搗碎用火燒出煙盡為度上為細末糯米糊為丸每重五分研黃酒送下出汗為效治風寒暑濕腳氣無問遠年近日一切走注疼痛發時空心服一丸趕到腳面上赤腫不散再服一丸趕到腳心中暴汗乃除根如病在上臨臥酒下一丸自然汗出為驗及中風癱瘓麻痹不仁手足不能屈伸偏桔酒下二丸二服可愈中風不省人事牙關不開研化一丸酒灌下即醒為驗貼方兼治筋骨疼痛天靈蓋粉三錢火炙存性古石灰三錢胡椒二錢乾薑二錢川烏三錢草烏三錢上六味共為細末散在膏藥上貼之治腳氣因濕鬱成熱者一人冒雨行衣濕得此症治法以四物湯加知母黃柏降火之藥服之愈加味二妙丸蒼朮四兩黃柏酒浸曬乾二兩牛膝一兩歸尾一兩萆薢一兩防己一兩龜板酥炙一兩或去龜板加熟地二兩亦可上為細末好酒打糊為丸梧子大每七十丸空心鹽薑湯下風痹門治一切風疾牛蒡根一斤生地枸杞各半斤絹袋盛將好酒浸十日飲萬應紫菀丸治身上頑麻狀如蟲行陳皮湯下紫菀去苗土柴胡菖蒲吳茱萸泡七次焙厚朴薑製各一兩桔梗茯苓皂角去皮子炙黃連桂枝乾薑炮各八分川烏泡去子七錢羌活獨活防風巴豆去皮出油人參蜀椒去目微炒各半兩上為細末研勻煉蜜丸如梧子大每服三丸漸加至五七丸食後臨臥生薑湯下有孕勿服治半身不遂天陰筋骨風痛川烏半生半熟草烏半生半熟何首烏豆制防風當歸酒洗秦艽威靈仙以上各三錢為末蜜為丸丸重二錢七分臨臥用陳酒下儘量飲之蓋暖鶴膝風一劑即愈羌活獨活防風各一錢白茯苓舊枳殼檳榔宣木瓜赤芍大川芎各八分川牛膝新蒼朮各一錢厚黃柏八分甘草四錢薏苡仁一錢漢防己八分天花粉八分痛加乳香沒藥各三分生薑三片空心服痛止加當歸萆薢澤瀉各八分肉桂四錢其症半愈再服後方一方蒼朮一兩米泔浸一日曬黃柏一兩酒浸一