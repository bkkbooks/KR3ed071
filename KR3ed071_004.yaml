杵數千下丸如彈大每服一丸治婦人經將至而臍作痛烏藥縮砂木香延胡各一兩香附炒去毛二兩甘草一兩半細銼每服七錢水一鍾半生薑三斤煎至七分不拘時溫服抑氣散治婦人氣盛於血變生諸症頭暈腹滿香附四兩茯神甘草炙各一兩陳皮二兩為末每二錢食前調湯服下逍遙散治血虛煩熱月水不調臍腹脹痛痰嗽潮熱當歸白朮白芍柴胡茯苓各一兩甘草炙半兩每服半兩薄荷葉煎服薛新甫加牡丹皮山梔炒各五分名加味逍遙散神巧萬全方無當歸芍藥甘草有人參黃耆各等分龍齒丸治婦人血風上攻心神恍惚恐怕不安龍齒另研茯神各一兩硃砂研水飛人參當歸天麻各七錢半檳榔防風生地犀角各半兩遠志赤箭各二錢半麝香一錢另研上為末煉蜜丸如梧子大每三十丸薄荷湯送下無時又方琥珀另研沒藥研木香當歸芍藥白芷羌活乾地黃玄胡川芎土瓜根牡丹皮去心白朮桂心各一兩每服一錢水一盞煎至七分加酒下再煎少時熱服重者數服效治婦人煩悶心神不安紫石英一兩茯神麥冬人參遠志棗仁當歸黃芩各七錢半羚羊角屑防風黃耆各五錢甘草炙二錢半每服五錢水一鍾半姜五片棗二枚煎至一大盞溫服兩手無脈宜神佑丸瀉之補以參耆等藥如面上麻木如蟲行乃胃中元氣極虛加黃耆人參甘草升麻催生方白芷百草霜二味等分不過二三錢為末用童便黃酒攪勻送下束胎丸白朮二兩茯苓七錢半陳皮三兩不見火黃芩一兩春秋七錢半冬五錢四物湯粥丸桐子大溫水下令人易産治婦人經水過期色紫成塊氣鬱血滯當歸川芎白芍生地紅花桃仁牡丹皮青皮香附玄胡索甘草分數量病人加減煎服催生方姜一片麝三分將麝按入姜內令勻口中嚼之須臾即下湧泉飲通乳漏蘆一錢炮山甲八分通草八分木通五分赤芍五分川芎一錢當歸尾五分陳皮五分桔梗一錢紅花八分荊芥八分天花粉五分炒王不留行一錢上用豬懸蹄五枚炮製入生蝦汁一小鐘服後吃粗曲熱黃酒一杯催生方前胡七錢川芎二錢當歸一錢安胎止嗽療兒疳屢試甚驗煎服安胎飲治孕成後腰腹疼或淬然下血八珍湯五錢紫蘇二分砂仁五分白朮條芩各八分桔梗五分上水煎服黑神丸治婦人血氣疼痛一切癥瘕神麯四兩茴香四兩木香花椒炒去汗丁香各半兩檳榔四枚乾漆六兩半生半熟重湯煮半日炒令香上除椒漆餘五味皆半生半炒為細末用前生熟漆和丸如彈子大別用茴香末十二兩鋪除地陰乾候外干並茴香末收器中待極干去茴香大治腎氣小腸疝氣膀胱疾解五膈血崩産後諸病漏下並以一丸分四服死胎用棉灰酒調一丸難産用炒葵子四十九粒打碎煎酒下一丸諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三服瘥煮附丸治經候不調血氣刺痛腹脅膨脹頭暈噁心崩漏帶下並宜服之香附子擦去皮不拘多少米醋浸一日用瓦銚煮令醋盡醋糊為丸梧子大每服五十丸淡醋湯下一方香附一斤艾葉四兩當歸二兩制同名艾附丸乾血氣紅雞冠花二錢益母草二錢大黃二錢紅花一錢水酒各半碗煎八分去渣加蜜一匙重不過三服愈倘見惡物不補又鳳仙酒白鳳仙花虛裝一瓶入黑豆一搿燒酒浸之空心服乳癰萱草根金銀花不拘多少加食鹽少許搗如泥再窩兒酒糟一小壇搗勻敷治沙石淋小便不通神方小便不通凝結日久性命旦夕用益元散三錢竹葉煎濃汁調服將肚臍洗淨以麝香些須置臍內用二指厚面圈如碗口大圍繞臍周炒鹽微濕攤面圈內一指許再將切薄蒜瓣鋪於鹽上一層又炒熱鹽鋪蒜上與面圈平以熱尉斗尉之覺小腹內如蟲行漸至馬口似魚眼狀曰沙石淋如自出尿即隨出如不能自出內有筋絲未斷用小鑷鑷住拉斷尿出即愈凝結日久余物尚存如前尉法尉之再看馬口有物再鑷出即通愈矣治孕婦逆生孕婦臨産腹痛不肯展行動每屈腰而臥以致兒在腹不得轉動故腳先出烏蛇蛻一條蟬蛻十四個胎髮一毽以上各燒灰每服二錢酒調下連進二服仰臥片時即順如無前藥以槐子二十七粒井花水吞下又無槐子用小針於兒腳心刺三五針急用鹽少許刺處順下治胎衣不下乾漆五錢大附子一枚炮去皮臍為末以上用大黃末五錢酒醋熬乾溼得宜即入前二味末和丸如桐子大每服三十丸淡醋湯下少頃又進二服胎衣即下如無前藥以赤小豆一升炒用水三升煮二升去豆取汁溫服又方用婦人自己手足指甲燒灰酒調連進二服治橫生難産胎死腹中用柞木不拘多少煎湯吃可保無虞小兒門稀豆丹菟絲子四兩酒煮搗餅曬乾玄參一兩竹刀切片曬乾二味為細末蒸熟黑砂糖濾清拌服神功消毒保嬰丹凡小兒未出痘瘡者每遇春分秋分日服一丸其痘毒即漸消化若服一二次者只得減少若服三年六次其毒盡能消化必保無虞此方屢經試驗務要後開日期潔誠修合服之神效緑豆藤一兩五錢其藤八月收取毛豆桔上纏繞細紅絲就是採取陰乾此味為主妙在此味藥上黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢五分生地五錢荊芥五錢防風五錢川獨活甘草當歸各五錢桔梗五錢連翹七錢五分黃連赤芍藥各五錢牛蒡子一兩辰砂另研同甘草煮過去甘草一兩五錢苦絲瓜一個各長五寸膈年經霜者為妙燒火存性上各為極細末砂糖拌勻共搗千餘下丸如李核大每服一丸濃煎甘草湯化下其前項藥預辨精料遇春分秋分或正月十五或月十五日修合務在虔誠忌婦人雞貓犬孝子見合藥須乾淨室焚香向太陽視藥云神仙真藥體合自然嬰兒吞服天地齊年吾奉太上老君急急如律令勃一氣七通治小兒痘初光狀忽然黑陷心煩氣喘如見鬼神人牙燒灰存性為末每個作一服酒調一服治痘入眼浮萍陰乾為末每服三錢隨兒大小以羊肝半個入盞內竹籤刺碎投水半合攪取汁調下食後服神授稀痘丹此方系呂仙翁箕上所授服之屢有神效人參二錢黃連酒浸二錢准熟地三錢血浸蒸蟬蛻二錢蚯蚓一錢去土曬乾黃柏一錢半酒炒知母一錢半酒炒白殭蠶五錢芙蓉葉一錢去筋牛黃五分冰片五分菟絲子五錢黃柏水浸煮爛成餅又磨為末上為細末用雞子白丸如龍眼大每服一丸米湯送下痘色灰白頂陷倒厭起死回生紅花子萆麻仁麝香各三釐共搗和泥真香油生蜂蜜調成膏如錢大貼百會穴輕者三四寸香重者五六寸香立起如珍珠痘不發櫻桃核二三十個打碎姜一片蔥頭一個煎服出汗即起發暑天不蓋被又方菊花根取汁少加水入穀糠淋下服之即發起治痘方凡瘡大者紫黑者臭爛者俱是疔遇灰色不起發即認出痘疔用銀針挑斷其根吮出惡血隨以頭髮珍珠豌豆灰等分為極細末好油胭脂調塗疔內即轉紅活最效如聖散痘潮熱未除鼻口內發疳宜速服此使君子肉胡黃連黃連炒山楂肉薄荷白朮麩炒荊芥穗陳皮各等分燈心十莖水一鍾煎四分不拘時服痘後生癰用出蛾棉絲白礬搗碎塞滿灰燒汁干研細干搽初發紅腫時赤黑緑三豆醋浸搗汁勤掃即除痘瘋手足不仁用橙葉煎濃汁百滾傾大盆內坐其上蒸之頻加熱汁蒸至稍溫入治即愈治小兒夜啼用神前燭花研碎無根水下治小兒禿瘡用黑羊糞為末豬膽調搽治小兒牙疳用人腳上皺垢焙黃色研末上二次效千金小驚丸鬱金皂角水洗煮黃連牙硝木香龍膽草藿香各五分全蠍六個去毒末之麵糊丸用雄黃麝香硃砂金銀箔為衣鎮驚薄荷燈心湯下大便祕枳殼大黃朴硝煎湯化服鉤藤湯下量兒大小用風如米屑口鼻外亦有者不能飲乳以黍米汁傳之或白鵝矢汁灌口中或桑白皮汁和胡粒敷之兩口角生瘡燒亂髮和豬脂塗之又方用淨髮纏指頭蘸井花水拭之次用黃丹煅出火毒敷之又用硃砂明礬等分研細敷舌上日三四次用之或用南星用醋磨濃汁塗足底待好急洗去弄舌脾臟微熱令舌絡微緊時時舒舌治之勿用冷藥及下之當少與瀉黃散漸服之醫人或見其飲水遂疑為熱用寒藥下之非也飲水者脾胃虛津液少也如面黃肌瘦五心熾熱即為疳黃宜加胡黃連丸輩治之重舌用黃丹如豆大以管安舌下又用蜂房燒灰細研酒和敷舌下或用灶心土酒和塗舌下或用蛇蛻炙焦研末著一豆許敷舌下日三度宮氣方治舌上瘡如粥皮以桑白皮汁敷之三兩度瘥治噤風凡舌重下必有噤蟲狀如螻姑有頭毛其頭小白可燒鐵烙頭上即消不急治能殺人世傳走馬喉痹滿口白瘡如雪脾虛所致若帶風邪當先瀉其邪進補脾氣生脾血之劑蓋龍火不宜涼物宜以甘溫從治也辰砂膏瀉虛熱辰砂三錢硼砂牙硝各一錢半明粉二錢全蠍真珠末各二錢麝香一字上為末好油紙包裹自然成膏每用緑豆許乳汁調敷乳頭上吮下金銀薄荷湯下亦可有潮熱甘草湯下此藥雖涼有全蠍熱品監製無過涼之患或用牛黃細研一錢以竹瀝調一字灌之更以豬乳點於口中此先治其標益脾散和胃進乳消痰人參白茯苓陳皮甘草厚朴草果仁蘇子微炒木香不見火磨汁亦可上為散每服一錢生薑一片大棗一枚未乳前服合咀使乳母亦服此即四君子湯減白朮加味也四君子原為補脾氣之正藥所以減白朮者以哮吼禁服白朮以其噤口故減之又加陳皮健脾理痰厚朴消脹去痰草果消食逐痰蘇子降氣驅痰木香散滯調中所以用痰藥獨多者以噤口皆風所制也此方最對症是為繼治其本又方治小兒口瘡通白者及風疳瘡蝕透者以白殭蠶炒令黃色拭去蠶上黃肉毛為末用蜜和敷之去風熱也圖經方治撮口取原蠶蛾二枚炙黃研末蜜塗口唇內子母祕録方治撮口以夜合花枝煮濃汁拭口並洗千金保命丹治小兒一切痰喘急慢驚風撮口臍風但能開口灌下無不活者牛黃冰片琥珀一錢甘草二分黃連薑汁炒全蠍殭蠶各三分硃砂明天麻麵裹煨膽星各四兩共為細末磁罐蠟封勿令出氣每五七釐薄荷燈心金銀煎湯不拘時溫服夜啼蟬蛻二十個去頭足燈花三分乳香末一錢竹葉炙過上為細末每用一匙燈草湯下治小兒泄瀉木鱉子一個麵裹煨熟去殼小丁香三粒共為末唾丸入小兒臍以舊膏藥封之安神丸定驚天冬牙硝白茯苓山藥寒水石各五分硃砂三錢甘草五錢龍腦一字研末之煉蜜丸如雞豆大每服一丸沙糖水化下灸治治急驚灸百會穴前一寸若不瘥灸兩肩頭及人中各三壯艾小麥大八反膏治小兒積塊發熱硼砂五錢梔子二兩白蘿蔔皮一兩皮硝二兩雞子一個腳油二兩蔥白五枚連須用蜂蜜一酒鍾紙攤貼布絹纏定丁奚哺露凡小兒手足極細項小骨高尻削體痿臍突號哭胸陷名丁奚虛熱往來頭骨分開翻食吐蟲煩渴嘔噦名哺露最為難治用青皮陳皮莪朮白豆蔻仁川芎五靈脂檳榔蘆薈各五錢木香使君子肉焙蝦蟆灰各三錢細末之以豬膽汁浸蒸餅丸麻子大每服二十丸水飲下有熱薄荷湯下盤腸內釣腹中急痛乾啼用乳香沒藥木香薑黃各四錢半另研木別十二個去殼研成膏以木別膏和四味入煉蜜少許丸櫻桃大煎鉤藤湯化下次服魏香散用莪朮五錢真阿魏一錢先以溫湯化開阿魏浸莪朮一日夜焙乾末之每服半錢紫蘇米飲空心服天吊症壯熱翻眼手足搐掣皆因痰滯經絡頭目反仰名曰天吊由乳母過食熱物蘊毒兼挾風邪所致但解利風熱則應手而愈用滴乳一錢另研天竺黃一錢半雌黃另研臘茶枯礬各一錢甘草炙荊芥穗炒緑豆一百粒半生半炒赤腳蜈蚣一條酒浸炙細末之每服半錢煎人參薄荷湯調下又方治天吊潮熱鉤藤人參各半分全蠍天麻各一分犀角甘草炙各半分末之每服一錢水半鍾煎五分溫服走馬牙疳口內生瘡牙齦潰爛齒黑欲脫或出血臭氣大夫婦女俱同白芷五錢馬牙硝銅青各一錢麝香一字末之敷口角擦齒上仍服蟾酥丸又用蚵蚾燒黃連青黛各等分入麝香少許為末敷之丸方蟾蜍一枚酥油炙去骨胡黃連宣連草龍膽川楝木香使君肉蕪荑各一兩末之豬膽汁糊丸麻子大入青黛茴香陳皮麝少許各研細旋滾為衣常服紫蘇湯下量大小與之
