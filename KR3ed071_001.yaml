body:
  text: 卷一急救門治五絶死方以生半夏末少許吹入鼻中再用生半夏末少許吹耳內心頭溫者一日猶可活治暴死方燒灰一爐以陳醋潑之令病人鼻中聞之即活或用韭菜汁灌鼻亦好或以皂莢末吹入鼻中得嚏即蘇治入卒然仆地不語及一切痰涎壅塞手足搐扯不省人事等症用皂莢末少許吹入鼻內即省再用藥治之治驚嚇死以醇酒灌之治煤毒昏暈噁心趺倒急移在風涼處用鹽菜水灌之即愈清水亦可中諸鬼祟及被鬼附昏迷笑哭急將兩手大指縛作一排用艾灸兩大指中爪甲盡頭連肉處灸七壯或十四壯鬼即去若鬼去而人尚昏沉者再灸兩大指中即鬼哭穴也麻黃三兩去節杏仁七十粒去皮炙甘草一兩水二碗煎一碗灌之愈後仍宜服參耆補正之藥鬼魘鬼打之症凡初到客投舍及冷房空屋處或睡中覺鬼物壓打其人厄厄作聲呼之不醒若不救則死急用牛黃雄黃各一錢硃砂五分研末和勻挑一錢床下燒之溫酒灌服一錢中惡鬼氣其症暮夜或登廁或出郊野或遊冷室或行人所不至之地忽然眼見鬼物鼻口吸作惡氣驀然倒地四肢逆冷兩手握拳鼻口出血性命逡巡須臾不救切勿移動其尸即令親友衆人圍繞打鼓燒火或燒麝香安息香蘇合香樟木之類直候醒記人事方可移歸尸厥其症奄然死去四肢逆冷不省人事腹中氣出如雷鳴硫黃一兩焰硝五錢和研細末作三服用陳酒一大盞煎覺焰硝起傾於盞內蓋著服如人行五里又一服不過三服即醒兼灸百會穴四十九壯臍下氣海丹田三百壯身溫止又方附子七錢炮熱去皮臍為末作三服酒三盞煎成一盞服又方用生薑自然汁半盞酒一盞同煎同煎百沸灌二服仍照前灸魘死及中惡切忌火照但痛咬其腳跟則應聲不同臥者於自己床內大呼其姓名亦醒如不醒以皂角末吹鼻中打嚏即醒矣又被魘不醒移動些小臥處徐徐喚之即醒夜間魘者原有燈即存燈無燈不可用燈旋取筆管吹兩耳及取人頭髮二七莖捻繩刺入鼻中取鹽湯灌之又或搗韭汁灌鼻中冬月用根亦可或灸兩腳大拇指聚毛中三七壯聚毛乃腳趾向上生毛處治中惡凡中惡客忤猝死者或先病及睡臥間忽然而絶皆是中惡也用韭黃心於男左女右鼻中刺入六七寸令目開血出即活視上唇內沿有如粟粒以針挑破又方皂角末或生半夏末如豆大許吹入鼻內又方羊屎燒煙燻鼻中又綿浸好醋半盞手捻令汁入鼻中及捉其兩手勿令驚須臾即活又以生菖蒲研取汁一盞灌之又臍中灸百壯吹入皂角末於鼻中卒然發暈以血蒺藜微炒研末滾水調服凡人卒然昏倒身冷無痰名為痰厥亦名中氣如身溫有痰者則名中風但扶正坐氣還即安或用皂角末入鼻中得嚏即安凡冬月中寒卒倒身僵口噤手冷醫藥不及濃煎薑湯灌服凡人慣多魘夢以通明大硃砂縫囊系項上即無夢矣兼服天王補心丹救自縊死凡縊從早至夜雖冷亦可救從夜至早稍難若心下溫一日以上猶可救須要輕輕解下不可割斷繩索宜緩緩抱解放臥平地令一人坐頭前兩是踏縊人兩肩以手提其發常令緊不要使頭垂下人微微捻整喉嚨以手擦胸上散動之一人摩擦肩足屈伸之若已僵但漸漸強屈之又輕輕按摩其腹如此一飯久即氣從口出得呼吸眼開蘇醒後又以官桂湯及粥飯與之令潤咽喉更令二人以筆管吹其耳內若依此救無不愈者官桂湯廣陳皮八分厚朴一錢肉桂五分製半夏一錢乾薑五分甘草三分又法用真野山羊血二三分極研細末好酒灌下立活又方如前法解下將頭扶正將兩手大指並排以小帶縛住在兩指甲縫離甲角一分半用艾灸三壯即活此即鬼哭穴神效屢驗此穴凡驚悸魘死邪魘瘋癲受嚇昏迷者灸此亦效邪瘧亦治見應又法緊用手掩其口勿令通氣兩時許氣急即活又法用皂角細辛末吹入兩鼻孔又法用老鵝一隻將香油抹鵝嘴上插入糞門內一二時即活若過一周即便難救又法凡男女縊死身雖僵定尚可救活不可割斷繩索抱定解下安放平坦處所仰面朝上頭要扶正先將手慢慢曲彎然後將大小便用綿軟之物裹緊不令泄氣用一人坐於頭前兩足踏其肩揪住頭髮將縊人之手拉直令喉項通順再用二人將細筆筒入耳內不住口吹氣不住手撫摩其胸前用雞冠血滴入喉鼻之中男左女右男用公雞女用母雞即能蘇活如氣絶時久照前救法務要多吹多摸勿謂已冷忽略不救也又法照前解下雖氣已脫極重者灸湧泉穴男左女右灸三壯即活救自溺死及凍死水溺一宿者尚可救搗皂角以綿裹納下部內須臾出水即活又法撈起時急急將口撬開橫銜箸一隻使可出水以竹管吹其兩耳以生半夏末吹其鼻孔皂角末置管中吹其穀道如系夏月將溺人肚皮橫覆牛背之上兩邊使人扶住牽牛緩緩行走腹中之水自然從口中井大小便流出再用生薑湯化蘇合丸灌之生薑汁亦可若無牛以活人覆臥躬腰令溺人將肚腹橫覆於活人身上令活人微微搖動水亦可出如活人不肯或鍋一口將溺人伏於鍋上微微搖動亦可如系冬月急將濕衣解去為之更換一面炒鹽用布包尉臍一面厚鋪被褥取灶內灰多鋪於被褥之上令溺人覆臥於上臍下墊以棉枕一個乃以草灰渾身厚蓋之灰上再加被褥不可使灰迷於眼內撬開銜箸灌生薑汁蘇合丸仍將皂角末吹耳鼻穀道等事俱照夏月法冬天蘇醒後宜少飲溫酒夏天宜少飲粥湯按灰性暖而能拔水凡蠅溺水死者以灰埋之少頃即活此明驗也又方以鴨血灌之可活又法以酒罈一個紙片一把燒放壇內急以壇口覆臍上冷即再燒紙片放壇內覆臍去水即活治落水凍死初救起之時尚有微氣胸前尚暖急須脫去濕衣換好人貼身熱衣包之不可令其近火須用布袋盛炒熱灰放在心口如冷又換待開眼以溫酒薑湯灌之又法用氈或稿薦卷之以索系足放在平穩處令二人相對踏令滾轉往來如扦氈法候四肢溫即活冬月溺水之人及被凍極之人雖不知人事但胸前微溫皆可救倘或微笑必為急掩其口鼻如不掩則笑而不止不可救矣切不可驟令近火但一見火則必大笑不可救藥凡凍死已經救活者宜用生薑連皮搗碎陳皮捶碎各等分用水三碗煎一碗服又方以艾灸臍中可治又用鴨血灌之可活又治凍死及落水微有氣者用雄黃焰硝等分為末點兩眼角救撲打猝死及壓死但須心頭溫暖雖經目亦可救先將死人盤屈在地上如僧打坐狀令一人將死人頭髮控放低用生薑半夏末以竹筒筆管吹在鼻內如活即以生薑自然汁灌之可解半夏毒卒然墜攧築倒及鬼魘死若肉來冷急以酒調蘇合香灌入口若下喉去可治救跌打壓傷口耳出血一時昏暈但視面色尚有生氣身體尚屬綿軟則皆可救但不可多人環繞嘈雜驚慌致令驚魂不復急令親人呼而扶之坐於地上先踡其兩手兩足緊為抱定少頃再輕移於相呼之人懷中以膝抵其穀道不令泄氣如稍有知覺即移於素所寢處將室內窗櫺遮蔽令暗仍拳手足緊抱不可令臥急取童便乘熱灌之馬溺更妙如不可得入溺亦可要去頭尾但須未食蔥蒜而清利者佳強灌一二杯下得喉去便好一面用四物湯照原方加三四倍再入挑仁去皮尖及好紅花各一兩全當歸及南山楂搗碎各二兩生大黃二兩童便一大鐘如系夏月加黃連四五分多用急流水在旁用急火煎半熱傾入碗內承於傷者鼻下使藥氣透入腹內則不致入口惡逆乘熱用小杯強令頓服如其不受則姑緩少刻又進只要陸續灌盡不可使臥服藥之後其穀道尤須用力抵緊不可令其泄氣如藥已行動非至緊不可即解恐其氣從下泄以致不救也必俟腹中動而有聲上下往來數遍急不能待方可翼之以解所下盡屬淤紫毒已解半方可令睡至所下盡為糞即停止前藥否則再用一二劑亦不礙然後次第調理亦不可輕用補藥四物湯當歸一錢川芎七分熟地三錢炒白芍一錢又治壓死及墜趺死心頭溫者急扶坐起將手提其發用半夏末吹入鼻內少蘇以生薑汁同萊油調勻灌之次取散血藥服如藥不及即以小便灌之感冒門治感冒初起發熱頭疼口渴無汗細陳茶二錢生薑三錢核桃肉三個連須蔥白七個共搗碎用水一碗煎七分熱服蓋衣取汗談野翁方一方用黑豆炒深黃色為末滾黃灑沖服一方感冒發散湯黃長春傳防風一錢紫蘇一錢二分乾葛一錢四分前胡桔梗各一錢二分蒼朮羌活各八分陳皮川芎白芷各七分香附一錢赤芍六分細辛二分甘草二分姜三片煎熱服取汗如感重無汗再服一劑表症自除如汗後身熱內煩病入在內用清解湯主之並可治大小便閉身熱口渴等症清解湯葛根二錢蘇葉柴胡前胡各一錢赤芍枳殼各七分麥冬五分去心知母三分朱苓澤瀉各八分薄荷三分甘草二分姜三片燈心七根如汗多加桂枝七分服二劑身涼便利自愈如內熱甚如黃芩七分花粉九分冰煎服治傷寒不問陰陽兩症均可治之生薑一兩蔥十根好酒二鍾煎熱服取汗夏月減半冬月倍用傷風初起治方凡人病初起之時用藥原易奏功無如人看不清用藥錯亂往往變症難治苟認病得清用藥得當又何變症之有即如傷風之症必頭痛身疼咳嗽痰多切其脈必浮此傷風也宜用此方防風荊芥柴胡條芩半夏甘草各一錢姜一片水煎一劑即愈傷寒初起治方凡鼻塞目痛項強頭亦痛切其脈必浮緊此傷寒桂枝甘草陳皮乾葛各一錢姜一片水煎一劑即愈此傷寒初起要方最為神效加味平胃湯治四時感冒初起岡州吳息園方川芎防風羌活陳皮蘇葉厚朴薑汁炒各八分柴胡一錢蒼朮二錢楂肉麥芽炒各一錢五分甘草五分姜三片引水煎服治盛夏風寒濕熱陰陽感冒良方中堂戴狀元府中傳防風三錢炒芍二錢五分吳萸一錢八分厚朴一錢枳實川芎前胡各二錢廣皮茯神各二錢五分車前一錢五分蘇梗一錢甘草八分煨姜一片青果三枚為引水煎服亦可或共為末煉蜜丸亦可其丸重一錢五分小兒減半婦女加酒炒當歸二錢救苦丹專治傷寒感冒頭疼口渴身熱目脹筋骨痠疼一切風寒之症居家出外窮鄉僻壤不可少之藥也紫蘇葉四兩羌活四兩川芎二兩生草一兩黃芩酒炒二兩防風二兩白芷二兩生地二兩北細辛一兩南蒼朮炒二兩陳皮二兩香附米炒三兩葛根四兩共末生薑汁打麵糊丸如梧子大每服三錢蔥湯下或做彈子大亦可諸葛行軍散治冬月一切正傷寒發汗之藥也緑豆粉麻黃去節乾薑陳皮各一兩共末涼水服三錢病症即解四時感冒陳皮五錢蘇葉一錢生薑三片煎湯服一二帖或汗或不汗自愈神效寸金丹治一切感冒噁心嘔吐泄瀉傷食發熱頭疼四時傷風咳嗽一切雜症之要藥也烏藥防風羌活前胡川芎白芷製半夏姜炒赤茯苓砂仁炒以上各三兩枳殼炒炙草各一兩五錢白蔻仁炒二兩草果仁一兩厚朴姜炒木香紫蘇薄荷蒼朮炒香附炒藿香以上各三兩陳皮三兩二錢共為細末用神麯二十三兩研細以薑汁打糊合藥為錠每錠重三錢陰乾用飛金硃砂為衣薑湯化下冬月感寒吳萸五錢煎湯服之取汗瘟疫門時氣瘟疫流行常常以東行桃柳枝煎湯浴之極佳又時常以紅棗蒼朮二味不時同早礱糠厝火熏之自不傳染又方正月初一取東行桑根如指長七寸以丹砂塗之懸門戶上或令帶之亦可闢除祕傳除疫救苦丹專治一切瘟疫時症傷寒感冒無論已傳經未傳經大人服一丸小兒半丸涼水調服出汗即愈重者連進二服未汗之時切不可食熱湯熱物汗出之後不忌此丹百發百中效驗如神有力者宜多修合濟人陰功不少明天麻麻黃乾薑松蘿茶緑豆粉各一兩二錢粉甘草硃砂雄黃各八錢生大黃二兩共為細末煉蜜為丸彈子大此丹極平淡極神奇凡遇瘟疫時行服之無不愈者闢疫傳染方赤小豆三兩鬼箭羽二兩鬼臼二兩雄黃二兩共末蜜丸如小豆大佩帶一二丸可與病人親近不致傳染五瘟丹冰片六分牛黃一錢麻黃二錢零四釐琥珀一錢零五釐甘草三錢五分共研極細末磁瓶收貯勿令泄氣此散專治四時疫症一切感冒用清水調勻取骨簪蘸藥不論男女點兩眼角俟一炷香汗出如重未出汗拭去再點一次汗出即愈疾除病散應效如神幸勿輕視此方寶之為囑闢瘟丹乳香蒼朮北細辛牛甘草川芎各一錢真降香檀香各一兩共末紅棗肉丸此丹燒之能令瘟疫不染久空房屋燒之可闢穢惡又方用紅棗二斤茵陳切碎八兩大黃切片八兩加水安息更妙如無亦可以上三味燒燃闢穢廣濟丸蒼朮白朮陳皮厚朴薑汁炒各三兩甘草一兩五錢白蒺藜一兩五錢丹參一兩五錢共研末蜜丸每服二錢薑湯下此丸能治外感內傷一切風傷溫疫霍亂吐瀉瘧疾腹痛等症二聖救苦丹熟大黃四兩豬牙皂二兩去皮弦共末稀糊為丸梧子大每服十餘丸緑豆湯送下出汗為度此丸專治時行溫疫噁心嘔吐吞酸身體疼痛發熱口渴不論傳經過經俱可服預防瘟疫大管仲一枚浸水缸內加白礬少許日逐飲食不染溫疫最妙大頭瘟頸臉皆腫者服藥之時再服側柏葉搗自然汁調蚓泥燒研敷靛花染坊可覓閩靛花三錢燒酒一杯雞蛋清一個同攪勻服即愈神方也四時瘟痘黑砂糖薑汁滾水各一蠱同攪勻令病人乘熱服即增寒熱發汗而愈時疫不傳人蒼朮三錢三分三釐米泔水浸切片炒甘草一錢六分六釐川芎八錢五分乾葛一錢三分六釐姜三片連須蔥頭三個水二碗煎八分空心服己病者立愈未病者不染也時疫傳染此病汗氣入鼻至腦即散布經絡初覺頭痛急用此方芥菜子末用水調填臍以熱物隔衣一層尉之汗出即愈又方以松毛切碎為末酒下二錢日三服能闢久瘟升麻葛根湯治瘟疫傳染頭疼身熱惡寒遍身隱疹發斑無汗等症升麻葛根白芍各一錢甘草五分嘔吐者二分水一碗前服如表熱加柴胡一錢裡熱加黃芩一錢鼻血衄血加生地丹皮各錢熱甚加生枝子黃連各一錢咽痛加元參馬勃各一錢大便閉加桔梗枳殼大黃各一錢口渴加花粉一錢頭疼加川芎一錢額痛加白芷一錢身痛加羌活薄荷各一錢嵐障山氣生熟大蒜各七片共食之少頃腹鳴或吐血或大便即愈預闢瘴癧桃仁斤吳萊萸青鹽各四兩同炒熱入瓶密封一七取出煉去茱萸鹽將桃仁去皮尖每嚼一二十枚山居尤宜時疫大行自家水缸內每早投黑豆一撮閣家無恙又五更潛投黑豆一大握於井中勿使人見凡飲水傢俱無傳染入病家不染方香油調雄黃蒼朮末塗鼻孔中既出用紙條探噴嚏飲雄黃酒一杯決無傳染運氣五瘟丹治天行瘟疫沿門比戶病症大小咸若初則惡寒一經發熱面色紅黑即不再寒而與傷寒症發熱而仍惡寒面色慘淡者有別其病多由亢旱既久驟遇春雨濕熱蒸熏所致發於春暮夏初為甚其人初得病時神思昏沉舌胎如積粉口渴咽乾穢氣滿口大小便閉狂惑閉亂甚則發狂發黃癍疹喘厄接踵而至並有頭腫項粗俗所云蛤蟆瘟疙瘩瘟等症悉由大毒內盛急宜表裡兼治攻發並行醫能以防風通聖散荊防敗毒三消等飲遵吳又可之法參治則得之矣否則用此丹治之為最安萬勿拘泥傷寒法而以下不厭遲之說誤人若果傷寒自當遵傷寒法其如瘟症實與傷寒迥別其時其症其形其脈判然可辨具在方書茲不備述黃連戊癸年君藥黃柏丙辛年君藥黃芩乙庚年君藥梔子丁壬年君藥甘草甲己年君藥川大黃三兩水煮搗爛紫蘇一兩香附一兩古丹藥照年干以一味為君藥比群藥加倍俱生為末將大黃加倍煮熟連汁搗爛和為丸每重一錢外用硃砂三錢金箔三十張為衣每於上年冬至日配合備用譬如乙丑年黃芩為君當於甲子配合其丸用開水化下孕婦忌服虛勞人慎用治瘟疫傷寒時症或飯後氣腦心口脹悶填塞不舒方以上好燒酒燉熱將布二塊蘸酒自胸向下搽抹如布冷令換一熱布輪替搽抹如此數次病氣下通即能大便而痊次非誤下陷胸之症故治法不同於湯液誠補古法之所不及者也又方此方系少宰李奉倩先生傳云稱此係祕方最效麥冬三錢去心烏梅肉三個芫荽梗三十寸燈心三十寸竹葉三十片紅棗三枚去核共一劑水煎熱服又治瘟疫漢陽進士黃亮夢神傳治瘟疫方果救萬人用小便一碗薑汁一鍾同煎熱服治瘟疫流行硃砂症又名心經疔方牙皂三錢五分硃砂一錢五分明雄二錢五分北細辛三錢五分廣皮二錢藿香二錢桔梗二錢蘇薄荷二錢桔礬一錢五分白芷防風法半夏廣木香管仲甘草各二錢上藥照分稱足共為細末收貯磁瓶內勿令走氣遇患後開各症用藥三分吹入鼻內稱足一錢薑湯沖服服藥後用紅紙捻照心窩背心二處見有紅點發現即用針破內有紅筋挑出方保無事若稍大意命在頃刻此非僞言毋稍輕視不但專治此症凡一切感冒風寒並皆治之此方因道光辛巳年山東河南瘟疫流行蔓延江浙蘇郡南京蕪湖等處地方中者即死初起脈散牙緊發荒手足麻木目閉不語喉腫心疼醫多不知其症誤認喉風死者無數兩江制憲孫玉廷大人查乾隆元年間貴州地方曾患此症傷人甚衆傳曰此症名硃砂症又名心經疔因丹平山天雷擊出一方抄傳遵法制用效應如響救人無算今疫氣流行其症如一今查出公諸海內此症甚急藥即早備病至求藥則不及矣此藥並可治痧症治大頭瘟方東平展子明傳頭面腫大如斗二目難開危急者服之奇效牛子炒香研苦桔梗荊芥穗焙家菊花黃柏稍龍膽草防風羌活連翹去心蔓荊子去蒂焙薄荷藁本元參白芷升麻川芎生甘草各三錢上藥共合一處入淨砂鍋內貯水十碗在病人房內炭火慢熬至五碗為度去渣將病者仰臥以小鐘徐徐灌之勿令間斷服完其腫自消須善調養數日再服清胃之藥必無後患熱極不認親疏踰牆越垣奔走將熊膽調水吞下神授枳殼丸方鳳翔陶司馬傳方車前子三錢研末枳殼一兩玉竹三錢桂枝五錢雲苓四錢青皮七錢陳皮七錢荊芥五錢荷葉粉一兩佩蘭葉六兩洗淨上藥研末加黑棗四兩去皮核煎汁代水泛丸每服三錢開水送下輕者一服重者二服其效如神如紅痢藕節湯下此方因道光元年時疫流行起自大河以北流行齊魯吳越蔓延皖城其症皆腹痛吐瀉手足麻木約至一周即至不治此丸服之效驗如神傷寒門發散傷寒不問陰陽二症倉卒無藥用生薑一兩蔥白十莖好酒一大碗煎一碗熱服蓋被周身汗透即解勿令汗太過忌大葷五七日凡春秋二時依此方夏月蔥姜減半冬月加黑豆二合炒煎服尤效如旅次煎藥不便用生薑五片蔥白四莖紫蘇葉三錢若無此味用細茶代之亦可泡湯熱服最妙傷寒熱結不解枳實五錢大黃七錢瓜蔞四錢同煎服即愈傷寒不解已三四日胸中悶惡者淡豆豉一升食鹽一合水四升煮一升半分服取吐此祕法也按傷寒邪不解乃食積在胸膈上也不宜下之令吐自愈矣治傷寒胸膈不寬作痛及一切寒結熱結水結食積痞結痰結用生薑搗爛如泥去汁取渣炒熱絹包漸漸揉尉心胸脅下其痛豁然自開如姜冷再入生薑汁妙再尉如熱結微炒如大便小便結尉臍腹傷寒犯內傷食積蓄血小腹硬脹不能言語神思欲脫兩目直視手足強僕症候危篤難以下藥者急用紫蘇數兩前滾熱湯將手巾在湯中泡熱取起扭干乘熱攤病人肚上及小肚上令人以手在手巾上旋旋摩擦如手巾冷再泡熱同前攤上又擦之如此數次待他宿糞硬塊積血自下如肛閉結不通以蜜糖豬膽煉成條子插入導之待積血積糞下乃別調理此法最妙屢試屢效傷寒並一切雜症嘔噦手足逆冷橘紅一兩生薑一兩水二碗煎八分徐徐咽下即愈陰毒傷寒四肢逆冷吳茱萸一兩酒拌濕絹袋二個包蒸極熱更換尉足心候氣透即止陰症腹痛面青甚者用鴿子糞一大撮研末極細熱酒熏被覆臥汗出即愈仍服少許傷寒五六日忽發黃色急用麻油半盞雞子清一枚水半盞和入攪勻服之神效傷寒狂走雞子殼要出過小雞者泡湯服即睡時疫傷寒舌黃煩燥狂言發熱吞生雞子一二枚即時清爽喉管傷寒凡喉中作癢難過不可吃茶酒湯水者用薄荷二分麝香一分作極細末吹入喉中待其氣通吐出涎水碗許然後吃陳黃米湯半茶杯即愈若竟吃茶酒等項便不可救傷寒發頤原受風寒邪表未盡日久身熱不解耳項前後結腫疼痛初起身熱口渴柴胡花粉乾葛黃芩桔梗牛子連翹石膏各一錢甘草五分升麻三分水煎不拘時服此方俱經應驗四味回陽飲大溫治元陽虛脫危在頃刻人參一二兩製附子二三錢炙草一二錢炮姜二三錢水二杯武火煎七分溫服徐徐飲之華他救陽脫方治寒中三陰口噤失音四肢強直攣急痛疼似乎中風及厥逆唇青囊縮無脈或卒倒尸厥脫陽等症急用蔥白一握微搗細炒熱用布包尉臍下分作二包更替尉之甚者仍灸氣海在臍下一寸半是關元二十多壯脈漸出手足漸溫乃可生也次用附子重一兩一枚者切八片白朮乾薑各五錢木香二錢水二鍾煎一鍾候令灌服須臾更進一服或用回陽等湯玉泉散又名六一甘露散此益元散之變方也治陽明內熱煩渴二便結閉頭痛瘟疫及熱痰喘嗽等症宜用此方益元散一名天水散又名六一散治中暑身熱煩渴小便不利分利陰陽去濕熱治熱痢之聖藥次寒滑石飛六兩甘草一兩為末每服二三錢一方加辰砂三錢一方加牛黃治心煩而不得眠吐法新攻此方可代瓜蒂散三聖散之屬凡邪實上焦或痰或食氣逆不通等症皆可以此吐之萊蔔子搗碎以溫湯和攪取清汁徐徐飲之少頃即吐即有吐不盡者亦必從下行矣又法以鹽少許於鐵鍋炒紅色入水煮至將滾未滾之際攪勻試其滋味稍淡乃可飲之飲至數次自然發吐去病而止梔子豉湯治傷寒煩熱懊憹當吐者亦用此方梔子十四枚香豉四合先煮梔子後入豆豆再煮溫服得吐即止勿再服陰症傷寒方蔥八兩麥麩一斤鹽一斤乾薑四兩共炒熱用青絹或布包尉臍稍冷再炒熱尉以手足暖有脈為度發汗方乾薑黃丹桔礬胡椒各三錢共為末用滴花上燒酒為丸一服分作二丸男左女右置手心上按會陰穴片時即出汗足心有汗方止去藥丸凡一切病不能發汗者皆可用此方會陰穴在穀道前腎囊後正中間即是鶴頂丹治痰氣結胸不問陰陽虛實陷胸瀉心等症銀硃五錢明礬一兩以尉火盛火瓦盞盛藥熔化急刮搓丸每服一錢煎真細茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀硃化積故也傷寒舌出芒刺黑胎水剋火也用劫法以新汲水浸青梭布洗其舌以薑片刮舌自然退之四治湯白砂糖五錢傷寒生薑湯調服傷食山楂湯調服傷熱新汲水調服婦人血崩百草霜調服傷寒初起方不拘男女老少皆宜元參一兩二錢水二杯煎一杯去渣乘熱服蓋暖衣被汗出即愈小兒減半用之此係仙傳之方傷寒點眼法粉甘草六分冰片四分病起一日至六日男左女右點之出汗即愈如過七日不論男女兩眼並點神效專治結胸停食傷寒糟蒲餅陳香糟六兩冰薑菖蒲根各四兩鹽二兩共搗勻炒熱為餅貼胸前痛處以火尉之內響即去如口渴在其吃茶水待大便利下惡物即愈傷寒結胸黃元基曰太陽症結胸症其煩燥主死言不可下即下而亦死也夫結胸而加煩燥此胃氣之將絶也胃氣欲絶津液何生津液既無心何所養故結胸而又煩燥往往症成不可治也雖然津液之竭非五臟之自絶亦因結胸之故耳是必攻其中堅便結胸症愈而津液自生死症可望再生也我今傳一奇方列下化結湯花粉五錢枳殼一錢陳皮五分麥芽天冬桑白皮神麯各三錢水煎服一劑即結胸開面津液自生也此方用花粉以代瓜蔞不致陷胸之過猛然而花粉即瓜蔞之根也故善陷胸而無性猛之憂枳殼消食寬中麥芽與桑白皮同用而導化更速神麯神皮調胃實有神功天冬善生津液佐花粉有水乳之合世人未知也花粉得天冬化痰化食珠有不可測識之效所以既結者能開必死者可活若以大陷胸湯蕩滌之於已汗已下之後鮮不速其死矣結胸之症乃傷寒之變也不可不以變法治之傷寒火邪正熾原不可急與飲食若不知禁忌與之則胃中得食如寶故菰而不得出也而他臟見胃中有食群起而爭其勢猖狂非杯水可解必當以變法治之急須用瓜蔞一枚搗碎甘草一錢同煎服夫瓜蔞乃陷胸之勝物平常人食之必至心如遺落今病人食之不畏其虛乎誰知無病常人斷斷不可服此而傷寒結胸之症卻有相宜蓋食結在胸非大黃芒硝枳殼檳榔厚朴之類所能祛逐必得瓜蔞始能餡之人於脾中猶恐其過於上下也少加甘草留之且得甘草之和不至十分推蕩此變症而用變法更勝於用正也傷寒直視譫語喘滿下利黃元基曰傷寒陽明症中有直視譫語喘滿者死而下利亦有死者此必症犯直視譫語喘而又下利一齊同見者也苟有一症未兼尚不宜死倘三症皆見明是死症矣然直視譫語多是胃火之盛自焚其心而腎水不能來濟於是火愈盛而無制喘滿者火炎而氣欲上脫也下利者火降而氣欲下脫也此猶欲脫未脫之危症苟治之得法猶可望生吾有奇方列下援脫散石膏五錢人參一兩麥冬白芍各一兩竹茹三錢水煎服此方用人參以救脫用石膏以平火麥冬以平喘白芍以止利竹茹以清心自然氣不絶而可救也傷寒壞症黃元基曰此乃已汗已吐已下而身仍然如火不解也其時自然各死症紛見又將何法以生之乎夫已汗已吐已下而不解者乃不宜汗吐下而誤用汗吐下也於是而欲救其失終無一定之方也今特傳一奇方於三者之失而統救之方名救壞湯人參五錢茯苓五錢柴胡一錢白芍一兩元參五錢麥冬五錢白芥子二錢當歸五錢陳皮五錢水煎服此方妙在全不去救失汗失吐失下之症反用參苓歸芍大補之劑少加柴胡以和解之自然火退而胃氣生倘鑑其失吐失汗失下而重為之汗吐下則孱弱之軀何能勝如是摧殘哉故必用此方而後死者可生也傷寒少陰症黃元基曰脈微沉細但欲臥汗出不煩由欲嘔吐至五六日自利復煩燥不能寤寐者死症也傷寒而脈見微沉細明是陰症況欲臥而不欲動乎汗己出則內無陽症可知心中不煩時欲嘔吐此陽邪已散而陰邪作崇急宜祛寒為主失此不治至五六日而下利是上下俱亂也倘不煩燥則腎中之真陽未散猶有生氣若又加煩燥不得臥寐明是奔越而露不可回之兆矣非死症而何然總由初起失治以至於不可救非本不可救而成此擾亂之症也今定一奇方轉陽援絶湯人參白朮炒棗仁各一兩茯神二錢肉桂二錢水煎服一劑即可安臥而回春此方用人參以救絶用白朮茯神以分消水濕而止下利又用肉桂溫中而去寒用棗仁以安心而解燥用之得宜自然奏功如響傷寒六七日脈散黃元基曰手足厥冷煩燥灸厥陰而厥不還者死此仲景原文也夫傷寒陰症發厥宜灸厥陰之經亦不得已之法原不及湯藥之神也灸厥陰不還聽其死者亦僅對貧寒之子而言以其無用力參也倘以參附湯救之未有不生者我今憐憫貧人另傳一方名灸音九灼也還厥湯白朮四兩附子三錢乾薑三錢水煎服一劑而蘇凡見厥逆等症以此方投之無不神效如響蓋白朮最利腰臍陰寒之初入原從臍始利其腰臍則腎宮已有生氣況佐之附子乾薑則無微不達而邪又安留乎況白朮健脾開胃中州安奠四肢邊旁有不回陽頃刻者乎傷寒六七日忽下利黃元基曰先不下利而忽變下利已是危症況又汗出不止乎是為亡陽有陰無陽明是死症將何以救之夫陽之外越由於陰之內祛欲陰安中於中而不外祛必先使陽收於內而不外出急以人參五味湯救之人參三兩北五味一錢煎湯服之即可回生然貧寒之子安可得參今另定一方白朮三兩黃耆三兩當歸一兩北五味一錢白芍五錢水煎服此方補氣補血以救陽氣之外越陽回則汗自止汗止而下利未必遽止方中特用當歸白芍者正所以止利也水瀉則當歸是所禁用至下利非水瀉也正當取當歸之滑白芍之酸兩相和合以成止利之功況又有五味之收斂不特收汗並且澀利若遇貧寒之子無力用參者急投此方亦可救危亡於頃刻中寒門揉臍法治陰症腹痛吳茱萸二三合麥麩皮一升食鹽一合拌勻炒熱絹包揉臍中上下自效握陰取汗法治同前露蜂房二錢燒存性蔥白五寸同研為丸男左女右著手中握陰臥汗出即愈尉足心法治中寒四肢厥冷肚腹痛疼吳茱萸一升酒拌濕用絹袋二個包蒸極熱更互尉足心候氣透疼即止以上普門醫品雷真君救亡丹陰寒直中腎經面青鼻黑腹中痛囊縮死亡頃刻救之稍遲必一身盡黑而死急用此方人參五錢白朮三錢附子一枚乾薑三錢肉桂五錢水煎急灌之此方較仲景張公之用熱更重不知此症全是一團死氣現於身之上下若不用此猛烈大熱重劑何以遂陰寒而追亡魂祛毒氣而奪陽魄哉故人參若可少用而桂附不可不多用也然而白朮又何以多用之耶蓋白朮最利腰臍腹痛欲死非此不能通達故多用之以驅駕桂附以成除蕩之功而奏返魄返魂之效耳雷真君逐陽返魂湯陰陽直中腎經心痛欲死嘔吐不納食下利清水本是不治之症蓋寒邪犯心而脾將絶急不待時此時覓藥緩不濟事速用針刺心上一分出紫血少許然後用此湯救之人參一兩良薑三錢附子五錢茯苓五錢白朮三錢丁香一錢此方專入心以逐邪返元陽於頃刻心經定而諸邪退脾胃自安不致上下之逆庶可重生否則因循觀望心至不起矣雪真君蕩寒湯凡人直中陰寒冷氣犯於小腹不從傳經傷寒而自寒者謂之直中陰經陰經者少陰腎經也其症必畏寒腹痛作嘔手足厥逆或俱青色甚則筋青囊縮若不急以溫熱藥治之則立死最可畏也白朮三兩肉桂三錢丁香一錢吳茱萸一錢水煎服一劑而陰消陽回不必再劑此方妙在獨用白朮之多則腰臍之氣大利又得肉桂以溫熱其命門之火丁香吳茱萸更止嘔逆而返厥逆則陰寒之邪潛消故一劑回春也陰症縮陽方凡人陰盛陽衰身冷腹痛陽物頃刻縮盡必死真危險症也速將物鉗住不令縮盡速服回陽救急方用信豐大爆竹一個剝出硝藥二三錢或有炮硝亦可更佳再尋常小爆竹硝亦可用擂研細末用上上堆花燒酒一盞有高粱燒酒更佳燉熱調服即刻直入丹田肚腹雷鳴陽物即時挺出可以回生徐服溫補回陽湯此法系急救方回陽湯人參二分如貧寒之家無力換人參多服結白大洋參四五錢用米炒過或多服炙上上文黨參一二兩亦可黑附塊四錢上蒙桂一錢焦於朮四錢土炒硫黃二錢要如法制過用豬大腸一段貫入黃內同甘草煎水次燉極爛去腸不用研碎入藥吳茱萸一錢開水泡三炆故脂一錢鹽水炒益智仁一錢鹽水炒葫蘆巴二錢炒研炮姜灰一錢炙甘草六分水煎服三五劑大有神效硫黃丸硫黃一斤揀透明淨者黃蠟一斤將二味用砂鍋一個先入黃後入蠟又武炭火煮預備涼水一盆旁邊待熔化傾入涼水盆內略分二味仍取入原鍋熔化又備涼水一盆傾入在內如次七次至八次黃沉蠟浮仍傾入涼水盆內去蠟存黃聽其自涼曬乾以老米麵為丸梧子大加胡椒末二兩為衣每服一錢或二錢極熱燒酒送下此丸治一切陰症腹痛寒氣冷氣寒痰凝結久服寒暑不畏延壽至寶發散寒邪胡椒丁香各七粒研末以蔥白搗膏和塗兩手心合掌握定夾於大腿內側溫覆取汗即愈脫陽虛症四肢厥冷不省人事或小腹緊痛冷汗氣喘炒鹽尉臍下氣海取暖即蘇此急救方也急救陰症腹痛方凡遇此症預將生黃豆嚼之不知豆味者是此方瀛海淳朴堂王佑之刊傳取早米飯內糠曬乾二三斤復炒至焦黑色研細每服三錢滾燒酒送即愈心疼小腹痛面指發青乃陰症也左龍即白鴿屎一大撮炕研細熱酒一蠱攪勻澄清頓服寒火相結小腹疼痛俗名陰寒此方極驗枯白礬棗子大一塊連須蔥白三段胡椒按病歲數一歲一粒用男孩兒吃之乳合一片共搗為丸安放肚臍上一炷香時痛即止忌用食生冷小腹疼痛諸藥不效用婦人油發燒炭酒調三錢服陰症急不待藥用新生烏雞蛋煮熟放於臍上久之又換輪換三枚即愈後將銀簪插入蛋內即成黑色陰症肚疼欲死之症立刻見效陰症傷寒亦驗枯礬二錢火硝一錢胡椒一錢黃丹八分丁香五分共末用老醋調成糰子握在手心男左女右以帛絹扎之出汗而愈手足紫黑陰症小腹疼不可忍黑料豆三合炒熱焦以上好燒酒烹滾熱服加蔥須同烹更妙中風門開關散此方治中風厥逆牙關緊閉不省人事先用此藥開關豬牙皂莢去皮弦淨二兩用生白礬一兩同將皂入水中煮取出曬乾為末北細辛五錢去葉二味共為細末用少許吹入鼻中即省人事又用針刺十指甲離指甲一韭葉許出血即愈稀涎方此藥專治痰涎壅盛用此先吐其痰然後再用別方豬牙皂四條去黑皮炙黃白礬一兩共為細末溫酒調三錢徐徐灌下治中風中痰中暑中氣乾霍亂搗生薑自然汁一盅童便一盅和勻灌下治風射入筋骨疼痛如夾板狀不可忍者騾子下蹄爪甲燒灰存性研末或黃酒或湯調服立愈治風痛方飛羅面一兩薑蔥汁各五錢牛膠三錢共熔和膏貼患處極效省風湯治中風挾熱挾痰口噤口眼歪斜攣急疼痛風盛痰實防風南星生用各二錢半夏浸洗生用一錢黃芩一錢甘草一錢生薑三片引不拘時服此藥同導痰湯合服尤妙導痰湯治一切痰涎壅盛或胸膈留飲痞塞不通陳皮半夏茯苓甘草南星枳殼麩炒上等分生薑三片引食後服清心散治風痰不開青黛硼砂薄荷各二錢牛黃冰片各三分上為細末先以蜜水洗舌再以薑汁搽舌然後將藥用蜜水調稀搽舌根上即開苡仁湯治中風流注手足疼痛麻痹不仁難以曲伸苡仁當歸白芍麻黃肉桂蒼朮甘草上等分生薑七片為引自汗去麻黃有熱加肉桂冒風湯治虛風襲人忽牙關緊急手足攣縮頭面浮腫白芷一錢二分升麻二錢葛根蒼朮荊子各一錢炙草五分柴胡藁本羌活黃柏草豆蔻麻黃各五分當歸一錢姜三片棗二枚引地黃散治中風四肢拘攣乾地黃炙草麻黃去節各一兩用酒三水七煎日進二服養血當歸地黃湯當歸川芎熟地白芍藁本防風白芷各一錢細辛五分水煎食遠服救右湯治中風後右手不仁或口角流涎不能言語等症白朮五錢人參二錢五分黃耆五錢半夏八分茯苓一錢五分炙草三分附子陳皮各三分水煎服三劑出聲五劑收涎連服二十劑全愈女子左手不仁救左湯治中風後左手不仁或目不認人等症熟地一兩白芍五錢柴胡三分花粉一錢五分水煎服四五劑見效十劑大效一月愈女子右手不仁兼治簡易方薑汁蔥汁各一碗醋一小碗牛皮膠八兩蒜汁一碗急性花汁一碗如無時取花存貯用水搗汁上藥共入鍋內慢火熬煮成膏青布攤貼痛處即愈中風口噤荊芥穗為末調好酒服二錢中風不語方香油二兩雞子一個將雞子打開去殼令油調勻灌之即愈又方令人屎乘熱澆面上亦愈中風痰厥肥皂角一個豬油搽火上焙要搽焙七次研末好酒灌下又方香麻油一盞灌入口中用鵝毛探吐痰涎立效中風口喎皂角五兩去皮弦炕末以久年陳米醋和之左喎塗右右喎塗左干即易之半身不遂牛膝三兩藏鴨肚內重湯煮除牛膝食鴨每日常食又方千年健一兩鑽地風一兩各用夏布袋盛之陳醋四兩紅糖四兩用燒酒三斤黃酒一斤半合一處將上藥入內泡浸七日後早晚飲之自愈又方並治瘋魔痰症番木鱉十個砂鍋微炒後用陳壁土炒再用麵炒又用真麻油微炒研細麵糊為丸硃砂為衣如緑豆大每服量人強弱至一錢止燒酒臨臥服之又方麻黃四兩不去節切碎先將棉花子四兩入鍋內炒黑色後入硫黃末七分又炒少許候黃煙盡為度炒用火麻桿一尺長共七根炒棉花子入壇內續入麻黃再將麻桿切細入內乘熱下三年陳火酒七壺封固退火一七每服三小杯俟汗出預備公豬肉湯補之七八日即愈又方全身俱治不拘男女當歸酒洗故脂熟地棗仁炒枸杞黨參兔絲子酒炒茯苓杜仲淮山藥加皮陳皮白菊防風荊芥桂皮青皮各五錢續斷炒牡蠣炒各三錢牛膝四錢炒何首烏一兩烏豆和酒九蒸九曬虎骨取膝脊骨頸骨共二十兩酥炙龍眼肉二十枚天麻五錢共研末煉蜜丸如龍眼大每服四丸搗爛以燒酒儘量服壽星丸痰迷心竅心膽被驚神不守舍妄言妄語天南星一斤先挖土坑一尺深柴火三十斤燒紅入酒五升滲干入南星在內將盆覆定以灰塞之勿令走氣次日取出為末入琥珀一兩硃砂二兩為末薑汁糊為丸如梧子大每服三十丸至五十丸煎人參湯下或石菖蒲湯下一日三服墜痰丸治風癇痰迷天南星九蒸九曬為末薑汁打糊為丸梧子大每服二十丸或人參湯或菖蒲湯下控涎丹治痰留胸膈上下變生諸症或痰迷心竅紫大戟白甘遂白芥子各一兩研末薑汁糊丸梧子大每服二十丸以津液咽下欲取和服五六十丸瘋狂蔥里蘆二錢即管內白翳膜曬乾秦艽三錢共末用無根水調服即吐痰塊如不愈再用後方又方干遂三錢硃砂三分共為細末用雄豬心一個竹刀割開將藥入內用濕紙裹二三十層漫火炙紙干再炙以熟為度去心止將藥為丸如小麥大分三服服之即愈瘋癡不知人事一發即治桐油四兩煎豆腐八塊儘量與吃吃完吐痰盡即愈要餓一日夜餓極方與飲食吃之為妙顛狂失心明礬煅三兩鬱金七兩共末米糊為丸梧子大每服五十丸白湯送下數服即愈此方昔一婦人病狂十餘年遇異人授之初服心中如有脫去神氣灑然再服而愈亦治男婦抑鬱顛狂及風迷悶羊癲豬癲病方皂角核一個去皮用肉曬乾研細末每服三釐人健壯者用五釐空心白湯送下服後吐出涎痰愈即止服羊癇風甜瓜蒂七個研細白礬一錢共末取無根水調下即吐痰過五日再吃一服全愈又方羊頭風俗名羊牽風黑羊糞瓦上焙乾為末一錢砂糖調下狂跳邪語陳細茶白礬各三錢為末飯搗丸梧子大硃砂一錢研細為衣發時服三錢追風祛痰丸治諸般風癇癲迷世人患此病甚多用此藥甚效白附子麵包煨防風天麻姜蠶牙皂俱炒燥各一兩全蠍炒廣木香各五錢枯白礬川黃連各三錢南星三兩白礬牙皂煎湯浸一宿人參白朮炒各一兩半夏牙皂生薑各二兩煎湯浸三日六兩以上之藥研末薑汁和飴糖為丸梧子大每服七八十丸白淡薑湯下豬羊癇牙皂角八兩去弦取不落水豬肝一具同煮一二炷香取出豬肝將牙皂曬乾加明礬四兩檳榔二兩共為末神麯和丸如緑豆大早晚各服一錢細茶湯送下羊癇用羊肝九轉化痰丸治一切風痰病症生白礬一兩入豬膽內陰乾北細辛五錢為末煉蜜成丸如梧子大一歲十丸茶湯下大人五十丸久服痰自大便出口眼歪斜將萆麻子研爛右歪塗左左歪塗右一經復正即速揭去又以醋炒石灰為末研爛仍以醋調如前塗之或以皂角末塗法如前口閉痰塞皂角刮去皮弦將豬油搽上火邊烘成黃色研為末每服一錢溫酒送下或加白礬五分更好如一時無藥急速扯其頭頂心之發可醒中痰用明礬末同陰陽水灌之再服再吐或用礬水煮入蜜少許頓服即未吐飲熱湯催之此方並能治頭痛痰癖治怔忡痰厥方臘月初八日取大雄豬膽一枚將明礬研細入膽內盛滿為度陰乾去皮仍研細每錢加飛過硃砂三分和勻用無根水服三銅錢邊即愈所謂三銅錢邊者即一刀圭之意極言其少也怔忡病柏實煮飲日久自愈又方烏骨雞蛋一枚將頂開一小孔入飛過上硃砂細末三分攪勻孔仍封固置飯上蒸熟去殼每日早午晚均用淡鹽湯下每次一枚服至三日後自必見功多多益善中風不省人事得病之日便進此藥免成廢人用柏葉一握蔥白一握連根二味細研如泥無灰酒一大鐘煎一二十沸去渣溫服如不飲酒分作四五次服癱瘓祕方熟牛骨髓一碗熟白蜜一斤半濾過加炒白麵一斤炒黑乾薑末三兩四味和勻為丸如彈子大每服三四丸細嚼黃酒下大效歷節諸風痛沒藥一錢虛脛骨二錢為末酒服癱瘓手足嚲拽口眼歪斜言語蹇澀步履不正川烏去皮尖五靈脂去砂石各二兩為末入龍腦麝香各二分滴水為丸如彈子大每一丸以生薑汁研化暖酒調服一日二服五七丸便覺手持足移可以舉動回生再造丸治中風中痰左癱右瘓筋骨疼痛半身不遂步履艱難服此止痛手足如常比郭令公有再造唐室之功故名再造真蘄蛇小者為佳去骨頭尾炙三寸酒浸灸取淨末四兩北細辛研末赤芍炒烏藥酒炒青皮麵炒白朮土炒天竺黃香附去皮毛酒炒姜蠶酒洗炒乳香去油制附片陰乾沒藥去油膽星烘乾骨碎補酒炒沉香研末母丁香研龜板火炙以上藥味各一兩麻黃炒防風酒炒元參酒炒甘草炙羌活酒炒天麻烘乾藿香烘乾白芷烘乾川連酒炒茯苓蒸熟地搗如泥白蔻仁研末不見火當歸酒炒川蓽薢炒肉桂研末不見火片子薑黃烘乾川芎酒炒辰砂兩頭尖穿山甲前後四足各用五錢麻油浸炙共二兩黃耆蜜炙西琥珀研末大黃酒蒸草蔻仁研末大首烏料豆水拌蒸九次以上藥味各二兩葛根炒靈仙酒炒桑寄生烘乾不可炒全蠍去頭足並尾各二兩五錢虎脛骨炙酥一對紅花酒浸烘乾八錢冰片要真的二錢五分血竭另研八分松香煮過地龍炙乾原麝各五錢西牛黃研二錢五分犀角尖鎊末八錢廣木香研四錢水安息和藥內四兩人參研末二兩共為細末煉蜜和勻搗數千捶為丸每丸重一錢金箔為衣凡一切中風中痰中氣中濕口眼歪斜生薑湯下如男婦腳氣骨節疼痛手足拘攣半身不遂白癜風紫癜風無灰酒空心下孕婦忌服此方山東嘉祥王宗聖識極矣故敢告四方君子以志同仁廣傳萬勿視藥微而不能伏症也幸甚幸甚白紫癜風風雄黃硃砂等分入茄蒂內搗濃擦患處白癜加蛇蛻同擦更妙三日即愈又方福靛小便調勻以新青布蘸藥搽之又方白附硫黃等分為末用帶皮生薑自然汁調勻以茄蒂蘸藥搽之半身不遂大黑料豆陳皮當歸五加皮各四兩白酒五斤浸三日早晚溫服自愈預防中風凡人兩臂麻木或無名指頭麻木兩眉稜骨疼三年之內必有大風之至宜預防之搜風順氣丸此藥專治上實下虛腰腳疼痛肢體麻木大便燥結小便赤澀腸風痔漏言語蹇澀手足不仁服之可以預防中風熟大黃五兩酒蒸火麻仁去殼炒二兩郁李仁去皮二兩枳殼炒二兩山藥炒二兩獨活一兩山萸肉去核酒蒸二兩檳榔二兩兔絲子酒煮二兩車前子炒二兩五錢牛膝酒洗二兩共末煉蜜丸如梧子大茶酒任下二三錢風濕痿痹門筋縮不舒疼痛不止方當歸一兩白芍薏苡仁生地元參各五錢柴胡一錢水煎服即愈如腳膝轉筋加木瓜五錢極效捷便止腳氣痛用鹽擦患處少時即用熱湯洗之昔有人患腳氣諸藥不效後得此方常用鹽擦後以熱湯浸洗永除此患風癱大病十餘年不能行動者手戰足軟金毛狗全身者用黃酒洗去毛淨切片用酒三升煮三炷香埋土七日退火氣空心日服三次數日見效酒取頂上黃酒又外治方用黃瓜藤煎水熏洗藥酒方治男婦身受風濕筋骨手足疼痛不仁神效當歸一兩川芎七錢生地一兩五錢羌活八錢白芍八錢防風八錢杜仲一兩桑寄生秦艽各八錢桂枝茯苓各五錢白朮淮羊膝炙黃耆各一兩虎骨酥炙二兩有膠更妙川獨活黃松節即茯苓心木各七錢炙甘草六錢用好乾燒酒十五斤酵娘酒五斤用布袋盛藥浸三日隔水蒸一炷香久取出退火氣隨量飲數杯一切手足風痛蔥汁蒜汁各一碗醋一小碗牛皮膠八兩慢火同三味煮成膏用青布攤痛處即止一方加薑汁急性花汁一盞更佳風射腰足痛難踐也松葉搗汁一升酒三升浸七日每服一合日二服或細切為末酒下二錢或蜜丸俱可按松節浸酒行血中之風治腳膝痠疼中風口眼歪斜及歷節痛風俱宜服腿腳紅腫熱如火炙俗名赤遊風用鐵鏽水塗解之膝痛並諸骨疼蒼朮以米泔水浸一晝夜搗碎醋炒極熱布裹在膝如冷又以醋炒熱裹之鶴膝風何首烏煎酒服以醉為度仍將渣敷患處又方槐枝松枝桃枝芫花根共搗煎汁小深盆盛熏膝被蓋候汗揉其患處再以草烏細辛防風等分末縫靴襪護膝內久而自愈遠行腳腫摻鞋底或水濕草鞋摻之常以甘菊花陳艾葉作護膝帶之又方以真蘄艾曬乾去筋膜用艾絨入真川椒作大護膝並下腿裹住久護自愈又方以陳艾取絨照前法菊花川椒和搗入護膝自除其患白癜風硫黃陀僧各等分為末薑汁調搽汗斑硫黃蛇床子陀參各等分和研末以生薑汁調將茄蒂蘸藥搽之鵝掌風皂角為粗末將鵝卵石燒紅小瓦一塊盛在升中上加皂角末燒煙燻之其皮癢甚再熏數次自愈又方豬胰一具去油勿經水花椒溫熱好酒將二味同浸二三日取胰不時搽手微火烘之自愈又方以真蘄艾四五兩水四五盞煮五六滾入大口瓶內麻布二層縛之將手心熏之冷則再易熱熏之又方蜜陀僧一兩為末出籠蒸熱面饃一個分兩半將末撒在內仍臺住以兩手把饃熏蒸良久四次即愈又方五倍子研桐油調搽炭火烘三次愈又方甘蔗汁擦之又方以大梨搗爛兩手搓丸二三枚即愈又方用青鹽防風地骨皮槐條各等分煎水屢洗至妙又方用蒼耳子仁為末將痂取去香油調搽並治牛皮癬手足雁風側柏葉敗船石灰先將敗船石灰研末桐油調搽再將柏葉燒煙燻之一二次全愈腳氣用苡仁米作粥常食久服見效又方赤小豆和鯉煮食又方或以麥麩皮醋蒸尉之互易出汗為妙腿疼腳氣麻絲方用好線麻以木梳將粗皮渣滓梳淨只存絲筋用四兩懸起自下往上用火燎焦存性研極細用好酒二大碗煎熱量人酒素量飲之身上蓋暖下用燒熱磚蹈之則藥力下行以腿上發出汗腳心出黏汗為度即愈寒濕腳氣甚應膏廣膠三兩蔥姜各半斤搗汁留用另將好陳酒糟取糟油二盞或用米醋二碗和陳糟裝細絹濾取汁二盞同膠蔥薑汁熬成膏布攤貼之即止痛腫消愈風濕腳氣腳氣之症感濕而身發熱腳忽腫者是也切不可用人參犯之即死切忌柴胡防己各一錢芍藥三錢茯苓陳皮甘草各五錢薏苡仁一兩水煎服一二劑愈一用人參則引邪入氣分蓋腳氣乃犯血道故宜從下散而不可引上也引上必致患心故主死神效腳氣方金銀藤鬧洋花二蠶沙各四兩垂楊柳枝七寸長的要二十一枝熬水熏洗腳軟病乃腎虛並治腰痛淨杜仲一兩寸斷去絲半酒半水一大盞煎服數劑保中調理即愈腿腫腹內成塊用桃樹根牛蒡根牛膝各二斤慢火煎膏如飴每熱酒服一匙食前服數服見效火丹風熱毒燕窩土用向陽者雞子白和敷又方芥菜搗爛敷之又方蠶沙山梔川連黃芩黃柏大黃寒水石共末水調敷上立效滿身麻木練樹子燒灰為末每服三五錢黃酒調下可愈軟癱樺皮燒灰為末每服二錢酒下久服自效骨痿何首烏一斤牛膝半斤煉蜜為丸每酒服五錢遍身麻木不仁芥子末醋調擦之手足麻木不知痛癢霜降後桑葉煎湯頻洗雞爪風採白楊花掛穗裝入布袋如手掌少加寬大將風手伸入袋內花穗中間外用熱尉斗尉烙穗干另換如此效遍其病即除風濕腫痛用生芥末調醋攤布上包患處俟熱拔有濕浮翳一層其病出腫消矣骨槽風牙縫出血痛不可當名骨槽風用天南星一個挖空中心填滿雄黃白麵包裹炭火煨焦取出伏地氣半日去面將天南星研末擦牙縫數遍止血止疼腳氣普濟大風丹此方系東京開地挖出石碑篆文能治癱瘓癩疾一切風疾腳氣跌打損傷及破傷風等症服至五七九便自發汗汗速則除風百驗七月十五日取紫背浮萍揀淨用放竹篩內置水盆上曬乾為末煉蜜成丸如彈子大每服一丸飲豆汁酒送下取豆汁酒法以烏豆半升炒紅淬入好酒內浸一晝夜去豆為豆汁酒此灑凡屬筋骨疼痛併産後中風危篤及妊娠腰痛産後余血未盡兼能治之誠單方之良也腳氣白礬三兩煎水浸洗腳氣衝心檳榔一個燒存性為末以童便薑汁和溫水酒調服軟腳病白鳳仙花不拘多少陰乾入燒酒內埋土一七愈久通紅此酒益腳力強筋骨腳氣上攻結成腫核及一切腫毒用甘遂末調敷腫處即濃煎甘草水服其腫即散足痛脛腫洗方萊蔔秧即蘿蔔菜連根煎湯洗如無鮮者曬乾者亦可用又方明礬二兩地漿水見諸藥食毒方十大碗煎六七沸將一半浸腳一半徐添入上以衣被圍身略有微汗則愈隨以薄粥飲之如不愈照前方加硫黃三錢又方枸杞葉搗汁將鵝毛塗患處數十次亦妙風寒暑濕腳氣鳳仙花葉曬乾煎湯熱洗仍以葉搗敷患處腳氣發腫馬鞭草煎湯洗二三次又方黏米飯同陳好酒糟搗爛裹敷患處止露出腳趾頭遠行兩腳腫痛細辛白芷防風草烏各等分為末糝在腳底內如腳底幹不黏藥即以水微濕糝藥著腳行走不致腫痛中暑門中暑中暑者大都避暑於深堂大廈為陰寒所遏暑不得越故也此寒為標熱為本先以辛苦治其標寒繼以清涼治其本熱手足厥逆者乾薑一錢炒炙甘草八分肉桂去皮杏仁去皮尖各六分上為末不要細煎溫服如煩燥井花水調下中暑腹痛霍亂吐瀉或頭痛昏憒香薷茯苓厚朴扁豆甘草各一錢水煎服熱甚者加黃連解暑丸乾葛二兩烏梅肉蘇葉各四兩青鹽一兩白糖一斤共為末和糖如干不能成丸再入白蜜為丸如龍眼大每日開水淡鹽湯服一丸傷暑出丹凡暑月身熱昏沉未明症侯恐是出丹生白扁豆數顆嚼食之令吐如不吐再以生亙水泡濕研汁一小盞和水服之即愈又中暑方水蓼煮汁灌又方炒黑麻搗爛井水擂汁灌又方蒜頭搗爛取路上熱土攪水飲甚妙中暑悶方取扁豆葉搗汁飲之即愈潑火散治中暑昏迷不省人事並煩燥口苦舌乾頭痛惡心不思飲食及血病地榆赤芍黃連青皮各等分為末每服三錢漿水調服若血痢水煎服熱死道中行人酷日趲行野間農夫暄天勞力津竭汗盡卒然昏倒名為中熱斷不可使冷及飲冷水得冷則不能救矣法用將草屈帶盤纏熱人臍上使三四人溺尿臍中令溫此因路上倉卒無湯故令溺也若有溫湯更好或用皂角燒存性甘草各一錢為末溫水調灌之如無藥急以生薑汁或蒜搗爛以熱湯或童便灌下外用布蘸熱湯尉氣海在臍下二寸立醒醒後仍勿以冷水飲之又方以紫金丹一錢溫湯磨化將箸橇開口灌下即蘇中暑丸半夏一斤醋五碗煮乾甘草半斤生用茯苓半斤去皮共為末薑汁煮糊為丸如梧子大每服五十丸熱湯下有痰薑湯下此丸入夏之時宜制以濟人中暑暴昏用大蒜搗爛調冷水小半杯取茶匙灌七挑於鼻孔中立蘇伏暑肚痛用瓢掀攪缸中水百遍取泡子一碗薄荷葉十餘皮長燈草七根同煎湯調六一散三錢服之立愈此方並可治傷暑潮熱不治之症凡中暑如已昏迷嚼大蒜一瓣冷水送下如不能嚼即用水研灌之立醒途中倉卒無水渴甚即嚼生蔥二寸許和津同咽可抵飲水二升中暑暴死以胡麻一升炒黑攤冷為末新汲水調下霍亂門霍亂吐瀉不止此症始因飲冷或冒寒或失飢或大怒或乘舟車傷動胃氣令人上吐不止因而下瀉吐瀉並作遂成霍亂頭眩眼暈手足轉筋四肢逆冷藥緩不救吳榮萸木瓜食鹽各五錢同炒焦先將磁罐盛水三碗煎百沸入藥同煎至碗半隨病人意不拘冷熱服又方以艾葉一把水二升煎一升燉服一面以生半夏搗爛貼臍內立止如死而腹尚有暖氣者即加鹽於臍上炙艾七壯立生絞腸痧痛不可忍凡腹痛手足冷但身上有紅點以燈草蘸油燃火淬於點上炒鹽一撮陰陽水一鍾半碗湯半碗水和勻名陰陽水兼治發痧調服腹痛稍止當眼藿香正氣散藿香正氣散此散原治四時不正之氣不眼水土脾胃不和吐嘔瀉泄痢下腹痛飲食停滯噁心胸滿等症藿香二錢白芷桔梗半夏薑汁製紫蘇陳皮焦術土炒大腹皮茯芩厚朴薑汁炒各一錢炙草五分生薑三片大棗二枚水煎溫服霍亂欲吐不吐欲瀉不瀉炒鹽攪白滾湯候湯冰冷飲之如不止將針刺少商穴十指頭出血立愈穴在十個指頭上指甲之兩旁與出指甲之處相齊只離指甲兩邊各一韭葉之地是也不吐不瀉心腹脹痛煩悶欲死檳榔五錢童便一杯用水一盞同煎服又將病人臂腿橫紋上蘸濕水拍打見有紫紅胍紋即以針或磁片刺破出紫血立愈此法又能治絞腸痧又方用生白礬為末滾水下一錢霍亂欲吐瀉而不吐瀉者用鹽一大匙炒令黃枯童便一杯合和溫服少頃吐下即愈救急方陰陽痧症食鹽二斤炒熱將青布裹作二包頸背上尉之冷則易換或臍上亦可陰痧則腹痛而手足冷看身上有紅點以燈火爆四肢臂腿橫紋並臍下之痛處陽痧則手足暖用針刺十指甲處出血即愈黴亂吐瀉將危者藿香陳皮各五錢水二杯煎一杯溫服霍亂吐瀉用緑豆粉白糖各二兩以新汲水調服愈生生編吐瀉將危藥不可下者急以鹽填臍中於鹽上灸艾七壯即回或刺委中穴出血即腿彎對膝處或刺十指頭亦愈此皆屢驗之方也又方以胡椒緑豆各四十九粒研勻木瓜湯調服一錢直指方華他危病方以枯白礬末一錢百沸湯調下暑月脹滿欲作霍亂未得吐下者鮮紫蘇葉搗汁飲一盛甚效五苓散治中暑煩渴身熱頭疼霍亂吐瀉心神恍惚及小便赤少豬苓澤瀉各一錢白朮炒茯苓各一錢五分肉桂五分水一杯煎六分空心溫服霍亂腹痛厚朴薑汁製四兩桂心生薑各二兩枳實麩炒五枚水四升煎二升分作三服陶隱君方聖惠方木瓜五錢桑葉三片棗肉一枚水煎溫服霍亂吐痢及轉筋白扁豆為末醋和服此蘇公方也又方鍋底墨灶額上墨各五分百沸湯一盞急攪數十次以碗蓋之隨口吸飲一二口立止經驗方霍亂脹滿不得上吐下瀉名乾霍亂亦名絞腸痧小蒜一升水二升煮一升頓服肘後方又方干黃土掘地深二尺以新汲水傾入攪混俟稍橙取清汁飲之連服三五盞即愈大忌米湯千金方乾嘔不止吳茱萸湯泡炒乾薑泡各二錢水煎服霍亂方用高梁掃帚上穗子連枝稍一把煎湯溫服可愈又絞腸痧方此症夏天甚多肚腹急痛唇指青黑者用透明生白礬研末每服二錢用陰陽水調服奉囑仁人君子夏天出行必須帶明礬在身或在舟中長途旅次黑夜倉卒之際遇患此症應手奏功再於爪甲肉際臂腿彎等處刺出黑紫血為要切忌薑湯茶湯米麵大葷必待愈後餓甚吐瀉三個時辰方可食粥此症須認明若陰症誤視不效簡便痧方患痧大抵腹痛亦有並不痛者但昏沉脹悶莫可形狀醫未能識者急取田中生芋艿洗淨嚼之如非痧則生澀難食若是痧則甘美異常再食一枚脫然起矣此方屢驗腹痛者同治此痧六脈皆沉或右關浮洪胸背腹有細斑於肌膚內者是也再用燈草蘸菜油點火照之隱隱見紅斑即以火向斑上淬必爆響須淬盡方止否則復發用蕎麥五錢煎湯服斑痧腹痛以黃梔子炒黑為末以陳酒溫涼送下一錢霍亂腹痛出汗吐瀉不止甚危急者食鹽一兩生薑五錢切片同燒色變以水一碗煎服不宜熱服愈後忌飲食乾霍亂心腹脹滿不得吐瀉者此病最險凡中風中暑中氣中毒中惡乾霍亂一切速暴之症急以生薑搗取汁加童便調服立可解散又方鹽二匙熬童便沖服又方用炒鹽一兩牙皂一錢水煎服取吐胃氣一回即愈又用吳茱萸三四兩鹽數兩炒熱尉臍下亦效又方用鹽一撮醋一盞同煎八分溫服或鹽梅鹹酸皆可服霍亂上吐下瀉用韭菜搗汁一碗重湯煮熱服直指方用胡椒四十九粒緑豆一百四十九粒研勻木瓜湯溫服一錢孫真人傳方用胡椒三十粒以飲吞之霍亂轉筋以墨書木瓜二字於病處仍令病人口呼木瓜隨聲而愈親驗之甚效其理不可解陶宏景真誥又方以木瓜煎湯服仍以湯浸青布裹其足聖惠方又方用大蒜搗爛塗足心立愈永類鈴方又方令病人面牆直立一人以手蘸溫水在腿彎內反手拍打數十有青紅脈突起即將針刺其上出黑血立止轉筋不可忍者男子以手挽其陰女子以手牽其乳近兩旁邊即愈或以熱湯漬之亦可又方勉強站立直伸少頃即愈又用蚌肉煮酒飲二三次後少發人壯者飲一二次不發簡便單方治霍亂吐利不止以白扁豆醋炒研末和醋服之氣痛門治心腹疼香附醋製七次炒研良薑薑汁洗七次炒研胃脘有滯有蟲因寒而起者用良薑二錢香附一錢因怒而起者用香附二錢良薑一錢寒怒兼者各用一錢五分米飲加薑汁一匙鹽少許調服又方用胡椒四十九粒乳香一錢研勻男用生薑女用當歸煎酒下又方如遇無藥以鹽置刀頭上燒紅淬入酒中乘熱飲之吐痰立愈或用鹽微炒布包尉痛處即止此方急痛不識何症用此穩妥久患心疼發即欲死時發時止服此可除根莪朮二兩醋煮木香一兩煨共為末每服五分醋調下簡易方胃脘當心而痛或氣或寒觸而屢發者用此荔枝核炒微焦一錢木香七分共為末以清湯或灑服一錢許數服可除根試驗神方也胸膈胃脘大痛察有邪滯連用排氣飲及諸藥不見效者用此豬牙皂角以微火燒煙甫盡即取起研細末用火酒調送下七八分或一錢其效如神生韭飲治七情郁久胃脘有瘀血作痛大能開提氣血生韭搗自然汁一盞加溫酒一二杯同服先以桃仁連皮嚼食數十故後飲韭汁神授氣痛方白蔻仁小茴各一錢良薑半夏茯苓各二錢丁香八分木香八分當歸一錢荔枝核二個炕研共為細末磁瓶收貯固密痛時用薑汁一匙開水下一錢孕婦忌服四香散治氣痛一切應效如神茴香四分廣木香五分沉香五分香附制四錢共末滾水酒沖服孕婦慣氣痛者亦可服氣痛急痛冷痛七方氣痛末藥沉香降香木香甘草各一錢白蔻砂仁枳實烏藥檳榔川朴川芎香附廣皮各二錢共研細末每服一錢五分或酒或開水下用蘿蔔子炒去殼同紫蘇根為引有氣塊者加三稜莪朮各二錢治心氣急痛取厚些木耳一兩焙乾為末白酒送下三服全愈痛急牙關緊閉用老蔥白五莖去皮須搗膏將匙送入喉中灌以麻油四兩但得下咽即蘇又以蔥白搗爛攤臍上以艾灸之或尉之得鼻尖有汗其痛立止煙厥心疼用烏梅二個川椒十四粒煎湯服愈冷氣及久患腹痛連根莪朮二兩醋煮木香一兩煨共末每服五分淡醋湯下心疼痛急胡桃一個棗子一枚去核夾桃紙裹煨熟以生薑湯一鍾細嚼送下可保不發又方以鴿糞焙為末三錢熱黃酒沖服立止九種氣痛諸藥不效者此方神效附子黃連各一錢白芍五錢水煎服即愈寒熱乘於心胃之間兩相攻戰所以作痛此方黃連平心火附子去胃寒而白芍入肝平木不使其克胃又去郁生心血譬如兩人爭鬥有和事人自然解紛也所以諸藥不效服此神效耳九種氣疼神授方千年石灰一兩生熟白礬各五錢共末薑汁丸桐子大或薑湯或燒酒送下七丸即愈有力仁人修合濟世功德無量神應奇方治九種心胃氣痛病發時用艾葉十片揉碎在鍋勺內炒不住手用箸撥動將鹽滷豆腐店內不曾加水者半小杯傾入候焙乾倒出研末用熱燒酒一杯送下候腹內作響或降氣或吐出清水即愈此方須現制現服隔夜即不效見雞犬孕婦亦無效服後須戒茶鮮肉三日愈後每逢初一十六日用淡鹽湯吃一服永不再發吾母太夫人生余之時因得此症歷久不愈遍覓醫方未獲其效余因立願如得奇方應手奏功服不再發者當即公之大衆廣救疾苦昨承乏云間得此方於定海許公輟進一服而愈不復再發真仙方也不敢自祕謹刊刻流傳以廣效益陳漢三先生傳胸胃肚痛方香元散專治此症驗香附一兩醋炒鬱金一兩元胡一兩酒炒廣木香二錢共研細末好酒送下滾水亦可又方系貴州南籠府經廳周夢龍傳云平淡屢驗紅棗七枚去核搗爛橘皮三錢生薑三錢煎服霍亂腹痛泄瀉取往來門斗內灰一撮陰陽水化服疝氣痛方用荔枝肉炒炕兌酒沖服此方以荔枝子炒黃橘核子炒川楝子香附子制四味研末兌酒沖服治疝氣更效沙肚痛砂仁五錢炒黑食鹽三錢炒黃汲無根井水煎湯將二味研末入內用箸攪至將冷服一大杯即愈受寒小腹痛小茴香一錢青皮一錢煎服不愈而腹尤痛加吳萸八分服之膀胱氣痛用膀胱子炒貫入雄雞內煮食之即愈疝氣痛取松子一歲一粒燒研酒服鐵刷散治心脾積痛婦人血氣刺痛酒病噁心腸滑泄瀉良薑炒二兩茴香炒七錢蒼朮炙草各二兩八錢共末每服二錢空心姜鹽湯下丁香止痛散治心痛難忍丁香五錢良薑二兩茴香甘草各一兩五錢共末服二錢沸湯下舒筋散治閃跌血滯腰腹脹痛及産後血滯痛當歸元胡桂心杜仲桃仁牛膝川續斷各等分研末每服二錢溫酒下治久心痛十年五年者俱效兵部手集方小蒜以鹽煮熟並用醋同煮頓服立愈永不再發食療方治五臟虛冷腹痛胡椒二三十粒擂碎熱酒服之又方以吳萸二錢擂爛以酒一杯調之用麻油一杯入鍋煉熟傾吳萸酒入鍋煎一滾取服立愈治心疼氣痛等三十七方治急心痛用山羊血一分燒酒化下或用淡豆豉五錢煎湯半杯服之立愈諸般氣痛用好燒酒半杯浸頂大冰糖一塊將燒酒燃灼候燒完酒自息將糖研碎開水對服心痛海蜇二斤煮荸薺一斤做三四次吃服完愈服時忌茶又方沙魚翅煎湯磨沉香三四分衝入服胃痛六稷棐子殼煅灰存性三錢酒沖服二三次即愈膀胱偏墜疝氣陳石灰炒五倍子山楂子各等分為末面和醋調敷一夜即消又方用荔枝子炒黃為末每日三分黃酒沖服又方以槐子一錢炒褐色為末入鹽三分空心黃酒調服又方用乾絲瓜瓤火燒存性研末每服二錢黃酒調下又方木香三錢沉香三錢澤瀉陳皮烏藥香附酒炒荔枝核各五錢小茴三錢丁香二錢共末以酒和丸如梧子大鹽水送下每日服二錢又方雞子一個尖上開孔入硫黃末三錢火煅成灰成灰研末白湯調下又方殭蠶鹽洗香附酒洗小茴酒洗共末每服一錢好酒下又方油核桃七個火煨去殼用肉八角茴香七個酒煎空心服又方牛蒡子根搗爛灑沖服元胡散治冷氣及疝氣腹痛元胡索炒胡椒各等分為末每服二錢食前溫調服神效散治心痛作酸並治水停心作聲如雷及口眼喎斜不省人事膽礬一分為末溫黃酒送下以吐盡痰為度心如刀刺口吐清水生艾杵汁一大碗於半日中勿食晚飯五更時先嚼燒肉於口內切勿咽下俟口中水入肚蟲聞香則頭朝上矣良久飲下艾汁立時打下蟲出又方以黑砂糖熱酒化下腹痛而吐瀉者有蟲也用雄黃白礬檳榔三味各等分研為末米飯為丸如黍米大每服五分滾水下治疝痛難忍及囊腫如斗腎子痛者雄黃甘草各一兩白礬二兩共研末每用一兩滾水五升沖和洗患處良久再暖洗至冷候汗出痊疝靈散治偏墜七疝腎囊腫大疼連小腹不能自忍服之極驗龍眼核荔枝核二味炕焙搗碎小茴香各等分略焙研共末每服一錢空心用升麻煮酒送下重者二服心腹小腸疼痛及疝氣血氣婦人産後一切疼痛諸藥不效者此藥能行能止妙不可述五靈脂蒲黃各等分共研末或酒或醋調勻熬成膏再入水一鍾煎至七分熱服或醋糊為丸童便酒服亦可腎子大小偏墜方用棉花子煮湯入甕將腎囊坐入甕口俟湯冷止一二次散其冷氣即愈偏墜神方用冰姜一大塊光粉一塊等分同搗極爛塗腎囊上仰臥以油紙襯好勿汙被褥少頃大熱切勿動手聽其自落塗兩次即可斷根日久腎子大者宜漸縮小矣偏墜小腸氣屢驗方古晉榆社尉宛華亭傳多年煮肉菜砂鍋底一個打碎入鍋用芝麻油一斤許煎至焦枯看火起煙盡起鍋冷定研細蜜丸每服三錢黃灑送下神效疝氣荔枝核四十九枚焙研陳皮九錢硫黃制四錢共末鹽水打面麩為丸如緑豆大遇痛時空心溫酒服九丸良久再服不過四五服其效如神氣卵方羌活一錢二分橘核川楝子冬一錢五分防風木通各一錢二分製蒼朮一錢三分桂子四分小茴一錢二分燈心一扎好酒半杯水半杯煎熱服腹痛不能服藥以生薑一大塊煨熱用棉裹入穀道內冷則易之或用大獨蒜煨用棉裹入穀道亦可冷則易之各種氣痛方白丁香五錢初生小雛雞糞要揀白硬者三錢鴿屎二錢白者將前三味用新瓦炕黃色另研末又揀雙勾藤三錢炒研木香沉香降香各一錢共研和末沖酒化服二錢即愈一切氣痛臺烏浸一夜炒小茴炒青皮炒良薑炒共研末溫酒童便服效心下大痛用胡椒緑豆各四十九粒同研爛酒下神效疝氣初起鳳仙花陰乾荸薺風乾各等分用燒酒浸服日飲二三杯疝氣旱蓮草搗汁一盞酒半盞和勻燉熱服立效按此方治疝腫痛不論老少新久俱效以旱蓮草能行血活血故也疝發痛不可忍用堅炭燒紅放碗內將好燒酒半碗澆下速以碗蓋之飲此酒即愈陰腫核大如升搗馬草塗之即消陰囊爛盡只留二子囊癰乃陰虛濕熱流注子囊結而為腫至潰後二子懸掛者猶不傷命以其毒從外發治當補陰利濕清熱取效者十有八九鳳仙花子甘草等分為末麻油調敷即生肉疝氣腫痛小茴二錢荔枝核橘核各一錢研末酒調服立消斗大疝氣方沉香紫蘇蘇木南星各五錢老香櫞一個切碎同雄豬尿泡洗淨入藥於內好酒四五斤將豬泡煮爛搗面和丸梧子大酒送四五十丸藥盡胞縮陰囊腎莖肛門瘙癢難忍陳葫蘆殼燒灰存性搽摻患處立愈泄瀉門立止水瀉方車前澤瀉各一錢厚朴薑汁炒一錢二分共研末滾水調服即愈水瀉不止方枯礬一錢公丁香五分共末黃酒調服泄瀉初起方陳細茶一錢核桃仁五個炕燒生薑三錢紅砂糖三錢水二碗煎八分次早服自愈神效久瀉丸治一切久瀉諸藥無效此劑自止黃丹一兩飛過枯礬一兩黃蠟一兩將蠟溶化小銅勺內以丹礬二味細末投入乘熱為丸如豆大每服二丸空心滾水下交感丹治婦人久瀉香附一斤水浸三日曬乾炒白茯神四兩去皮木煉蜜丸如彈子大每空心服一丸白湯下飲酒過多泄瀉方花粉一味搗爛用袋盛洗出漿來曬乾每服用白糖調數錢加蜜少許最妙兼治吐血之症暴瀉方不拘老幼可用大蒜搗爛敷足或貼臍中千金方四苓散治夏月暑熱傷人泄瀉如注白朮土炒茯苓豬苓澤瀉各一錢水杯半煎七分食遠溫服和劑局方暑濕泄瀉白朮土炒車前子炒各等分為末白湯下三錢脾虛泄瀉白朮土炒一兩白芍炒一兩冬月加煨肉豆蔻五錢共末飯丸梧子大每服五十丸米飲湯下日二服丹溪方水瀉訶藜勒泡一兩肉豆蔻煨五錢為末米飲湯下二錢聖惠方老人虛瀉肉豆蔻三錢麵裹煨熟去面研乳香一兩共末陳米糊丸梧子大每服七十丸米飲下瑞竹堂方泄瀉不止陳石榴皮酸者焙乾研末每服一錢患二三年者百方不效服此便止普濟方兼治久痢此方久瀉可服新瀉有邪滯者不可服腎虛久瀉骨碎補焙乾為末一錢入豬腎中裹腎煨熟食之自愈五更溏泄不止或一二次經年不止者名腎瀉此係陰盛陽衰五味子去梗二兩吳萸湯泡七次五錢同炒香為末每旦陳米湯送下二錢許叔微方老人久瀉不止枯礬一兩訶子麵包煨去核七錢五分為末米飲調二錢空心服聖惠方又方吳萸三錢水一鍾煎六分入鹽少許通口服仁存方灸法治吐瀉曰久垂死者天樞二穴臍旁各開二寸是氣海臍下一寸五分是傷暑吐瀉硫黃滑石等分為末每服一錢米飲下即止玉露霜治老人脾瀉最宜白朮二兩炒陳皮一兩五錢蓮肉四兩去心苡仁四兩炒糯米一升炒陳米一升鍋炒焦緑豆一升糖霜量加共為細末每服二三錢滾水調勻服之芡實散久服延年益壽身輕不老芡實粉金銀花干藕各一斤蒸熟曬乾共末每日湯水調服燒棗丸治泄瀉不止雖至面黑氣息奄奄者立效回生沉香木香公丁香胡椒官桂乾薑砂仁赤小豆各等分共研末煮紅棗肉為丸仍以棗肉包之再以麵裹煨熟米湯送下水瀉石膏生熟各半明礬生熟各半共末以陳米飯為丸如梧子大每服三丸再服三丸不可多服泄瀉脾弱山藥切片炒研末入粥內食之吐瀉過多四肢虛冷不省人事制過天南星為末每服三錢入京棗二枚煎湯送下吐瀉時時作渴歌人參白朮木香兼乾葛藿香切片茯苓甘草七味烏梅加上同煎臨時再入伏龍肝此法千金不換取水煎服脾瀉作酒食冬瓜皮焙乾一兩鍋巴糠一兩曬乾砂仁五分共末砂糖水調服水瀉方茯苓二錢厚朴一錢五分陳皮一錢枳殼二錢乾葛一錢木瓜三錢陳石榴酒炒二錢紅棗煨姜引煎服李南圃傳又方用干蘿蔔種兜煎水服之即愈如無兜蘿蔔子亦佳卜子寬中下氣肚膨氣脹後重裡急者服之即效多年脾瀉老人多此謂之水土同化孫氏仁存方吳萸三錢泡過入水煎汁入鹽少許連日服蓋吳萸能暖膀胱水道既清大腸自固他藥雖熱不能分解清濁也伏暑泄瀉玉華丹白礬煅為末醋糊為丸量人大小用木瓜湯下奪命星斗丸治遠年近日小腸疝氣偏墜掣疼臍下撮痛以致悶亂及外腎腫硬日漸滋長及陰間濕癢成瘡用吳茱萸去梗一斤分作四分四兩酒浸四兩酒浸四兩醋浸四兩童子小便浸一宿同焙乾澤瀉二兩為末酒糊丸梧子大每服五十丸空心鹽湯或酒吞下即愈泄瀉無度針砂醋煮炒乾豬苓生地龍各三錢共為末蔥涎研和敷臍中約一寸厚縛之待小便多為度日二易之即止服諸藥無效用此應驗即愈脾元氣痛發歇不可忍者用吳萸一兩桃仁一兩和炒吳萸焦去萸取桃仁去皮尖研細蔥白三莖煨熟酒浸溫服痢疾門痢疾方山楂炭三錢木香一錢五分煨共研末紅痢白糖調服白痢紅糖調服紅白相兼紅白糖調服之立效又方荷葉燒研二錢每日空心服紅痢蜜糖下白痢砂糖下相兼者相兼下又方烏梅肉一兩去核燒過研為末空心用米飲送下二錢又方立冬後將萊蔔菜洗攤晾屋上任受風霜雨雪至立春前三日收入陰乾用磁壇收貯如有患痢者以水煎服立愈腹痛者亦可服益元散治一切諸痢滑石六兩為末飛用水淘過甘草一兩為末共末和勻每服三錢冷水下小兒一錢五分紅痢加紅曲二兩白痢加炒乾姜一兩此方宜制以施人治諸般泄痢俱有效暑月尤佳且價廉而藥亦易得薑茶湯此方有加陳皮二錢食鹽二錢老生薑細切五片約計三錢細茶三錢用新汲水煎服此方治痢腹痛不問遠近赤白冷熱皆效蓋姜能助陽茶能助陰二者皆能消散調平臟腑之邪氣解暑毒酒食之積也久痢不止不論遠近酸石榴一個煅煙盡出火毒一夜研末仍以酸榴一塊煎湯服並治久瀉又方五倍子醋炒七次為末空心米湯下又方老石榴皮焙乾研末每服二錢米飲送下又方木香