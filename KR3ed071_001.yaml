取研用陳米粥上皮畫成片包五分用白滾湯送下又方用細辛五錢牙皂一錢蔥三根酒藥子半個田螺一個共搗成泥敷臍上候乾即去藥自然飲食或於患者床前烹煮鯽魚多加作料使聞香味即刻開關又方用活蛤蟆一隻打爛加真麝香六分同研貼臍上用布束緊半日即能飲食兩日愈治冷痢方採新藕節搗爛熱酒調下數服即愈變通丸治赤白下痢日夜無度及腸風下血此方系浙西河山純老以傳蘇韜光者救人無算用川連二兩吳茱萸二兩共湯泡七次同炒香揀出各自為末粟米飯丸梧子大收貯如患赤痢甘草湯下黃連丸三十丸白痢乾薑湯下茱萸丸三十丸如赤白相兼各用十五丸米湯下二色丸治痢及水瀉腸風此方系鄧筆峰傳吳萸二兩黃連二兩同炒香各自為末另以百草霜末二兩同黃連作丸另以白芍末二兩同茱萸作丸各用飯丸梧子大各另收每服五十丸赤痢烏蜜湯下連霜丸白痢米湯下萸芍丸赤白各半服之瘧疾門止瘧不拘間日或日日虛瘧多汗者獨蒜十二個煨熟桃仁一百個去皮尖雙仁者更美搗爛加入上好黃丹再搗勻為丸如黃豆大每服三丸當發日早晨溫酒一杯面東吞下又方白糖四兩調化燒酒內溫服飲至微醺而止又方新汲泉水煎至百沸一碗至半碗發瘧時寒過熱來起坐椅上去被增衣不時熱服少許勒汗多發一兩個時辰覺腹中寒冷氣盡舒暢即止隔年瘧乾薑五錢白朮三錢土炒煎服愈又方雄黃三錢為末龜板一個去兩旁將龜板放火上將雄黃末徐徐鋪在龜板上煅黑碗蓋存性取起研末酒服厚被蓋臥立愈久瘧虛極人參五錢生薑五錢水二碗煎一碗露一宿次日五更溫服當日即止無力者以乾白術一兩代人參加用生薑一兩如前煎二服即止老瘧不愈正鱉甲醋炙黃為末酒服一錢隔夜一服清早一服臨時一服無不斷者入雄黃少許為妙治瘧奇方烏豆三錢陳皮三分柴胡三錢生薑三片凡瘧病先一日將藥煎好取頭湯用碗裝貯再用小盤蓋放病人床下又將藥渣煎湯服之次日乃取床下藥煎熱服治隔日或二三日尤效外治久瘧方大棗肉二個去皮核斑毛蟲二個焙研二味同研勻加熟豬油少許捏成餅子指頭大貼在兩眉中間印堂上一周時即愈瘧患不拘老幼苦參一味為細末用好醋打面和丸桐子大臨發之日早晨用桃枝七寸柳枝七寸泡湯一茶盅服三錢久瘧人虛雞子二個打散入白糖一兩打勻蒸熟食立止熱瘧不寒川山甲一兩紅棗十枚同燒存性研末每服二錢發日五更井花水服楊氏家藏方治瘧不止龜板燒存性研末酒服二錢海上方又方硃砂三分巴豆仁一粒研為末飯丸分作十丸未發前取一丸貼肩心一周時揭去極效黃晉問傳外治方用旱蓮草捶爛置男左女右手寸口上以古錢壓定將綢絹條繫住良久起小泡謂之天炙止瘧甚效名種久瘧夜明砂為末每用冷茶服一錢立效又方用獨頭大蒜一個搗濃隨打雞蛋一個手內攪勻好燒酒滾沖服再摘桃葉尖七皮搓丸塞鼻分男左女右即離原臥房一宿愈治夜發瘧疾用黑豆陳皮制首烏各三錢老薑三片凡瘧疾夜發先一日將藥煎好取初次湯碗盛蓋安置病人床下又將藥渣再煎服之次日再取床下藥煎熱服之立效久瘧陳皮不去瓤白八錢砂仁蒼朮甘草各二錢茯苓常山各三錢檳榔一錢二分草果一個煨先晚用酒娘煎好取鐵器蓋之露一宿次早仍熱滾略對開水向東方服立愈治瘧方用老生薑四兩搗爛男左女右敷膝上外用油紙藍布裹緊以帶扎好不令汗流出臨期於末發之先敷之立效又方白朮七錢橘紅五錢用水煎服即愈又方斑毛一個用膏藥貼額上一周須早一日貼之間日瘧疾密陀僧六分研細白洋糖五錢末發時早一刻熱燒酒調一服立愈又方川貝母製半夏各等分共末薑汁和丸如梧子大外用硃砂為衣臨發日清晨面東薑湯吞服三錢此丸五月五日修合尤應久瘧積食方辣蓼頭即紅蓼頭七個搗爛用飯為丸陰陽湯下瘧疾神應方蒼朮一錢五分炒廣皮厚朴薑汁炒半夏秦艽各一錢五分川芎一錢茯苓一錢川續斷三錢鹽水炒元棗一枚生薑一片如發在午後陰分者加當歸白芍各一錢炒水煎服三劑必愈又方柴胡知母當歸各一錢桂枝六分防風四分黃耆二錢青皮首烏各八分川山甲八分土炒以上九味共一劑水碗半煎一碗露一宿次早面北溫服又方生首烏陳皮各五錢炙草一錢白酒水各一碗煎一碗露一宿次早溫服神效截瘧方陳皮八分半夏草果檳榔白朮雲苓甘草各一錢升麻青皮柴胡炙黃耆各八分丁香人參各三分常山五分烏梅二個姜三片引半酒半水煎露一宿面東服之又方三四次後方可服生首烏五錢知母五錢柴胡廣皮各二錢水酒各一碗煎八分露一宿臨發日黎明溫服又方此方孕婦忌服五月五日取青蒿葉三十斤焙乾為末加好麝香一錢神麯打糊為丸如梧子大不拘新久陰陽各瘧疾臨發日薑湯下二錢久瘧全消方靈仙蓬朮醋炙麥芽炒各一兩生首烏二兩金毛狗脊八錢青蒿子五錢山甲珠黃丹鱉甲酒炙脆研細各五錢上藥加水一碗煎糊留一半存貯搗丸余糊同藥曬乾研末其丸如緑豆大半飢時用薑湯送下二三錢凡處暑後冬至前或間日或非時纏綿日久須治瘧母豫嘗酌定此方服不半料全愈如小兒服用加雞肫黃皮五錢炙末山藥一兩飴糖一兩同為丸服一錢治一切寒熱瘧邪鬼瘧等症木鱉肉一兩皂角一兩捶破水一大碗同木別煮煎乾為度去皂角不用硃砂雄黃甘草各一錢共研極細末每服四分未發之先吃飯半碗再用黃酒調藥服蓋被出汗不吐不瀉不傷元氣輕者一服重不過三服即愈忌油麵食三五日治三日或間日瘧二三年不愈者一服即愈屢驗神方當歸半夏各五錢常山檳榔各二錢五分絲棗半斤去核用好酒煮一斤河井水共一斤將前藥並棗用新砂鍋煎爛放屋上露一宿來日清晨將藥棗溫熱服之連棗作幾次吃完即愈忌雞肉雞蛋一月勿食神截奇丸儀徵陽賡起軍門家傳祕方屢試屢驗青蒿八兩青皮二兩真川貝一兩五錢檳榔厚朴神麯半夏各二兩甘草五錢上藥共為末薑汁成丸緑豆大硃砂為衣於未發前三個時辰每服三錢薑湯送下切不可即用飲食此藥不可經陰人之手治瘧膏大興楊澤清傳生薑二兩搗爛如泥牛皮膠二兩將膏熬化投姜泥攪勻熬成膏聽用先以皂莢水洗淨脊膂背腰油膩泥垢拭乾再以生薑一大塊遍擦各處再酌量脊背之寬長剪細布一大塊將膏攤上貼之再搓手心令熟遍摩脊背各處俱各熱為善俟一二日後不發即痊蓋此症多因內傷生冷茶水食物外受寒氣侵於太陽膀胱寒水經太陰肺經與痰水凝結不解而成此膏重用生薑散其錮冷所以獲效然姜多筋絲非搗如泥則渣滓浮高藥氣不厚功力淺鮮無益用膠者籍其黏性不脫也此方簡易卻有奇效五神丹川江子四十九粒去殼白芷肉桂各五錢洋青黛明黃硃砂硫黃明礬各一錢頂麝香二分共研細末用七家粽子尖於五月五日午時焚香虔誠修合將粽子尖同藥共搗成丸如小黃豆大凡有患瘧者不問男婦不拘一日二日發者用一粒將棉花包裹臨發之日清晨面向東將此丸塞入鼻內男左女右任流鼻淚不可扯去要塞一日一夜方可扯去拭乾包過能治二三人甚有奇效此丹切不可過婦人之手愈後忌葷腥麵食各發物七日孕婦忌用小孩未滿三歲者未便用治瘧奇效三方仉涵初先生定之方瘧之為害南人患之北人尤甚弱者患之強者尤甚雖不致遽傷大命然不治發無已時治之不得其道則惡邪內伏正氣自虛久面久之遂不可藥余所定三方甚為平易亦無奇絶不入常山草果等劫劑且不必分陽瘧陰瘧一月二月三月及非時瘧人無老幼病無久遠此三方不用加減惟按次第服之無不應手而愈也第一方陳皮半夏薑汁煮透茯苓靈仙各一錢蒼朮米泔浸一日切炒淨厚朴薑汁拌炒柴胡黃芩各八分青皮檳榔各六分炙草三分共劑水煎姜三片引飢時服渣再煎如頭痛加白芷一錢此方平胃消痰理氣除濕有疏導之功開先之力受病輕者二劑可愈如服三劑病勢雖減而未全愈必用第二方少則三劑多則五劑第二方生首烏三錢陳皮柴胡茯苓黃芩各八分白朮土炒當歸靈仙各一錢知母鱉甲醋炙脆研粉各二錢炙甘草三分共劑水煎姜三片引加無灰酒五分再煎一滾空心服二煎連服此方妙在補瀉互用虛實得宜不用人參黃耆屏去常山草果平平無奇卻有神效即極弱之人纏綿極重之病十劑後立有起色立奏萬全如減一二味加一二味即不靈應誠壽世之良方也第三方人參白朮廣皮知母麥芽各一錢炙耆一錢二分當歸一錢二分升麻四分炙草三分或加何首烏二錢青蒿子八分水煎姜一片棗二枚引服三五劑元氣充足永不發矣方雖有三第二實為主方既不刻削亦不峻補功獨歸之其第三方專為有力者設貧家安得有參只多服第二方可也治瘧應驗方生常山烏梅肉漂白朮漂蒼朮正川芎白當歸各等分紅棗二枚引水煎服久瘧不止硫黃硃砂各等分為末每服一錢臘茶下發日五更服當日或大作或不作皆有效也寒多倍硫熱多倍砂又朱氏方用硫黃臘茶等分為末發日早冷水服二錢二服效寒多加硫熱多加茶溫瘧不止用黃丹炒五錢青蒿童便浸二兩為末每服二錢寒多酒服熱多茶服咒棗治瘧法執棗一枚咒曰吾有棗一枚一心歸大道優他或優降或劈火燒之念七遍吹棗上與病人食之即愈岣嶁神方時珍曰錦囊詩云系蟹懸門除鬼疾畫驢掛壁止兒啼言關西人以蟹殼懸之辟邪瘧江左人畫倒驢掛之止兒夜啼續補氣疼應驗丹方香附一錢五分元胡一錢小茴一錢吳萸一錢川朴一錢二分枳殼一錢五分砂仁一錢白芍一錢青皮一錢甘草八分續補痢疾初起並久不愈方川朴四兩枳殼二兩枳實二兩木香一兩沉香一兩上為末外用大黃一斤煮五枝香和末為丸每服三錢小兒減半白水下又紅白痢並水瀉方用硫黃一斤碎如豆大將布包之入砂罐內上下四旁以豆腐蓋之煮七枝香久取出陰乾如紅痢用硫黃一兩配六一散二兩白糖調服白痢用疏黃一兩配六一散五錢紅糖調服紅白相兼水瀉者與六一散等分大人三錢小兒減半
